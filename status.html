<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>สถานะ order · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f3f4f6; color: #111827;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  button { font-family: inherit; cursor: pointer; }

  header {
    background: #ffffff; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #4F7AFF;
  }
  header img.logo { height: 48px; width: 48px; object-fit: contain; border-radius: 8px; }
  header .info { flex: 1; }
  header h1 { font-size: 17px; color: #1652F0; line-height: 1.2; }
  header .sub { font-size: 11px; color: #4F7AFF; margin-top: 2px; }

  main { flex: 1; padding: 20px 16px; max-width: 500px; width: 100%; margin: 0 auto; }

  .status-card {
    background: #fff; border-radius: 16px; padding: 32px 24px;
    text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.05);
  }
  .status-icon {
    font-size: 80px; margin-bottom: 16px; line-height: 1;
  }
  .status-icon.cooking {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .status-title {
    font-size: 22px; font-weight: 800; color: #1652F0; margin-bottom: 8px;
  }
  .status-sub {
    font-size: 14px; color: #6b7280; margin-bottom: 24px;
    line-height: 1.5;
  }
  .order-summary {
    background: #f9fafb; border-radius: 12px; padding: 16px;
    text-align: left; margin-bottom: 16px;
  }
  .order-summary .label {
    font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .order-summary .item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 14px;
    border-bottom: 1px dashed #e5e7eb;
  }
  .order-summary .item-row:last-child { border-bottom: none; }
  .order-summary .total-row {
    margin-top: 12px; padding-top: 12px; border-top: 2px solid #e5e7eb;
    font-weight: 800; color: #1652F0;
  }
  .order-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
  }
  .order-info .pill {
    background: #ebf0ff; padding: 10px; border-radius: 10px; text-align: center;
  }
  .order-info .pill .label { font-size: 11px; color: #4F7AFF; margin-bottom: 4px; }
  .order-info .pill .val { font-size: 14px; font-weight: 700; color: #1652F0; }

  .btn {
    width: 100%; padding: 14px; border-radius: 10px;
    font-size: 16px; font-weight: 700; border: none;
    margin-top: 8px;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-primary { background: #1652F0; color: #fff; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-ghost { background: transparent; color: #1652F0; border: 1px solid #1652F0; }

  .reward-banner {
    background: linear-gradient(135deg, #ebf0ff, #d1ddff);
    color: #0a1530; padding: 16px; border-radius: 12px; margin-top: 16px;
    text-align: center; font-weight: 700;
  }
  .reward-banner .big { font-size: 22px; margin-bottom: 4px; }

  .progress {
    background: #f3f4f6; border-radius: 8px; overflow: hidden;
    height: 24px; position: relative; margin: 12px 0;
  }
  .progress-bar {
    background: linear-gradient(90deg, #88a4ff, #1652F0);
    height: 100%; transition: width .4s;
  }
  .progress-text {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; color: #111827;
  }

  .footer-note {
    text-align: center; font-size: 12px; color: #9ca3af; padding: 16px;
  }
  .order-id-box {
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
    border-radius: 14px; padding: 14px;
    text-align: center; margin-bottom: 16px;
  }
  .order-id-box .label {
    font-size: 11px; color: #0a1530; letter-spacing: .04em; text-transform: uppercase;
  }
  .order-id-box .id {
    font-size: 32px; font-weight: 900; color: #1652F0; letter-spacing: .04em;
    font-family: -apple-system, monospace;
  }
  .share-row {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .share-row button {
    flex: 1; padding: 10px; border-radius: 10px;
    background: #fff; color: #0a1530; border: 2px solid #c5d3ff;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .share-row button:hover { background: #f7f8fb; border-color: #1652F0; }
  .keep-open-hint {
    background: #ebf0ff; color: #0a1530;
    padding: 12px 16px; border-radius: 10px; margin-bottom: 16px;
    font-size: 13px; line-height: 1.5; text-align: center;
  }
  .keep-open-hint b { font-weight: 700; }
  .ready-banner {
    background: linear-gradient(135deg, #16a34a, #15803d); color: #fff;
    padding: 18px; border-radius: 14px; margin-bottom: 16px;
    text-align: center; animation: pop 0.5s ease;
    box-shadow: 0 8px 24px rgba(22,163,74,.4);
  }
  .ready-banner .big { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .ready-banner .sub { font-size: 14px; opacity: .9; }
  @keyframes pop {
    0% { transform: scale(.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.jpg" alt="logo">
  <div class="info">
    <h1>สถานะ order</h1>
    <div class="sub">ครัวผู้ใหญ่ปอง</div>
  </div>
  <a href="tel:0619623696" style="background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;text-decoration:none;font-size:20px;box-shadow:0 3px 10px rgba(22,163,74,.3);flex-shrink:0">📞</a>
</header>

<main>
  <div id="content"></div>
</main>

<div class="footer-note">หน้านี้จะอัปเดตอัตโนมัติทุก 3 วินาที</div>

<script type="module" src="firebase.js"></script>
<script src="menu-data.js"></script>
<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
const params = new URLSearchParams(location.search);
const orderId = params.get('order');
const phone = params.get('phone');
let cloudOrder = null;
let cloudCustomer = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], pendingOrders: [], settings: { goal: 20 } };
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const db = loadDB();
  // Prefer cloud order, fallback to local
  const order = cloudOrder || (db.pendingOrders || []).find(o => o.id === orderId);
  if (cloudCustomer && order) {
    db.customers[order.customer_id] = cloudCustomer;
  }
  const wrap = document.getElementById('content');

  if (!order) {
    wrap.innerHTML = `
      <div class="status-card">
        <div class="status-icon">❓</div>
        <div class="status-title">ไม่พบ order</div>
        <div class="status-sub">อาจเปลี่ยนเครื่องหรือล้าง browser ลองใหม่ที่หน้าเมนู</div>
        <a href="menu.html" class="btn btn-primary">กลับหน้าเมนู</a>
      </div>
    `;
    return;
  }

  const status = order.status || 'pending';
  if (status === 'cancelled') return renderCancelled(order);
  if (status === 'delivered' || status === 'done') return renderDone(order, db);
  return renderActive(order, status);
}

// Compute my queue position (count pending orders ahead with date < mine, excl scheduled)
function computeQueueInfo(order, allOrders) {
  if (order.status !== 'pending') return null;
  const myDate = new Date(order.date).getTime();
  // Pending orders ahead (older, not scheduled, not me)
  const ahead = (allOrders || []).filter(o =>
    o.id !== order.id &&
    o.status === 'pending' &&
    !o.scheduled_at &&
    new Date(o.date).getTime() < myDate
  );
  const myPos = ahead.length + 1;
  // ETA: 15 min base + 5 min per order ahead
  const etaMin = 15 + ahead.length * 5;
  return { position: myPos, etaMin };
}

function renderActive(order, status) {
  const stat = window.STATUSES[status] || window.STATUSES.pending;
  const stages = ['pending','confirmed','cooking','ready','delivering','delivered'];
  const currentIdx = stages.indexOf(status);
  const progressHtml = `
    <div style="display:flex;justify-content:space-between;margin-bottom:18px;position:relative">
      <div style="position:absolute;top:14px;left:14px;right:14px;height:3px;background:#e5e7eb;z-index:0"></div>
      <div style="position:absolute;top:14px;left:14px;height:3px;background:linear-gradient(90deg,#1652F0,#16a34a);z-index:1;width:calc(${(currentIdx/(stages.length-1))*100}% - 14px);transition:width .5s ease"></div>
      ${stages.map((s, i) => {
        const sStat = window.STATUSES[s];
        const isDone = i < currentIdx;
        const isCurrent = i === currentIdx;
        const bg = isCurrent ? sStat.color : isDone ? '#16a34a' : '#fff';
        const color = (isCurrent || isDone) ? '#fff' : '#9ca3af';
        const border = isDone || isCurrent ? sStat.color : '#e5e7eb';
        return `
          <div style="position:relative;z-index:2;text-align:center;flex:1">
            <div style="width:30px;height:30px;border-radius:50%;background:${bg};color:${color};border:2px solid ${border};display:grid;place-items:center;font-size:14px;margin:0 auto 4px;${isCurrent?'animation:pulse 1.5s ease-in-out infinite':''}">${isDone?'✓':sStat.icon}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // Scheduled time banner
  const schedBanner = order.scheduled_at ? `
    <div style="background:linear-gradient(135deg,#1652F0,#0738C9);color:#fff;padding:14px;border-radius:12px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;opacity:.85;margin-bottom:4px">📅 อาหารพร้อมเวลา</div>
      <div style="font-size:24px;font-weight:900">${new Date(order.scheduled_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</div>
      <div style="font-size:12px;opacity:.85;margin-top:4px">${new Date(order.scheduled_at).toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>` : '';

  // Queue position + ETA (only for ASAP pending orders)
  const queueInfo = !order.scheduled_at ? computeQueueInfo(order, window._allOrders || []) : null;
  const queueBanner = queueInfo ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;padding:12px;border-radius:12px;text-align:center">
        <div style="font-size:11px;opacity:.85;margin-bottom:2px">คิวของคุณ</div>
        <div style="font-size:26px;font-weight:900">#${queueInfo.position}</div>
      </div>
      <div style="background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#166534;padding:12px;border-radius:12px;text-align:center">
        <div style="font-size:11px;opacity:.85;margin-bottom:2px">รอประมาณ</div>
        <div style="font-size:26px;font-weight:900">~${queueInfo.etaMin}'</div>
      </div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon ${status==='cooking'?'cooking':''}" style="font-size:64px">${stat.icon}</div>
      <div class="status-title">${stat.custLabel}</div>
      <div class="status-sub">Order #${order.id.slice(-6)} · เวลา ${fmtTime(order.date)}</div>
      ${schedBanner}
      ${queueBanner}
      ${progressHtml}
      ${order.free_boxes_used ? `<div style="background:#dcfce7;color:#166534;padding:10px;border-radius:10px;margin-bottom:10px;font-weight:700">🎁 ได้ข้าวฟรี ${order.free_boxes_used} กล่อง · ลด ฿${order.discount}</div>` : ''}
      ${renderItemsHTML(order)}
    </div>
  `;
}

function renderCancelled(order) {
  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon" style="font-size:64px">❌</div>
      <div class="status-title" style="color:#dc2626">ออเดอร์ถูกยกเลิก</div>
      <div class="status-sub">Order #${order.id.slice(-6)}${order.cancel_reason && order.cancel_reason !== '—' ? ` · เหตุผล: ${order.cancel_reason}` : ''}</div>
      ${renderItemsHTML(order)}
      <a href="menu.html" class="btn btn-primary" style="margin-top:16px">สั่งใหม่</a>
    </div>
  `;
}

function renderItemsHTML(order) {
  return `
    <div class="order-summary">
      <div class="label">รายการอาหาร</div>
      ${order.items.map(it => `
        <div class="item-row">
          <span>${it.name} ×${it.qty}</span>
          <span>฿${it.price * it.qty}</span>
        </div>
      `).join('')}
      ${order.note ? `<div class="item-row" style="color:#0a1530;font-size:13px"><span>📝 ${order.note}</span><span></span></div>` : ''}
      <div class="item-row total-row">
        <span>รวม</span>
        <span>฿${order.total}</span>
      </div>
    </div>
  `;
}

function renderPending(order) {
  document.title = `⏳ กำลังทำ #${order.id.slice(-6)}`;
  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon cooking">👨‍🍳</div>
      <div class="status-title">กำลังทำอาหาร...</div>
      <div class="status-sub">ทางร้านได้รับ order แล้ว<br>หน้านี้จะ <b>เด้งเตือนอัตโนมัติ</b> เมื่ออาหารเสร็จ</div>

      <div class="order-id-box">
        <div class="label">หมายเลข Order</div>
        <div class="id">#${order.id.slice(-6)}</div>
        <div style="font-size:12px;color:#0a1530;margin-top:4px">เวลาสั่ง ${fmtTime(order.date)}</div>
      </div>

      <div class="keep-open-hint">
        💡 <b>เก็บหน้านี้ค้างไว้</b><br>
        จะมีเสียงเตือน + แจ้งสถานะเมื่ออาหารเสร็จ
      </div>

      <div class="share-row">
        <button onclick="copyLink()">🔗 Copy Link</button>
        <button onclick="shareLink()">📤 แชร์</button>
      </div>

      ${renderItemsHTML(order)}

      <a href="menu.html" class="btn btn-ghost" style="margin-top:16px">← กลับหน้าเมนู</a>
    </div>
  `;
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    alert('คัดลอกลิงก์แล้ว — ส่งให้คนอื่นเช็กสถานะได้');
  });
}
function shareLink() {
  if (navigator.share) {
    navigator.share({
      title: 'สถานะ order ครัวผู้ใหญ่ปอง',
      text: 'เช็กสถานะอาหารที่สั่ง',
      url: location.href
    }).catch(()=>{});
  } else {
    copyLink();
  }
}

function renderDone(order, db) {
  const customer = db.customers[order.customer_id];
  const points = customer?.points || 0;
  const lifetime = customer?.lifetime_points || 0;
  const DRINK_PT = 10, DISCOUNT_PT = 15;
  const canDrink = points >= DRINK_PT;
  const canDiscount = points >= DISCOUNT_PT;

  // Recent orders (last 5)
  const myOrders = (db.pendingOrders || [])
    .filter(o => o.customer_id === order.customer_id || o.customer_phone === order.customer_phone)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 5);

  // Recent orders chips
  const orderHistoryHTML = myOrders.map(o => {
    const isDone = ['delivered','done'].includes(o.status);
    const isCancelled = o.status === 'cancelled';
    const statusInfo = isCancelled ? { color:'#dc2626', icon:'❌', label:'ยกเลิก' }
                     : isDone      ? { color:'#16a34a', icon:'✅', label:'เสร็จ' }
                     : o.status === 'pending'    ? { color:'#f59e0b', icon:'⏳', label:'รอยืนยัน' }
                     : o.status === 'confirmed'  ? { color:'#1652F0', icon:'📋', label:'ยืนยันแล้ว' }
                     : o.status === 'cooking'    ? { color:'#f97316', icon:'👨‍🍳', label:'กำลังทำ' }
                     : o.status === 'ready'      ? { color:'#16a34a', icon:'📦', label:'พร้อมส่ง' }
                     : o.status === 'delivering' ? { color:'#06b6d4', icon:'🚚', label:'กำลังจัดส่ง' }
                     : { color:'#6b7280', icon:'•', label: o.status };
    const items = o.items.map(i => `${i.qty}× ${i.mainName || i.name}`).join(', ').slice(0, 50);
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f7f8fb;border-radius:10px;margin-bottom:6px;font-size:13px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:#0a1530;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${items}</div>
          <div style="font-size:11px;color:#5c6982;margin-top:2px">${fmtTime(o.date)} · <span style="background:${statusInfo.color};color:#fff;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700">${statusInfo.icon} ${statusInfo.label}</span></div>
        </div>
        <div style="font-weight:800;color:#1652F0;margin-left:10px">฿${o.total}</div>
      </div>
    `;
  }).join('');

  let rewardBanner = '';
  if (canDiscount) {
    rewardBanner = `<div class="reward-banner"><div class="big">🎁 ใช้ 15 แต้ม → ลด 50฿ ในคราวหน้า!</div><div style="font-size:13px;font-weight:500">หรือ 10 แต้ม → ฟรีเครื่องดื่ม</div></div>`;
  } else if (canDrink) {
    rewardBanner = `<div class="reward-banner"><div class="big">🥤 ใช้ 10 แต้ม → ฟรีเครื่องดื่ม!</div><div style="font-size:13px;font-weight:500">แจ้งทางร้านตอนสั่งคราวหน้า</div></div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon">✅</div>
      <div class="status-title">อาหารเสร็จแล้ว!</div>
      <div class="status-sub">ขอบคุณที่อุดหนุนครัวผู้ใหญ่ปอง</div>

      ${renderItemsHTML(order)}

      ${customer ? `
        <div style="margin-top:14px;padding:14px;background:linear-gradient(135deg,#1652F0,#0738C9);color:#fff;border-radius:14px;text-align:center">
          <div style="font-size:13px;opacity:.9">${customer.name}</div>
          <div style="font-size:36px;font-weight:900;margin:4px 0">${points} <span style="font-size:14px;opacity:.9">แต้ม</span></div>
          <div style="font-size:11px;opacity:.85">รวมตลอดที่ใช้บริการ ${lifetime} แต้ม</div>
        </div>
      ` : ''}
      ${rewardBanner}

      ${myOrders.length > 1 ? `
        <div style="margin-top:14px;text-align:left">
          <h3 style="font-size:14px;color:#0a1530;margin-bottom:8px">📦 ประวัติการสั่งซื้อ (5 รายการล่าสุด)</h3>
          ${orderHistoryHTML}
        </div>
      ` : ''}

      <a href="points.html?phone=${phone}" class="btn btn-success" style="margin-top:16px">⭐ ดูแต้มเต็ม + รางวัลที่แลกได้</a>
      <a href="menu.html" class="btn btn-ghost">สั่งเพิ่ม</a>
    </div>
  `;
}

render();
// Subscribe to real-time updates from cloud
whenCloudReady(() => {
  if (orderId) {
    window.cloud.onOrder(orderId, async order => {
      if (order) {
        cloudOrder = order;
        // Mirror to local
        const db = loadDB();
        const idx = (db.pendingOrders || []).findIndex(o => o.id === orderId);
        if (idx >= 0) db.pendingOrders[idx] = order;
        else { db.pendingOrders = db.pendingOrders || []; db.pendingOrders.push(order); }
        saveDB(db);
      }
      // also fetch customer for points display
      if (phone) {
        cloudCustomer = await window.cloud.getCustomer(phone);
        if (cloudCustomer) {
          const db = loadDB();
          db.customers[phone] = cloudCustomer;
          saveDB(db);
        }
      }
      render();
    });
    // Subscribe to ALL orders so we can compute queue position + ETA
    window.cloud.onOrders(orders => {
      window._allOrders = orders || [];
      render();
    });
  }
});
// Also poll local every 3s as fallback
setInterval(render, 3000);
</script>
</body>
</html>
