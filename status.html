<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>สถานะ order · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f3f4f6; color: #111827;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  button { font-family: inherit; cursor: pointer; }

  header {
    background: #ffffff; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #4F7AFF;
  }
  header img.logo { height: 48px; width: 48px; object-fit: contain; border-radius: 8px; }
  header .info { flex: 1; }
  header h1 { font-size: 17px; color: #1652F0; line-height: 1.2; }
  header .sub { font-size: 11px; color: #4F7AFF; margin-top: 2px; }

  main { flex: 1; padding: 20px 16px; max-width: 500px; width: 100%; margin: 0 auto; }

  .status-card {
    background: #fff; border-radius: 16px; padding: 32px 24px;
    text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.05);
  }
  .status-icon {
    font-size: 80px; margin-bottom: 16px; line-height: 1;
  }
  .status-icon.cooking {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .status-title {
    font-size: 22px; font-weight: 800; color: #1652F0; margin-bottom: 8px;
  }
  .status-sub {
    font-size: 14px; color: #6b7280; margin-bottom: 24px;
    line-height: 1.5;
  }
  .order-summary {
    background: #f9fafb; border-radius: 12px; padding: 16px;
    text-align: left; margin-bottom: 16px;
  }
  .order-summary .label {
    font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .order-summary .item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 14px;
    border-bottom: 1px dashed #e5e7eb;
  }
  .order-summary .item-row:last-child { border-bottom: none; }
  .order-summary .total-row {
    margin-top: 12px; padding-top: 12px; border-top: 2px solid #e5e7eb;
    font-weight: 800; color: #1652F0;
  }
  .order-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
  }
  .order-info .pill {
    background: #ebf0ff; padding: 10px; border-radius: 10px; text-align: center;
  }
  .order-info .pill .label { font-size: 11px; color: #4F7AFF; margin-bottom: 4px; }
  .order-info .pill .val { font-size: 14px; font-weight: 700; color: #1652F0; }

  .btn {
    width: 100%; padding: 14px; border-radius: 10px;
    font-size: 16px; font-weight: 700; border: none;
    margin-top: 8px;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-primary { background: #1652F0; color: #fff; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-ghost { background: transparent; color: #1652F0; border: 1px solid #1652F0; }

  .reward-banner {
    background: linear-gradient(135deg, #ebf0ff, #d1ddff);
    color: #0a1530; padding: 16px; border-radius: 12px; margin-top: 16px;
    text-align: center; font-weight: 700;
  }
  .reward-banner .big { font-size: 22px; margin-bottom: 4px; }

  .progress {
    background: #f3f4f6; border-radius: 8px; overflow: hidden;
    height: 24px; position: relative; margin: 12px 0;
  }
  .progress-bar {
    background: linear-gradient(90deg, #88a4ff, #1652F0);
    height: 100%; transition: width .4s;
  }
  .progress-text {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; color: #111827;
  }

  .footer-note {
    text-align: center; font-size: 12px; color: #9ca3af; padding: 16px;
  }
  .order-id-box {
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
    border-radius: 14px; padding: 14px;
    text-align: center; margin-bottom: 16px;
  }
  .order-id-box .label {
    font-size: 11px; color: #0a1530; letter-spacing: .04em; text-transform: uppercase;
  }
  .order-id-box .id {
    font-size: 32px; font-weight: 900; color: #1652F0; letter-spacing: .04em;
    font-family: -apple-system, monospace;
  }
  .share-row {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .share-row button {
    flex: 1; padding: 10px; border-radius: 10px;
    background: #fff; color: #0a1530; border: 2px solid #c5d3ff;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .share-row button:hover { background: #f7f8fb; border-color: #1652F0; }
  .keep-open-hint {
    background: #ebf0ff; color: #0a1530;
    padding: 12px 16px; border-radius: 10px; margin-bottom: 16px;
    font-size: 13px; line-height: 1.5; text-align: center;
  }
  .keep-open-hint b { font-weight: 700; }
  .ready-banner {
    background: linear-gradient(135deg, #16a34a, #15803d); color: #fff;
    padding: 18px; border-radius: 14px; margin-bottom: 16px;
    text-align: center; animation: pop 0.5s ease;
    box-shadow: 0 8px 24px rgba(22,163,74,.4);
  }
  .ready-banner .big { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .ready-banner .sub { font-size: 14px; opacity: .9; }
  @keyframes pop {
    0% { transform: scale(.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>

<header>
  <img class="logo" src="logo.jpg" alt="logo">
  <div class="info">
    <h1>สถานะ order</h1>
    <div class="sub">ครัวผู้ใหญ่ปอง</div>
  </div>
  <a href="tel:0619623696" style="background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;text-decoration:none;font-size:20px;box-shadow:0 3px 10px rgba(22,163,74,.3);flex-shrink:0">📞</a>
</header>

<main>
  <div id="content"></div>
</main>

<div class="footer-note">หน้านี้จะอัปเดตอัตโนมัติทุก 3 วินาที</div>

<script type="module" src="firebase.js?v=20260504i"></script>
<script src="offline-banner.js?v=20260504i"></script>
<script src="menu-data.js?v=20260504i"></script>
<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
const params = new URLSearchParams(location.search);
const orderId = params.get('order');
const phone = params.get('phone');
let cloudOrder = null;
let cloudCustomer = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], pendingOrders: [], settings: { goal: 20 } };
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const db = loadDB();
  // Prefer cloud order, fallback to local
  const order = cloudOrder || (db.pendingOrders || []).find(o => o.id === orderId);
  if (cloudCustomer && order) {
    db.customers[order.customer_id] = cloudCustomer;
  }
  const wrap = document.getElementById('content');

  if (!order) {
    wrap.innerHTML = `
      <div class="status-card">
        <div class="status-icon">❓</div>
        <div class="status-title">ไม่พบ order</div>
        <div class="status-sub">อาจเปลี่ยนเครื่องหรือล้าง browser ลองใหม่ที่หน้าเมนู</div>
        <a href="menu.html${phone?'?phone='+encodeURIComponent(phone):''}" class="btn btn-primary">กลับหน้าเมนู</a>
      </div>
    `;
    return;
  }

  const status = order.status || 'pending';
  if (status === 'cancelled') return renderCancelled(order);
  if (status === 'delivered' || status === 'done') return renderDone(order, db);
  return renderActive(order, status);
}

// Compute my queue position (count pending orders ahead with date < mine, excl scheduled)
function computeQueueInfo(order, allOrders) {
  if (order.status !== 'pending') return null;
  const myDate = new Date(order.date).getTime();
  // Pending orders ahead (older, not scheduled, not me)
  const ahead = (allOrders || []).filter(o =>
    o.id !== order.id &&
    o.status === 'pending' &&
    !o.scheduled_at &&
    new Date(o.date).getTime() < myDate
  );
  const myPos = ahead.length + 1;
  // ETA: 15 min base + 5 min per order ahead
  const etaMin = 15 + ahead.length * 5;
  return { position: myPos, etaMin };
}

function renderActive(order, status) {
  const stat = window.STATUSES[status] || window.STATUSES.pending;
  const stages = ['pending','confirmed','cooking','ready','delivering','delivered'];
  const currentIdx = stages.indexOf(status);
  const progressHtml = `
    <div style="display:flex;justify-content:space-between;margin-bottom:18px;position:relative">
      <div style="position:absolute;top:14px;left:14px;right:14px;height:3px;background:#e5e7eb;z-index:0"></div>
      <div style="position:absolute;top:14px;left:14px;height:3px;background:linear-gradient(90deg,#1652F0,#16a34a);z-index:1;width:calc(${(currentIdx/(stages.length-1))*100}% - 14px);transition:width .5s ease"></div>
      ${stages.map((s, i) => {
        const sStat = window.STATUSES[s];
        const isDone = i < currentIdx;
        const isCurrent = i === currentIdx;
        const bg = isCurrent ? sStat.color : isDone ? '#16a34a' : '#fff';
        const color = (isCurrent || isDone) ? '#fff' : '#9ca3af';
        const border = isDone || isCurrent ? sStat.color : '#e5e7eb';
        return `
          <div style="position:relative;z-index:2;text-align:center;flex:1">
            <div style="width:30px;height:30px;border-radius:50%;background:${bg};color:${color};border:2px solid ${border};display:grid;place-items:center;font-size:14px;margin:0 auto 4px;${isCurrent?'animation:pulse 1.5s ease-in-out infinite':''}">${isDone?'✓':sStat.icon}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // Scheduled time banner
  const schedBanner = order.scheduled_at ? `
    <div style="background:linear-gradient(135deg,#1652F0,#0738C9);color:#fff;padding:14px;border-radius:12px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;opacity:.85;margin-bottom:4px">📅 อาหารพร้อมเวลา</div>
      <div style="font-size:24px;font-weight:900">${new Date(order.scheduled_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</div>
      <div style="font-size:12px;opacity:.85;margin-top:4px">${new Date(order.scheduled_at).toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>` : '';

  // Queue position + ETA (only for ASAP pending orders)
  const queueInfo = !order.scheduled_at ? computeQueueInfo(order, window._allOrders || []) : null;
  const queueBanner = queueInfo ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;padding:12px;border-radius:12px;text-align:center">
        <div style="font-size:11px;opacity:.85;margin-bottom:2px">คิวของคุณ</div>
        <div style="font-size:26px;font-weight:900">#${queueInfo.position}</div>
      </div>
      <div style="background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#166534;padding:12px;border-radius:12px;text-align:center">
        <div style="font-size:11px;opacity:.85;margin-bottom:2px">รอประมาณ</div>
        <div style="font-size:26px;font-weight:900">~${queueInfo.etaMin}'</div>
      </div>
    </div>` : '';

  // 🛑 Cancel button — only available before kitchen confirms
  const cancelBtnHtml = (status === 'pending') ? `
    <button onclick="cancelMyOrder('${order.id}')" style="display:block;width:100%;margin-top:10px;padding:12px;background:#fff;color:#dc2626;border:1.5px solid #fecaca;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit">
      🛑 ยกเลิกออเดอร์นี้
    </button>
    <div style="font-size:11px;color:#9ca3af;text-align:center;margin-top:4px">ยกเลิกได้จนกว่าครัวจะยืนยัน</div>
  ` : '';

  // 💵 Payment instructions — show until delivered
  const paymentHtml = renderPaymentSection(order);

  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon ${status==='cooking'?'cooking':''}" style="font-size:64px">${stat.icon}</div>
      <div class="status-title">${stat.custLabel}</div>
      <div class="status-sub">Order #${order.id.slice(-6)} · เวลา ${fmtTime(order.date)}</div>
      ${schedBanner}
      ${queueBanner}
      ${progressHtml}
      ${order.free_boxes_used ? `<div style="background:#dcfce7;color:#166534;padding:10px;border-radius:10px;margin-bottom:10px;font-weight:700">🎁 ได้ข้าวฟรี ${order.free_boxes_used} กล่อง · ลด ฿${order.discount}</div>` : ''}
      ${renderItemsHTML(order)}
      ${paymentHtml}
      ${cancelBtnHtml}
    </div>
  `;
}

// 💵 Payment section — QR + bank info + COD note
function renderPaymentSection(order) {
  const isPaid = order.payment_status === 'paid';
  if (isPaid) {
    return `<div style="margin-top:14px;background:#dcfce7;border:1.5px solid #16a34a;color:#166534;padding:12px;border-radius:12px;text-align:center;font-weight:800">✅ ชำระเงินเรียบร้อยแล้ว</div>`;
  }
  const isCOD = order.order_type === 'delivery';
  // Try cloud paymentQrDataUrl first (admin-uploaded), fall back to repo file
  const qrSrc = (typeof cloudMenuConfig === 'object' && cloudMenuConfig?.paymentQrDataUrl)
    || 'payment-qr.jpg';
  return `
    <div style="margin-top:14px;background:#fff7ed;border:1.5px solid #fbbf24;border-radius:14px;padding:14px;text-align:center">
      <div style="font-weight:900;color:#92400e;font-size:15px;margin-bottom:6px">💵 วิธีชำระเงิน · ฿${order.total}</div>
      ${isCOD ? `
        <div style="background:#fff;border:1px dashed #fbbf24;padding:10px;border-radius:10px;font-size:13px;color:#78350f;margin-bottom:8px;line-height:1.6">
          🛵 <b>เก็บเงินปลายทาง (COD)</b><br>
          จ่ายให้พนักงานส่ง เมื่อรับอาหาร
        </div>
        <div style="font-size:12px;color:#92400e;margin-bottom:8px">หรือโอนล่วงหน้าผ่าน QR ด้านล่าง:</div>
      ` : `
        <div style="background:#fff;border:1px dashed #fbbf24;padding:8px;border-radius:10px;font-size:12.5px;color:#78350f;margin-bottom:8px">
          🏪 <b>รับที่ร้าน</b> — จ่ายเงินสด/QR ตอนรับของได้เลย
        </div>
      `}
      <img id="paymentQrImg" src="${qrSrc}" alt="QR Payment" onclick="openLightboxIfAvailable(this.src)" style="max-width:200px;width:100%;border-radius:10px;border:1px solid #fde68a;background:#fff;cursor:zoom-in" onerror="this.style.display='none'">
      <div style="font-size:11px;color:#92400e;margin-top:6px;line-height:1.5">
        📱 PromptPay · สแกนเพื่อชำระ ฿${order.total}<br>
        หลังโอน → โทรแจ้ง <a href="tel:0619623696" style="color:#1652F0;font-weight:700">061-962-3696</a>
      </div>
      <!-- 📥 Save QR — smart handler picks the right method per platform:
           iOS/Android → Web Share (lands in Photos via "Save to Photos"),
           Desktop → direct download to Downloads folder. -->
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap">
        <button onclick="saveQRtoGallery('${qrSrc}', ${order.total})" style="flex:1;min-width:140px;padding:11px 12px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit">📥 บันทึกในรูปภาพ</button>
        <button onclick="sharePaymentQR('${qrSrc}', ${order.total})" style="flex:1;min-width:120px;padding:11px 12px;background:#fff;color:#1652F0;border:1.5px solid #1652F0;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">📤 แชร์ไป LINE/อื่นๆ</button>
      </div>
      <div style="font-size:11px;color:#9ca3af;margin-top:6px;line-height:1.5">💡 บันทึกแล้วเปิดแอพธนาคาร → "สแกนรูปจากแกลเลอรี่" → จ่ายได้เลย</div>
    </div>
  `;
}

// 📥 SMART save — picks the right method per platform so the QR actually
// lands in the customer's photo library:
//   ─ iOS Safari: <a download> doesn't work, so we use Web Share API which
//     opens the iOS share sheet → user picks "Save to Photos" → done.
//   ─ Android Chrome: same, Web Share lands in Files → "Save Image".
//   ─ Desktop: Web Share isn't available, so fall through to direct download
//     into the Downloads folder.
// If Web Share fails or is cancelled, falls back to download as a safety net.
async function saveQRtoGallery(qrSrc, amount) {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  // On mobile: prefer Web Share (lands in Photos)
  if (isMobile && navigator.canShare) {
    try {
      const r = await fetch(qrSrc);
      const blob = await r.blob();
      const file = new File([blob], `payment-qr-${amount}.jpg`, { type: blob.type || 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: `QR ชำระเงิน ฿${amount}`,
          text: 'กด "Save to Photos" เพื่อบันทึกลงรูปภาพ → เปิดแอพธนาคาร → สแกนจากแกลเลอรี่',
        });
        // Subtle hint in case the user wasn't sure what to pick
        showStatusChangeToast('💡 เลือก "Save to Photos"', 'หรือส่งให้ตัวเองทาง LINE / Note');
        return;
      }
    } catch (e) {
      if (e.name === 'AbortError') return;   // user cancelled, don't fall through
      // any other error → fall through to download
    }
  }
  // Desktop or Web Share unavailable: regular download
  await downloadPaymentQR(qrSrc, amount);
}
window.saveQRtoGallery = saveQRtoGallery;

// 📥 Download the QR image — works for both data URLs (cloud-uploaded) and
// regular file URLs (payment-qr.jpg). Forces a download via a temporary <a>.
async function downloadPaymentQR(qrSrc, amount) {
  try {
    let blobUrl = qrSrc;
    let isObjectUrl = false;
    // If it's a regular URL, fetch + blob so the download attribute works
    // cross-origin / on iOS Safari.
    if (!qrSrc.startsWith('data:')) {
      const r = await fetch(qrSrc);
      const blob = await r.blob();
      blobUrl = URL.createObjectURL(blob);
      isObjectUrl = true;
    }
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = `payment-qr-${amount}฿.jpg`;
    document.body.appendChild(a); a.click(); a.remove();
    if (isObjectUrl) setTimeout(() => URL.revokeObjectURL(blobUrl), 1500);
    showStatusChangeToast('✅ บันทึก QR แล้ว', 'เปิดแอพธนาคาร → สแกนรูปจากแกลเลอรี่ → จ่ายได้เลย');
  } catch (e) {
    // iOS Safari: download attribute often ignored — open in new tab so user
    // can long-press → "Add to Photos"
    window.open(qrSrc, '_blank');
    setTimeout(() => alert('💡 ใช้นิ้วกดค้างที่รูป → "บันทึกในรูปภาพ"'), 300);
  }
}

// 📤 Share QR via native share sheet (best UX on mobile — opens iOS / Android
// share menu so customer can pick "Save to Photos", "Send to bank app", etc.)
async function sharePaymentQR(qrSrc, amount) {
  try {
    let file = null;
    if (navigator.canShare) {
      const r = await fetch(qrSrc);
      const blob = await r.blob();
      file = new File([blob], `payment-qr-${amount}.jpg`, { type: blob.type || 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: `ชำระเงิน ฿${amount} · ครัวผู้ใหญ่ปอง`,
          text: `QR ชำระเงินสำหรับออเดอร์ของคุณ ฿${amount}`,
        });
        return;
      }
    }
    // Fallback: text-only share with link
    if (navigator.share) {
      await navigator.share({
        title: `ชำระเงิน ฿${amount} · ครัวผู้ใหญ่ปอง`,
        url: location.href,
      });
      return;
    }
    // Final fallback: just download
    downloadPaymentQR(qrSrc, amount);
  } catch (e) {
    if (e.name !== 'AbortError') downloadPaymentQR(qrSrc, amount);
  }
}

// Use the existing lightbox if menu.html-style one exists, else open in new tab
function openLightboxIfAvailable(src) {
  if (typeof window.openLightbox === 'function') window.openLightbox(src);
  else window.open(src, '_blank');
}

window.downloadPaymentQR = downloadPaymentQR;
window.sharePaymentQR = sharePaymentQR;
window.openLightboxIfAvailable = openLightboxIfAvailable;

// 🛑 Customer-initiated cancel — only allowed while pending
async function cancelMyOrder(orderId) {
  if (!confirm('🛑 ยืนยันยกเลิกออเดอร์นี้?\n\n• ครัวจะถูกแจ้งทันที\n• ถ้าจ่ายเงินไปแล้ว ติดต่อ 061-962-3696 เพื่อรับเงินคืน\n\nกด OK เพื่อยกเลิก')) return;
  const reason = prompt('เหตุผล (ไม่บังคับ):', '') || 'ลูกค้ายกเลิกเอง';
  try {
    if (window.cloud?.cancelOrderByCustomer) {
      const ok = await window.cloud.cancelOrderByCustomer(orderId, reason);
      if (ok) {
        alert('✅ ยกเลิกออเดอร์เรียบร้อย');
        // Status snapshot will re-render automatically
      } else {
        alert('⚠️ ยกเลิกไม่สำเร็จ — โทร 061-962-3696');
      }
    }
  } catch (e) {
    alert('⚠️ มีปัญหา — โทร 061-962-3696');
  }
}
window.cancelMyOrder = cancelMyOrder;

    .filter(o => o.customer_id === order.customer_id || o.customer_phone === order.customer_phone)
    .sort((a, b) => new Date(b.date) - new Date(a.date))

    const isDone = ['delivered','done'].includes(o.status);

                     : o.status === 'ready'      ? { color:'#16a34a', icon:'📦', label:'พร้อมส่ง' }
                     : o.status === 'delivering' ? { color:'#06b6d4', icon:'🚚', label:'กำลังจัดส่ง' }

    return `
      <div onclick="openReorderModalStatus('${o.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f7f8fb;border-radius:10px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .15s" onmouseenter="this.style.background='#ebf0ff'" onmouseleave="this.style.background='#f7f8fb'">

// 🔔 Web push + audible alert when order status changes.
// Browser permission must be granted (asked on first page load if pending).
let _lastSeenStatus = null;
function maybeNotifyStatusChange(prev, next, order) {
  if (!next || prev === next) return;
  // Skip the initial render (no prev → no transition)
  if (prev == null) return;
  const map = {
    confirmed:  { title: '📋 ครัวยืนยันแล้ว!',     body: 'เริ่มเตรียมอาหารของคุณ',           icon: '📋' },
    cooking:    { title: '👨‍🍳 กำลังทำอาหาร',       body: 'ครัวเริ่มทำแล้ว — รออีกสักครู่',       icon: '👨‍🍳' },
    ready:      { title: '📦 อาหารพร้อมแล้ว!',      body: order.order_type === 'delivery' ? 'รอขนส่งมารับ' : 'มารับที่ร้านได้เลย', icon: '📦' },
    delivering: { title: '🛵 กำลังจัดส่ง',           body: 'อาหารออกจากร้านแล้ว · เตรียมรับ',     icon: '🛵' },
    delivered:  { title: '✅ ส่งสำเร็จ — ขอบคุณ!',  body: 'แต้มสะสมเข้าบัญชีแล้ว',              icon: '✅' },
    cancelled:  { title: '❌ ออเดอร์ถูกยกเลิก',    body: order.cancel_reason || 'ติดต่อร้านสำหรับรายละเอียด', icon: '❌' },
  };
  const n = map[next];
  if (!n) return;

  // 1. Browser notification (works on Android Chrome / desktop; iOS Safari only when in PWA)
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      const notif = new Notification(n.title, {
        body: n.body,
        icon: 'logo.jpg',
        badge: 'logo.jpg',
        tag: 'order-' + order.id,
        renotify: true,
      });
      notif.onclick = () => { window.focus(); notif.close(); };
    } catch (e) {}
  }

  // 2. Audible beep (works everywhere) — short pleasant chord
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.001, ctx.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + i * 0.12 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.4);
    });
  } catch (e) {}

  // 3. Vibrate (mobile)
  if ('vibrate' in navigator) try { navigator.vibrate([200, 80, 200]); } catch (e) {}

  // 4. Toast banner inside the page
  showStatusChangeToast(n.title, n.body);
}

function showStatusChangeToast(title, body) {
  let t = document.getElementById('statusChangeToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'statusChangeToast';
    t.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-200%);z-index:9999;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:14px 18px;border-radius:14px;box-shadow:0 8px 24px rgba(22,163,74,.4);font-family:inherit;font-size:14px;font-weight:700;line-height:1.4;text-align:center;max-width:90vw;transition:transform .35s ease';
    document.body.appendChild(t);
  }
  t.innerHTML = `<div style="font-size:15px">${title}</div><div style="font-size:12px;opacity:.92;margin-top:2px;font-weight:500">${body}</div>`;
  // Slide in
  requestAnimationFrame(() => { t.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(-200%)'; }, 5000);
}

// 🔔 Ask for notification permission on first visit (only for active orders).
// Don't be pushy — only ask once, only when there's actually an order to track.
function maybeAskNotificationPermission(order) {
  if (!order || ['delivered','done','cancelled'].includes(order.status)) return;
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;     // already asked
  if (sessionStorage.getItem('notifAsked')) return;
  sessionStorage.setItem('notifAsked', '1');
  // Show a friendly inline prompt instead of jumping to the browser dialog
  const banner = document.createElement('div');
  banner.id = 'notifPrompt';
  banner.style.cssText = 'position:fixed;bottom:14px;left:14px;right:14px;z-index:200;background:linear-gradient(135deg,#1652F0,#0738C9);color:#fff;padding:14px 16px;border-radius:14px;box-shadow:0 8px 24px rgba(22,82,240,.35);display:flex;align-items:center;gap:12px;font-family:inherit;max-width:520px;margin:0 auto';
  banner.innerHTML = `
    <div style="font-size:28px;flex-shrink:0">🔔</div>
    <div style="flex:1;font-size:13px;line-height:1.4">
      <div style="font-weight:800">เปิดแจ้งเตือน?</div>
      <div style="opacity:.92;font-size:12px">รับแจ้งทันทีเมื่อครัวเริ่มทำ / อาหารพร้อม</div>
    </div>
    <button onclick="enableNotifications()" style="background:#fff;color:#1652F0;border:none;padding:8px 14px;border-radius:999px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0">เปิด</button>
    <button onclick="document.getElementById('notifPrompt').remove()" style="background:rgba(255,255,255,.2);color:#fff;border:none;padding:8px 10px;border-radius:999px;font-size:14px;cursor:pointer;font-family:inherit;flex-shrink:0">×</button>
  `;
  document.body.appendChild(banner);
}
async function enableNotifications() {
  document.getElementById('notifPrompt')?.remove();
  if (!('Notification' in window)) return;
  try {
    const result = await Notification.requestPermission();
    if (result === 'granted') {
      try {
        new Notification('🔔 พร้อมรับการแจ้งเตือนแล้ว', { body: 'เราจะแจ้งเมื่อสถานะออเดอร์เปลี่ยน', icon: 'logo.jpg' });
      } catch (e) {}
    }
  } catch (e) {}
}
window.enableNotifications = enableNotifications;

// Subscribe to real-time updates from cloud
whenCloudReady(() => {
  if (orderId) {
    window.cloud.onOrder(orderId, async order => {
      if (order) {
        const prevStatus = _lastSeenStatus;
        cloudOrder = order;
        // Mirror to local
        const db = loadDB();
        const idx = (db.pendingOrders || []).findIndex(o => o.id === orderId);
        if (idx >= 0) db.pendingOrders[idx] = order;
        else { db.pendingOrders = db.pendingOrders || []; db.pendingOrders.push(order); }
        saveDB(db);
        // 🔔 Fire notification on status transition
        maybeNotifyStatusChange(prevStatus, order.status, order);
        _lastSeenStatus = order.status;
        // Ask permission on first paint of an active order
        maybeAskNotificationPermission(order);
      }
      // also fetch customer for points display
      if (phone) {
        cloudCustomer = await window.cloud.getCustomer(phone);
        if (cloudCustomer) {
          const db = loadDB();
          db.customers[phone] = cloudCustomer;
          saveDB(db);
        }
      }
      render();
    });
    // Subscribe to ALL orders so we can compute queue position + ETA
    window.cloud.onOrders(orders => {
      window._allOrders = orders || [];
      render();
    });
  }
});
// Also poll local every 3s as fallback
setInterval(render, 3000);

        <button onclick="reorderAndGoStatus('${order.id}')" style="display:block;width:100%;text-align:center;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:14px;border-radius:12px;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:inherit">

  if (m) m.style.display = 'none';

// 🚀 Reorder hand-off via sessionStorage (same approach as points.html)
function reorderAndGoStatus(orderId) {
  const orders = window._allOrders || (loadDB().pendingOrders || []);
  const order = orders.find(o => o.id === orderId);
  if (!order) return alert('ไม่พบออเดอร์นี้ — โทร 061-962-3696');
  try {
    sessionStorage.setItem('pendingReorder', JSON.stringify({
      order,
      handedOffAt: Date.now(),
    }));
  } catch (e) {}
  location.href = `menu.html?phone=${encodeURIComponent(phone)}&reorder=${encodeURIComponent(orderId)}`;
}
window.reorderAndGoStatus = reorderAndGoStatus;
window.openReorderModalStatus = openReorderModalStatus;
window.closeReorderModalStatus = closeReorderModalStatus;

const PDPA_VERSION = window.PDPA_POLICY_VERSION || '1.1';
function maybeShowPdpaBanner() {

    if (c && c.version === PDPA_VERSION) return;
  } catch (e) {}

function isPdpaRejected() {
  try { const c = JSON.parse(localStorage.getItem('pdpa_consent') || 'null'); return c && c.version === PDPA_VERSION && c.accepted === false; } catch (e) { return false; }
}
async function acceptPdpa(accepted) {
  const consent = { version: PDPA_VERSION, accepted: !!accepted, accepted_at: new Date().toISOString(), user_agent: navigator.userAgent, language: navigator.language };
  localStorage.setItem('pdpa_consent', JSON.stringify(consent));
  document.getElementById('pdpaBanner').style.display = 'none';
  whenCloudReady(async () => {
    try {
      await window.cloud.saveConsentLog?.({
        type: 'cookies_and_privacy', customer_id: phone || 'anon', customer_phone: phone || null,
        version: PDPA_VERSION, accepted: !!accepted,
        details: { source: 'cookie_banner_status', user_agent: navigator.userAgent.slice(0, 200) },
      });
    } catch (e) {}
  });
  refreshPdpaReopener();
}
function refreshPdpaReopener() {
  let btn = document.getElementById('pdpaReopen');
  if (isPdpaRejected()) {
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'pdpaReopen';
      btn.onclick = () => { document.getElementById('pdpaBanner').style.display = 'block'; };
      btn.innerHTML = '🔒 ตั้งค่าความเป็นส่วนตัว';
      btn.style.cssText = 'position:fixed;bottom:14px;left:14px;z-index:80;background:#0a1530;color:#fff;border:1.5px solid #fbbf24;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.3)';
      document.body.appendChild(btn);
    }
  } else if (btn) { btn.remove(); }
}
window.acceptPdpa = acceptPdpa;
window.isPdpaRejected = isPdpaRejected;
window.refreshPdpaReopener = refreshPdpaReopener;
window.addEventListener('load', () => setTimeout(() => { maybeShowPdpaBanner(); refreshPdpaReopener(); }, 800));
</script>
