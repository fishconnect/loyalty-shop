<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#fdfaf2">
<title>สถานะ order · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f3f4f6; color: #111827;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  button { font-family: inherit; cursor: pointer; }

  header {
    background: #fdfaf2; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #5a8059;
  }
  header img.logo { height: 48px; width: 48px; object-fit: contain; border-radius: 8px; }
  header .info { flex: 1; }
  header h1 { font-size: 17px; color: #3d5e3d; line-height: 1.2; }
  header .sub { font-size: 11px; color: #5a8059; margin-top: 2px; }

  main { flex: 1; padding: 20px 16px; max-width: 500px; width: 100%; margin: 0 auto; }

  .status-card {
    background: #fff; border-radius: 16px; padding: 32px 24px;
    text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.05);
  }
  .status-icon {
    font-size: 80px; margin-bottom: 16px; line-height: 1;
  }
  .status-icon.cooking {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .status-title {
    font-size: 22px; font-weight: 800; color: #3d5e3d; margin-bottom: 8px;
  }
  .status-sub {
    font-size: 14px; color: #6b7280; margin-bottom: 24px;
    line-height: 1.5;
  }
  .order-summary {
    background: #f9fafb; border-radius: 12px; padding: 16px;
    text-align: left; margin-bottom: 16px;
  }
  .order-summary .label {
    font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .order-summary .item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 14px;
    border-bottom: 1px dashed #e5e7eb;
  }
  .order-summary .item-row:last-child { border-bottom: none; }
  .order-summary .total-row {
    margin-top: 12px; padding-top: 12px; border-top: 2px solid #e5e7eb;
    font-weight: 800; color: #3d5e3d;
  }
  .order-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
  }
  .order-info .pill {
    background: #f0f7ed; padding: 10px; border-radius: 10px; text-align: center;
  }
  .order-info .pill .label { font-size: 11px; color: #5a8059; margin-bottom: 4px; }
  .order-info .pill .val { font-size: 14px; font-weight: 700; color: #3d5e3d; }

  .btn {
    width: 100%; padding: 14px; border-radius: 10px;
    font-size: 16px; font-weight: 700; border: none;
    margin-top: 8px;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-primary { background: #3d5e3d; color: #fff; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-ghost { background: transparent; color: #3d5e3d; border: 1px solid #3d5e3d; }

  .reward-banner {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e; padding: 16px; border-radius: 12px; margin-top: 16px;
    text-align: center; font-weight: 700;
  }
  .reward-banner .big { font-size: 22px; margin-bottom: 4px; }

  .progress {
    background: #f3f4f6; border-radius: 8px; overflow: hidden;
    height: 24px; position: relative; margin: 12px 0;
  }
  .progress-bar {
    background: linear-gradient(90deg, #7ab87a, #3d5e3d);
    height: 100%; transition: width .4s;
  }
  .progress-text {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; color: #111827;
  }

  .footer-note {
    text-align: center; font-size: 12px; color: #9ca3af; padding: 16px;
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.jpg" alt="logo">
  <div class="info">
    <h1>สถานะ order</h1>
    <div class="sub">ครัวผู้ใหญ่ปอง</div>
  </div>
</header>

<main>
  <div id="content"></div>
</main>

<div class="footer-note">หน้านี้จะอัปเดตอัตโนมัติทุก 3 วินาที</div>

<script type="module" src="firebase.js"></script>
<script src="menu-data.js"></script>
<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
const params = new URLSearchParams(location.search);
const orderId = params.get('order');
const phone = params.get('phone');
let cloudOrder = null;
let cloudCustomer = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], pendingOrders: [], settings: { goal: 20 } };
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const db = loadDB();
  // Prefer cloud order, fallback to local
  const order = cloudOrder || (db.pendingOrders || []).find(o => o.id === orderId);
  if (cloudCustomer && order) {
    db.customers[order.customer_id] = cloudCustomer;
  }
  const wrap = document.getElementById('content');

  if (!order) {
    wrap.innerHTML = `
      <div class="status-card">
        <div class="status-icon">❓</div>
        <div class="status-title">ไม่พบ order</div>
        <div class="status-sub">อาจเปลี่ยนเครื่องหรือล้าง browser ลองใหม่ที่หน้าเมนู</div>
        <a href="menu.html" class="btn btn-primary">กลับหน้าเมนู</a>
      </div>
    `;
    return;
  }

  if (order.status === 'pending') {
    renderPending(order);
  } else if (order.status === 'done') {
    renderDone(order, db);
  }
}

function renderItemsHTML(order) {
  return `
    <div class="order-summary">
      <div class="label">รายการอาหาร</div>
      ${order.items.map(it => `
        <div class="item-row">
          <span>${it.name} ×${it.qty}</span>
          <span>฿${it.price * it.qty}</span>
        </div>
      `).join('')}
      ${order.note ? `<div class="item-row" style="color:#92400e;font-size:13px"><span>📝 ${order.note}</span><span></span></div>` : ''}
      <div class="item-row total-row">
        <span>รวม</span>
        <span>฿${order.total}</span>
      </div>
    </div>
  `;
}

function renderPending(order) {
  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon cooking">👨‍🍳</div>
      <div class="status-title">กำลังทำอาหาร...</div>
      <div class="status-sub">ทางร้านได้รับ order แล้ว<br>กรุณารอที่ร้านสักครู่</div>

      <div class="order-info">
        <div class="pill">
          <div class="label">หมายเลข Order</div>
          <div class="val">#${order.id.slice(-6)}</div>
        </div>
        <div class="pill">
          <div class="label">เวลาสั่ง</div>
          <div class="val">${fmtTime(order.date)}</div>
        </div>
      </div>

      ${renderItemsHTML(order)}
    </div>
  `;
}

function renderDone(order, db) {
  const customer = db.customers[order.customer_id];
  const goal = db.settings.goal || 20;
  let rewardBanner = '';
  let progress = '';

  if (customer) {
    const rewards = Math.floor(customer.total_boxes / goal) - customer.redeemed_count;
    const inProgress = customer.total_boxes % goal;
    progress = `
      <div style="margin-top:16px;text-align:left">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#374151">
          <span><b>${customer.name}</b></span>
          <span>${customer.total_boxes}/${goal} กล่อง</span>
        </div>
        <div class="progress">
          <div class="progress-bar" style="width:${(inProgress/goal)*100}%"></div>
          <div class="progress-text">${inProgress} / ${goal} กล่อง</div>
        </div>
      </div>
    `;
    if (rewards > 0) {
      rewardBanner = `
        <div class="reward-banner">
          <div class="big">🎁 คุณได้สิทธิ์ฟรี ${rewards} กล่อง!</div>
          <div style="font-size:13px;font-weight:500">แจ้งทางร้านเพื่อขอแลก</div>
        </div>
      `;
    }
  }

  document.getElementById('content').innerHTML = `
    <div class="status-card">
      <div class="status-icon">✅</div>
      <div class="status-title">อาหารเสร็จแล้ว!</div>
      <div class="status-sub">ขอบคุณที่อุดหนุนครัวผู้ใหญ่ปอง 🙏</div>

      ${renderItemsHTML(order)}
      ${progress}
      ${rewardBanner}

      <a href="index.html?phone=${phone}" class="btn btn-success" style="margin-top:16px">⭐ ดูแต้มสะสม</a>
      <a href="menu.html" class="btn btn-ghost">สั่งเพิ่ม</a>
    </div>
  `;
}

render();
// Subscribe to real-time updates from cloud
whenCloudReady(() => {
  if (orderId) {
    window.cloud.onOrder(orderId, async order => {
      if (order) {
        cloudOrder = order;
        // Mirror to local
        const db = loadDB();
        const idx = (db.pendingOrders || []).findIndex(o => o.id === orderId);
        if (idx >= 0) db.pendingOrders[idx] = order;
        else { db.pendingOrders = db.pendingOrders || []; db.pendingOrders.push(order); }
        saveDB(db);
      }
      // also fetch customer for points display
      if (phone) {
        cloudCustomer = await window.cloud.getCustomer(phone);
        if (cloudCustomer) {
          const db = loadDB();
          db.customers[phone] = cloudCustomer;
          saveDB(db);
        }
      }
      render();
    });
  }
});
// Also poll local every 3s as fallback
setInterval(render, 3000);
</script>
</body>
</html>
