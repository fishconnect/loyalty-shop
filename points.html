<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>แต้มสะสมของฉัน · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f7f8fb; color: #1f2937;
    min-height: 100vh;
  }
  button, a { font-family: inherit; cursor: pointer; }

  /* Header */
  header {
    background: #ffffff;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #4F7AFF;
    position: sticky; top: 0; z-index: 10;
  }
  header img.logo { height: 48px; width: 48px; object-fit: contain; border-radius: 10px; }
  header .info { flex: 1; }
  header h1 { font-size: 17px; color: #1652F0; font-weight: 800; line-height: 1.2; }
  header .sub { font-size: 11px; color: #4F7AFF; margin-top: 2px; font-weight: 600; }

  main { padding: 20px 16px 80px; max-width: 500px; margin: 0 auto; }

  /* Lookup card (when no phone) */
  .lookup-card {
    background: #fff; border-radius: 16px; padding: 24px;
    text-align: center; box-shadow: 0 4px 16px rgba(22,82,240,.08);
  }
  .lookup-card .icon { font-size: 56px; margin-bottom: 12px; }
  .lookup-card h2 { font-size: 18px; color: #0a1530; margin-bottom: 4px; }
  .lookup-card p { font-size: 13px; color: #5c6982; margin-bottom: 16px; }
  .lookup-card input {
    width: 100%; padding: 14px; font-size: 16px;
    border: 2px solid #d1ddff; border-radius: 12px; background: #f7f8fb;
    margin-bottom: 12px; font-family: inherit; text-align: center;
    letter-spacing: .04em;
  }
  .lookup-card input:focus { outline: none; border-color: #1652F0; background: #fff; }
  .lookup-card button {
    width: 100%; padding: 14px; border-radius: 12px;
    background: linear-gradient(135deg, #4F7AFF, #1652F0); color: #fff;
    border: none; font-size: 16px; font-weight: 800;
    box-shadow: 0 4px 14px rgba(22,82,240,.3);
  }

  /* Hero card with points */
  .hero-card {
    background: linear-gradient(135deg, #1652F0, #0738C9);
    color: #fff;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 8px 24px rgba(22,82,240,.25);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: ""; position: absolute; top: -30px; right: -30px;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,.08);
  }
  .hero-card::after {
    content: ""; position: absolute; bottom: -50px; left: -30px;
    width: 100px; height: 100px; border-radius: 50%;
    background: rgba(255,255,255,.05);
  }
  .hero-card .greeting {
    font-size: 13px; opacity: .85; margin-bottom: 4px; position: relative;
  }
  .hero-card .name {
    font-size: 24px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; position: relative;
  }
  .hero-card .points-row {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; position: relative;
  }
  .hero-card .num { font-size: 56px; font-weight: 900; line-height: 1; }
  .hero-card .of { font-size: 22px; opacity: .7; font-weight: 700; }
  .hero-card .lbl { font-size: 14px; opacity: .85; margin-bottom: 14px; position: relative; }

  .progress {
    background: rgba(255,255,255,.18); border-radius: 999px; overflow: hidden;
    height: 12px; position: relative;
  }
  .progress-bar {
    background: #fff; height: 100%; border-radius: 999px;
    transition: width .6s ease;
  }
  .hero-card .next {
    margin-top: 10px; font-size: 13px; opacity: .85; position: relative;
  }

  /* Reward banner */
  .reward-banner {
    background: linear-gradient(135deg, #16a34a, #15803d); color: #fff;
    padding: 18px 20px; border-radius: 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 6px 20px rgba(22,163,74,.3);
    animation: pop 0.5s ease;
  }
  .reward-banner .icon { font-size: 36px; flex-shrink: 0; }
  .reward-banner .text { flex: 1; }
  .reward-banner .text .big { font-size: 18px; font-weight: 800; line-height: 1.2; }
  .reward-banner .text .sub { font-size: 13px; opacity: .9; margin-top: 2px; }
  @keyframes pop {
    0% { transform: scale(.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Stats grid */
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: #fff; padding: 14px; border-radius: 14px;
    text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.04);
  }
  .stat-box .num { font-size: 24px; font-weight: 900; color: #1652F0; }
  .stat-box .lbl { font-size: 12px; color: #5c6982; margin-top: 4px; }

  /* History card */
  .card {
    background: #fff; border-radius: 16px; padding: 18px;
    margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.04);
  }
  .card h3 {
    font-size: 14px; font-weight: 800; color: #0a1530;
    margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .order-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px dashed #e2e7ef;
    font-size: 14px;
  }
  .order-row:last-child { border-bottom: none; }
  .order-row .left { flex: 1; min-width: 0; }
  .order-row .name { font-weight: 600; color: #1f2a44; }
  .order-row .meta { font-size: 11.5px; color: #5c6982; margin-top: 2px; }
  .order-row .price { font-weight: 700; color: #1652F0; }
  .order-row .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 700;
  }
  .badge-pending { background: #ebf0ff; color: #1652F0; }
  .badge-done { background: #dcfce7; color: #166534; }

  /* Action buttons */
  .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .btn {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 15px; font-weight: 700; border: none;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-primary {
    background: linear-gradient(135deg, #4F7AFF, #1652F0); color: #fff;
    box-shadow: 0 4px 14px rgba(22,82,240,.25);
  }
  .btn-ghost {
    background: #fff; color: #1652F0; border: 1.5px solid #1652F0;
  }

  .empty {
    text-align: center; color: #9ca3af; padding: 24px;
    font-size: 13px;
  }
  .err-bar {
    background: #fee2e2; color: #991b1b; padding: 12px 14px;
    border-radius: 10px; margin-bottom: 16px; font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.jpg" alt="logo">
  <div class="info">
    <h1>แต้มสะสมของฉัน</h1>
    <div class="sub">ครัวผู้ใหญ่ปอง</div>
  </div>
  <a href="tel:0619623696" style="background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;text-decoration:none;font-size:20px;box-shadow:0 3px 10px rgba(22,163,74,.3);flex-shrink:0">📞</a>
</header>

<main id="main"></main>

<script type="module" src="firebase.js"></script>
<script src="menu-data.js"></script>
<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
const params = new URLSearchParams(location.search);
let phone = (params.get('phone') || '').replace(/\D/g, '');
const GOAL = 20;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { customers: {}, orders: [], pendingOrders: [], settings: { goal: 20 } };
}
function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('th-TH', { day:'numeric', month:'short' }) + ' ' +
         d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function renderLookup(errMsg) {
  document.getElementById('main').innerHTML = `
    <div class="lookup-card">
      <div class="icon">⭐</div>
      <h2>ดูแต้มสะสมของคุณ</h2>
      <p>กรอกเบอร์โทรที่ใช้สั่งอาหาร</p>
      ${errMsg ? `<div class="err-bar">${errMsg}</div>` : ''}
      <input type="tel" id="phoneInput" placeholder="0812345678" inputmode="numeric" autofocus>
      <button onclick="doLookup()">ดูแต้ม</button>
      <a href="menu.html" style="display:inline-block;margin-top:14px;color:#5c6982;font-size:13px;text-decoration:none">← กลับหน้าเมนู</a>
    </div>
  `;
  setTimeout(() => {
    const inp = document.getElementById('phoneInput');
    if (inp) {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });
    }
  }, 0);
}

function doLookup() {
  const v = document.getElementById('phoneInput').value.replace(/\D/g, '');
  if (v.length < 9) return alert('กรุณากรอกเบอร์ให้ครบ');
  // Save phone for next visit
  localStorage.setItem('lastCustomerPhone', v);
  // Reload with phone param
  location.href = 'points.html?phone=' + v;
}

function renderCustomer(customer, allOrders) {
  const points = customer.points || 0;
  const lifetime = customer.lifetime_points || 0;
  // Two-tier rewards: 10 = drink, 15 = discount 50
  const DRINK_PT = (window.LOYALTY?.REWARD_DRINK_POINTS) || 10;
  const DISCOUNT_PT = (window.LOYALTY?.REWARD_DISCOUNT_POINTS) || 15;
  const canDrink = points >= DRINK_PT;
  const canDiscount = points >= DISCOUNT_PT;

  // Progress bar shows path to next available reward
  const nextGoal = canDiscount ? DISCOUNT_PT : (canDrink ? DISCOUNT_PT : DRINK_PT);
  const pct = Math.min(100, (points / nextGoal) * 100);

  // Filter customer's orders
  const myOrders = allOrders
    .filter(o => o.customer_phone === phone || o.customer_id === phone)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 8);

  const totalSpent = allOrders
    .filter(o => (o.customer_phone === phone || o.customer_id === phone) && (o.status === 'done' || o.status === 'delivered'))
    .reduce((s, o) => s + (o.total || 0), 0);

  let rewardBanner = '';
  if (canDiscount) {
    rewardBanner = `
      <div class="reward-banner">
        <div class="icon">🎁</div>
        <div class="text">
          <div class="big">ใช้ 15 แต้ม → ลด 50฿ ได้!</div>
          <div class="sub">หรือใช้ 10 แต้ม → ฟรีเครื่องดื่ม · แจ้งร้านตอนสั่งอาหาร</div>
        </div>
      </div>
    `;
  } else if (canDrink) {
    rewardBanner = `
      <div class="reward-banner">
        <div class="icon">🥤</div>
        <div class="text">
          <div class="big">ใช้ 10 แต้ม → ฟรีเครื่องดื่ม 1 แก้ว!</div>
          <div class="sub">ชานมไข่มุก / น้ำอัดลม · แจ้งร้านตอนสั่งอาหาร</div>
        </div>
      </div>
    `;
  }

  const greetingTime = new Date().getHours();
  const greeting = greetingTime < 12 ? 'อรุณสวัสดิ์' : greetingTime < 18 ? 'สวัสดี' : 'สวัสดีตอนเย็น';

  const nextLabel = canDiscount ? '🎉 ใช้ลด 50฿ ได้แล้ว!'
                  : canDrink    ? `อีก ${DISCOUNT_PT - points} แต้ม → ลด 50฿`
                                : `อีก ${DRINK_PT - points} แต้ม → ฟรีเครื่องดื่ม`;

  document.getElementById('main').innerHTML = `
    <div class="hero-card">
      <!-- Profile row: avatar + greeting/name + edit button -->
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;position:relative">
        <div id="profilePhotoWrap" style="position:relative;flex-shrink:0">
          ${customer.photo
            ? `<img src="${customer.photo}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2.5px solid rgba(255,255,255,.95);box-shadow:0 3px 10px rgba(0,0,0,.2)">`
            : `<div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;display:grid;place-items:center;font-size:28px;font-weight:900;border:2.5px solid rgba(255,255,255,.95);backdrop-filter:blur(4px)">${(customer.name || '?').slice(0, 1)}</div>`}
          <button onclick="document.getElementById('profilePhotoInput').click()" aria-label="เปลี่ยนรูป" style="position:absolute;bottom:-2px;right:-2px;background:#fff;color:#1652F0;border:2px solid #1652F0;width:24px;height:24px;border-radius:50%;font-size:11px;cursor:pointer;display:grid;place-items:center;font-family:inherit">📷</button>
          <input type="file" id="profilePhotoInput" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="onProfilePhotoSelected(event)">
        </div>
        <div style="flex:1;min-width:0">
          <div class="greeting">${greeting} 👋</div>
          <div style="font-size:20px;font-weight:800;line-height:1.2">${customer.name}</div>
          <div style="font-size:11px;opacity:.85;margin-top:3px">📱 ${customer.phone || phone}${customer.birth_day && customer.birth_month ? ` · 🎂 ${customer.birth_day}/${customer.birth_month}` : ''}</div>
        </div>
        <button onclick="openEditProfileModal()" aria-label="แก้ไข" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);color:#fff;width:38px;height:38px;border-radius:50%;font-size:15px;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);flex-shrink:0">✏️</button>
      </div>
      ${(!customer.birth_day || !customer.birth_month) ? `
        <button onclick="openEditProfileModal()" style="display:block;width:100%;background:rgba(255,255,255,.18);border:1.5px dashed rgba(255,255,255,.55);color:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px;backdrop-filter:blur(4px);position:relative">
          🎂 + เพิ่มวันเกิดของคุณ — รับ +5 แต้มทุกปีในวันเกิด
        </button>
      ` : ''}
      <div class="points-row">
        <span class="num">${points}</span>
        <span class="of">แต้ม</span>
      </div>
      <div class="lbl">รางวัลถัดไป: ${nextGoal} แต้ม</div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="next">${nextLabel}</div>
      <div id="profileSaveStatus" style="font-size:11px;font-weight:700;margin-top:8px;min-height:14px;text-align:center;color:#fff;position:relative"></div>
    </div>

    ${rewardBanner}

    <div class="stats">
      <div class="stat-box">
        <div class="num">${lifetime}</div>
        <div class="lbl">แต้มที่ได้รวม</div>
      </div>
      <div class="stat-box">
        <div class="num">${(customer.drink_redeemed_count || 0) + (customer.dish_redeemed_count || 0)}</div>
        <div class="lbl">ใช้แลกไปแล้ว</div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <h3>🎁 รางวัลที่แลกได้</h3>
      <div style="display:grid;gap:8px;margin-top:8px">
        <div style="background:${canDrink?'#dcfce7':'#f3f4f6'};padding:14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:800;color:${canDrink?'#166534':'#6b7280'}">🥤 ฟรีเครื่องดื่ม 1 แก้ว</div>
            <div style="font-size:12px;color:#5c6982">ชานมไข่มุก / น้ำอัดลม</div>
          </div>
          <div style="font-weight:800;color:${canDrink?'#166534':'#9ca3af'};font-size:13px">${DRINK_PT} แต้ม</div>
        </div>
        <div style="background:${canDiscount?'#dcfce7':'#f3f4f6'};padding:14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:800;color:${canDiscount?'#166534':'#6b7280'}">💰 ส่วนลด 50 บาท</div>
            <div style="font-size:12px;color:#5c6982">ใช้กับเมนูใดก็ได้</div>
          </div>
          <div style="font-weight:800;color:${canDiscount?'#166534':'#9ca3af'};font-size:13px">${DISCOUNT_PT} แต้ม</div>
        </div>
      </div>
    </div>

    ${(() => {
      // Active orders (not delivered/done/cancelled) get a prominent live-tracking card
      const activeOrders = myOrders.filter(o => !['delivered','done','cancelled'].includes(o.status));
      const STAGES = [
        { key: 'pending',    label: 'รอยืนยัน',    icon: '⏳' },
        { key: 'confirmed',  label: 'ยืนยันแล้ว',   icon: '📋' },
        { key: 'cooking',    label: 'กำลังทำ',      icon: '👨‍🍳' },
        { key: 'ready',      label: 'พร้อมส่ง',     icon: '📦' },
        { key: 'delivering', label: 'กำลังจัดส่ง', icon: '🚚' },
        { key: 'delivered',  label: 'ส่งสำเร็จ',    icon: '✅' },
      ];
      return activeOrders.map(o => {
        const curIdx = Math.max(0, STAGES.findIndex(s => s.key === o.status));
        const pctTrack = ((curIdx + 1) / STAGES.length) * 100;
        return `
          <div class="card" style="border:2px solid #1652F0;background:linear-gradient(135deg,#fff,#ebf0ff)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <h3 style="margin:0;color:#1652F0">🍽 ออเดอร์ของคุณกำลังมา!</h3>
              <span style="font-size:11px;color:#6b7280">#${o.id.slice(-6)}</span>
            </div>
            <div style="font-size:13px;color:#5c6982;margin-bottom:10px">
              ${o.items.map(i => `${i.qty}× ${i.mainName || i.name}`).join(', ')}
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:6px">
              ${STAGES.map((s, i) => `
                <div style="text-align:center;flex:1;${i === curIdx ? 'color:#1652F0' : i < curIdx ? 'color:#16a34a' : 'color:#cbd5e1'}">
                  <div style="font-size:18px;${i === curIdx ? 'animation:pulse 1.2s ease-in-out infinite' : ''}">${i <= curIdx ? s.icon : '⚪'}</div>
                  <div style="font-size:9px;margin-top:2px">${s.label}</div>
                </div>
              `).join('')}
            </div>
            <div style="background:#e2e7ef;height:8px;border-radius:99px;overflow:hidden;margin-bottom:8px">
              <div style="background:linear-gradient(90deg,#1652F0,#4F7AFF);height:100%;width:${pctTrack}%;transition:width 0.4s"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;color:#1f2a44">
              <span>${fmtTime(o.date)}</span>
              <span style="font-weight:800;color:#1652F0">฿${o.total}</span>
            </div>
          </div>
        `;
      }).join('') + `
        <style>
          @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        </style>
      `;
    })()}

<!-- (Profile photo + name + edit moved into the blue hero-card at the top) -->

    <div class="card" style="margin-top:14px">
      <h3>📍 ที่อยู่จัดส่งของฉัน <span style="font-size:11px;color:#6b7280;font-weight:600">(บันทึกได้หลายที่)</span></h3>
      <div id="addressList" style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
        ${(customer.delivery_addresses || []).length === 0
          ? '<div style="color:#9ca3af;font-size:13px;text-align:center;padding:12px">ยังไม่มีที่อยู่บันทึกไว้</div>'
          : (customer.delivery_addresses || []).map((a, i) => `
            <div style="background:${a.isDefault?'#ebf0ff':'#f7f8fb'};border:1.5px solid ${a.isDefault?'#1652F0':'#e5e7eb'};border-radius:12px;padding:12px;display:flex;gap:10px;align-items:flex-start">
              <div style="font-size:20px;flex-shrink:0">${a.label === 'บ้าน'?'🏠':a.label === 'ที่ทำงาน'?'💼':'📍'}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:800;color:#0a1530;font-size:14px">${a.label} ${a.isDefault?'<span style="background:#1652F0;color:#fff;font-size:10px;padding:2px 7px;border-radius:999px;margin-left:4px">DEFAULT</span>':''}</div>
                <div style="font-size:12px;color:#5c6982;margin-top:3px;line-height:1.4">${a.address}</div>
                ${a.location?`<div style="font-size:11px;color:#16a34a;margin-top:3px">📍 มีพิกัด GPS</div>`:''}
              </div>

// Compress to JPEG ≤ ~80KB so we stay under Firestore's 1MB-per-doc limit
async function compressImageToBase64(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onerror = () => reject(new Error('อ่านไฟล์ไม่ได้'));
    r.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('ไฟล์ภาพไม่รองรับ'));
      img.onload = () => {
        const ratio = Math.min(1, (maxW || 320) / img.width);
        const c = document.createElement('canvas');
        c.width = img.width * ratio;
        c.height = img.height * ratio;
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', quality || 0.7));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  });
}

async function onProfilePhotoSelected(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    setProfileSaveStatus('⚠️ ไฟล์ใหญ่เกิน 5MB — เลือกไฟล์เล็กกว่า', '#dc2626');
    return;
  }
  setProfileSaveStatus('⏳ กำลังบันทึกรูป...', '#1652F0');
  try {
    // 320px wide, 70% quality → typically 30-60KB JPEG
    const dataUrl = await compressImageToBase64(file, 320, 0.7);
    const db = loadDB();
    if (!db.customers[phone]) return;
    db.customers[phone].photo = dataUrl;
    saveDB(db);
    if (window.cloud?.saveCustomer) await window.cloud.saveCustomer(db.customers[phone]);
    setProfileSaveStatus('✅ บันทึกรูปแล้ว', '#16a34a');
    // Re-render so the new photo shows
    renderCustomer(db.customers[phone], window._allOrders || []);
  } catch (e) {
    console.error(e);
    setProfileSaveStatus('⚠️ บันทึกรูปไม่สำเร็จ — ลองใหม่', '#dc2626');
  }
}
function setProfileSaveStatus(msg, color) {
  const el = document.getElementById('profileSaveStatus');
  if (el) { el.textContent = msg; el.style.color = color || '#16a34a'; }
}

function pinMyLocation() {
  const status = document.getElementById('addrPinStatus');
  if (!navigator.geolocation) { status.textContent = '⚠️ Browser นี้ไม่รองรับ GPS'; status.style.color = '#dc2626'; return; }
  status.textContent = '⏳ กำลังหาตำแหน่ง...'; status.style.color = '#1652F0';
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById('addrLat').value = pos.coords.latitude;
    document.getElementById('addrLng').value = pos.coords.longitude;
    status.innerHTML = `✅ ปักหมุดแล้ว · <a href="https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}" target="_blank" style="color:#1652F0;text-decoration:underline">ดูบน Google Maps</a>`;
    status.style.color = '#16a34a';
  }, err => {
    status.textContent = '⚠️ หาตำแหน่งไม่ได้ — ใส่ที่อยู่ในช่องด้านบนแทน';
    status.style.color = '#dc2626';
  }, { timeout: 10000, enableHighAccuracy: true });
}
async function saveAddress() {
  const label = document.getElementById('addrLabel').value.trim() || 'ที่อยู่';
  const address = document.getElementById('addrText').value.trim();
  const lat = parseFloat(document.getElementById('addrLat').value);
  const lng = parseFloat(document.getElementById('addrLng').value);
  const isDefault = document.getElementById('addrDefault').checked;
  const editId = document.getElementById('addrEditId').value;
  if (!address) return alert('กรุณาใส่ที่อยู่');
  const db = loadDB();
  const cust = db.customers[phone];
  if (!cust) return;
  cust.delivery_addresses = cust.delivery_addresses || [];
  const newAddr = {
    id: editId || ('a' + Date.now() + Math.random().toString(36).slice(2, 5)),
    label, address,
    ...(isFinite(lat) && isFinite(lng) ? { location: { lat, lng } } : {}),
    isDefault,
  };
  // If marked default, clear default flag on others
  if (isDefault) cust.delivery_addresses.forEach(a => { a.isDefault = false; });
  // Replace if editing, else add
  if (editId) {
    const idx = cust.delivery_addresses.findIndex(a => a.id === editId);
    if (idx >= 0) cust.delivery_addresses[idx] = newAddr;
    else cust.delivery_addresses.push(newAddr);
  } else {
    // First address auto-default
    if (cust.delivery_addresses.length === 0) newAddr.isDefault = true;
    cust.delivery_addresses.push(newAddr);
  }
  saveDB(db);
  if (window.cloud?.saveCustomer) await window.cloud.saveCustomer(cust);
  closeAddAddressModal();
  renderCustomer(cust, window._allOrders || []);
}
async function setDefaultAddress(id) {
  const db = loadDB();
  const cust = db.customers[phone];
  if (!cust?.delivery_addresses) return;
  cust.delivery_addresses.forEach(a => { a.isDefault = (a.id === id); });
  saveDB(db);
  if (window.cloud?.saveCustomer) await window.cloud.saveCustomer(cust);
  renderCustomer(cust, window._allOrders || []);
}
async function deleteAddress(id) {
  if (!confirm('ลบที่อยู่นี้?')) return;
  const db = loadDB();
  const cust = db.customers[phone];
  if (!cust?.delivery_addresses) return;
  cust.delivery_addresses = cust.delivery_addresses.filter(a => a.id !== id);
  // If we removed the default, promote the first remaining one
  if (cust.delivery_addresses.length && !cust.delivery_addresses.some(a => a.isDefault)) {
    cust.delivery_addresses[0].isDefault = true;
  }
  saveDB(db);
  if (window.cloud?.saveCustomer) await window.cloud.saveCustomer(cust);
  renderCustomer(cust, window._allOrders || []);
}

async function saveEditProfile() {
  const name = (document.getElementById('editName').value || '').trim();
  const bd = parseInt(document.getElementById('editBirthDay').value) || null;
  const bm = parseInt(document.getElementById('editBirthMonth').value) || null;
  const status = document.getElementById('editProfileStatus');
  if (!name) { status.style.color = '#dc2626'; status.textContent = '⚠️ กรุณากรอกชื่อ'; return; }
  status.style.color = '#1652F0'; status.textContent = '⏳ กำลังบันทึก...';
  const db = loadDB();
  const cust = db.customers[phone];
  if (!cust) return;
  cust.name = name;
  // 🔒 Birthday is write-once. If already locked, ignore any submitted bd/bm
  // (the form is disabled, but defend against tampering anyway).
  if (cust.birth_locked && cust.birth_day && cust.birth_month) {
    // Locked — ignore any change attempt
  } else if (bd && bm) {
    cust.birth_day = bd;
    cust.birth_month = bm;
    cust.birth_locked = true;        // becomes locked from now on
  }
  saveDB(db);
  localStorage.setItem('lastCustomerName', name);
  try {
    if (window.cloud?.saveCustomer) await window.cloud.saveCustomer(cust);
  } catch (e) { console.warn('cloud sync fail', e); }
  status.style.color = '#16a34a'; status.textContent = '✅ บันทึกแล้ว';
  setTimeout(() => {
    closeEditProfileModal();
    renderCustomer(cust, window._allOrders || []);
  }, 600);
}
// 📥 PDPA Right to Data Portability — export everything as JSON
async function downloadMyData() {
  const db = loadDB();
  const cust = db.customers[phone];
  if (!cust) return alert('ไม่พบข้อมูลลูกค้า');
  const myOrders = (window._allOrders || db.pendingOrders || []).filter(o =>
    o.customer_phone === phone || o.customer_id === phone
  );
  // Pull consent logs from cloud
  let consentLogs = [];
  if (window.cloud?.getConsentLogsForCustomer) {
    try { consentLogs = await window.cloud.getConsentLogsForCustomer(phone); } catch (e) {}
  }
  const exportData = {
    export_format_version: '1.0',
    exported_at: new Date().toISOString(),
    customer: cust,
    orders: myOrders,
    consent_logs: consentLogs,
    pdpa_notes: 'This data export is provided per PDPA (พ.ร.บ.คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562) Section 30 — right to data portability.',
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `my-data-${phone}-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  // Log this access request (PDPA audit trail)
  if (window.cloud?.saveConsentLog) {
    try {
      await window.cloud.saveConsentLog({
        type: 'data_access_request',
        customer_id: phone,
        customer_phone: phone,
        version: '1.0',
        accepted: true,
        details: { source: 'points_page', file: a.download },
      });
    } catch (e) {}
  }
  alert('✅ ดาวน์โหลดข้อมูลสำเร็จ — ตรวจไฟล์ JSON ในโฟลเดอร์ Downloads');
}

function tryRender() {
  if (!phone) {
    // Try last phone from localStorage
    const last = localStorage.getItem('lastCustomerPhone');
    if (last) phone = last;
    else { renderLookup(); return; }
  }

  const db = loadDB();
  const customer = db.customers[phone];
  const allOrders = db.pendingOrders || [];

  if (customer) {
    renderCustomer(customer, allOrders);
  } else {
    // Try cloud
    whenCloudReady(async () => {
      const cloudCust = await window.cloud.getCustomer(phone);
      if (cloudCust) {
        db.customers[phone] = cloudCust;
        saveDB(db);
        renderCustomer(cloudCust, allOrders);
      } else {
        renderLookup('ไม่พบเบอร์นี้ในระบบ — เริ่มสะสมโดยสั่งอาหาร');
      }
    });
    // Fallback: if cloud not ready in 3 sec, show lookup with err
    setTimeout(() => {
      if (!document.querySelector('.hero-card')) {
        if (!db.customers[phone]) renderLookup('ไม่พบเบอร์นี้ — กรอกใหม่ หรือสั่งอาหารเพื่อเริ่มสะสม');
      }
    }, 3000);
  }
}

whenCloudReady(() => {
  if (!phone) return;
  window.cloud.onCustomers(customers => {
    const db = loadDB();

      db.customers[phone] = customers[phone];
      saveDB(db);
      const allOrders = db.pendingOrders || [];
      renderCustomer(customers[phone], allOrders);

  });
  window.cloud.onOrders(orders => {
    const db = loadDB();
    db.pendingOrders = orders;
    saveDB(db);

    if (db.customers[phone]) renderCustomer(db.customers[phone], orders);

});

        <div>
          <div style="font-weight:900;font-size:16px">📦 Order #${order.id.slice(-6)}</div>
          <div style="font-size:11px;opacity:.85;margin-top:2px">${dateLabel}</div>
        </div>
        <button onclick="closeReorderModal()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer">×</button>
      </div>
      <div style="padding:14px 20px;overflow-y:auto;flex:1">
        ${itemsHtml || '<div style="color:#9ca3af;text-align:center;padding:20px">ไม่มีรายการ</div>'}
        <div style="display:flex;justify-content:space-between;padding:12px 0 4px;border-top:2px dashed #d1ddff;margin-top:8px;font-weight:900;color:#1652F0;font-size:16px">
          <span>รวม</span>
          <span>฿${order.total}</span>
        </div>
        ${order.redemptions?.length ? `<div style="font-size:12px;color:#dc2626;font-weight:700;margin-top:4px">🎁 ใช้แต้ม ${order.redemptions.reduce((s,r)=>s+r.points_used,0)} แต้ม</div>` : ''}
      </div>
      <div style="padding:14px 20px;border-top:1px solid #e5e7eb;background:#f7f8fb">
        <a href="menu.html?phone=${encodeURIComponent(phone)}&reorder=${encodeURIComponent(order.id)}" style="display:block;text-align:center;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:14px;border-radius:12px;font-weight:800;font-size:15px;text-decoration:none;font-family:inherit">
          🛒 สั่งซ้ำ + แก้ไขในตะกร้า
        </a>
        <button onclick="closeReorderModal()" style="display:block;width:100%;margin-top:8px;padding:10px;background:transparent;color:#6b7280;border:none;font-size:14px;cursor:pointer;font-family:inherit">ปิด</button>
      </div>
    </div>
  `;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeReorderModal() {
  const m = document.getElementById('reorderModal');
  if (m) m.style.display = 'none';
  document.body.style.overflow = '';
}
window.openReorderModal = openReorderModal;
window.closeReorderModal = closeReorderModal;

// 🔒 PDPA cookie banner — same logic as menu.html
const PDPA_VERSION = '1.0';
function maybeShowPdpaBanner() {
  try {
    const c = JSON.parse(localStorage.getItem('pdpa_consent') || 'null');
    if (c && c.version === PDPA_VERSION) return;
  } catch (e) {}
  const b = document.getElementById('pdpaBanner');
  if (b) b.style.display = 'block';
}
function isPdpaRejected() {
  try { const c = JSON.parse(localStorage.getItem('pdpa_consent') || 'null'); return c && c.version === PDPA_VERSION && c.accepted === false; } catch (e) { return false; }
}
async function acceptPdpa(accepted) {
  const consent = { version: PDPA_VERSION, accepted: !!accepted, accepted_at: new Date().toISOString(), user_agent: navigator.userAgent, language: navigator.language };
  localStorage.setItem('pdpa_consent', JSON.stringify(consent));
  document.getElementById('pdpaBanner').style.display = 'none';
  whenCloudReady(async () => {
    try {
      await window.cloud.saveConsentLog?.({
        type: 'cookies_and_privacy', customer_id: phone || 'anon', customer_phone: phone || null,
        version: PDPA_VERSION, accepted: !!accepted,
        details: { source: 'cookie_banner_points', user_agent: navigator.userAgent.slice(0, 200) },
      });
    } catch (e) {}
  });
  if (accepted) document.getElementById('pdpaReopen')?.remove();
  else showRejectInfoPoints();
  refreshPdpaReopener();
}
function showRejectInfoPoints() {
  alert('🔒 คุณเลือกปฏิเสธความยินยอม PDPA\n\n✅ ยังดูข้อมูลของคุณได้ตามปกติ\n⚠️ แต่จะไม่สามารถ:\n  • เพิ่มที่อยู่ใหม่ / แก้ไขโปรไฟล์ / อัพรูป\n\n💡 เปลี่ยนใจได้ทุกเมื่อ — กดปุ่ม "🔒 ตั้งค่าความเป็นส่วนตัว" มุมล่างซ้ายของหน้าจอ');
}
function refreshPdpaReopener() {
  let btn = document.getElementById('pdpaReopen');
  if (isPdpaRejected()) {
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'pdpaReopen';
      btn.onclick = () => { document.getElementById('pdpaBanner').style.display = 'block'; };
      btn.innerHTML = '🔒 ตั้งค่าความเป็นส่วนตัว';
      btn.style.cssText = 'position:fixed;bottom:14px;left:14px;z-index:80;background:#0a1530;color:#fff;border:1.5px solid #fbbf24;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.3)';
      document.body.appendChild(btn);
    }
  } else if (btn) { btn.remove(); }
}
window.acceptPdpa = acceptPdpa;
window.isPdpaRejected = isPdpaRejected;
window.refreshPdpaReopener = refreshPdpaReopener;
window.addEventListener('load', () => setTimeout(() => { maybeShowPdpaBanner(); refreshPdpaReopener(); }, 800));
</script>

  <div style="max-width:720px;margin:0 auto">
