<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#fff7ed">
<title>เมนู · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #fff7ed; color: #1f2937;
    padding-bottom: 100px;
  }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; cursor: pointer; }

  /* ============ Header ============ */
  header {
    background: linear-gradient(135deg, #fff7ed, #fef3c7);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 3px solid #ea580c;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(234,88,12,.08);
  }
  header img.logo { height: 52px; width: 52px; object-fit: contain; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
  header .info { flex: 1; }
  header h1 { font-size: 18px; color: #92400e; font-weight: 800; line-height: 1.2; }
  header .sub {
    font-size: 11.5px; color: #c2410c; margin-top: 3px; font-weight: 600;
    display: inline-block; background: #fed7aa; padding: 2px 8px; border-radius: 999px;
  }

  /* ============ Categories ============ */
  .cats {
    background: #fffbeb;
    border-bottom: 1px solid #fde68a;
    position: sticky; top: 80px; z-index: 9;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cats-inner { display: flex; gap: 6px; padding: 10px 12px; min-width: max-content; }
  .cat-btn {
    background: #fff; border: 2px solid #fde68a;
    padding: 8px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 700; color: #92400e;
    white-space: nowrap; transition: all .15s;
  }
  .cat-btn.active {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff; border-color: #ea580c;
    box-shadow: 0 4px 12px rgba(234,88,12,.3);
  }

  /* ============ Sections ============ */
  .section { padding: 18px 16px 4px; }
  .section-title {
    font-size: 22px; font-weight: 800; color: #92400e;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .emoji {
    font-size: 28px;
    background: #fed7aa; padding: 4px 10px; border-radius: 12px;
  }
  .section-title .price-tag {
    margin-left: auto; font-size: 13px; font-weight: 700;
    color: #16a34a; background: #dcfce7; padding: 4px 10px; border-radius: 999px;
  }

  /* ============ Item Cards ============ */
  .items {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 600px) {
    .items { grid-template-columns: 1fr 1fr; }
  }
  .item {
    background: #fff; border-radius: 16px;
    display: flex; gap: 12px; padding: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    align-items: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    border: 2px solid transparent;
  }
  .item:active { transform: scale(.98); }
  .item.has-qty { border-color: #ea580c; box-shadow: 0 4px 16px rgba(234,88,12,.18); }

  .item .img {
    width: 90px; height: 90px; flex-shrink: 0;
    border-radius: 12px; overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #fff7ed, #fed7aa);
  }
  .item .img img { width: 100%; height: 100%; object-fit: cover; }
  .item .img .overlay-emoji {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-size: 38px;
    background: linear-gradient(135deg, rgba(234,88,12,.4), rgba(251,146,60,.3));
    text-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .item .qty-badge {
    position: absolute; top: -6px; right: -6px;
    background: #ea580c; color: #fff;
    width: 26px; height: 26px; border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 800; font-size: 13px;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(234,88,12,.4);
  }
  .item .body { flex: 1; min-width: 0; }
  .item .name { font-size: 15px; font-weight: 700; line-height: 1.3; color: #1f2937; }
  .item .note { font-size: 12px; color: #92400e; margin-top: 3px; font-weight: 600; }
  .item .price { font-size: 16px; font-weight: 800; color: #ea580c; margin-top: 6px; }
  .item .add-ic {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    font-size: 22px; font-weight: 800;
    display: grid; place-items: center;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(234,88,12,.35);
  }

  /* ============ Floating Cart Bar ============ */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    box-shadow: 0 -4px 20px rgba(234,88,12,.35);
    cursor: pointer;
    transform: translateY(100%);
    transition: transform .3s ease;
  }
  .cart-bar.show { transform: translateY(0); }
  .cart-bar .left { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 15px; }
  .cart-bar .badge {
    background: #fff; color: #ea580c;
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center; font-weight: 900; font-size: 15px;
  }
  .cart-bar .total { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .cart-bar .arrow { font-size: 20px; opacity: .9; }

  /* ============ Modals ============ */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 520px;
    border-radius: 24px 24px 0 0;
    max-height: 92vh; overflow-y: auto;
    padding: 0; position: relative;
    animation: slide-up .3s ease;
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal .close {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,.9); border: none;
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 22px; color: #6b7280; padding: 0;
    display: grid; place-items: center; z-index: 5;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
  }

  /* ============ Customize Modal ============ */
  .cust-hero {
    background: linear-gradient(135deg, #fff7ed, #fed7aa);
    padding: 24px 20px; text-align: center;
    border-bottom: 1px solid #fde68a;
  }
  .cust-emoji {
    font-size: 60px; line-height: 1; margin-bottom: 8px;
  }
  .cust-name {
    font-size: 20px; font-weight: 800; color: #92400e;
    margin-bottom: 4px;
  }
  .cust-note { font-size: 13px; color: #c2410c; font-weight: 600; }
  .cust-price {
    font-size: 22px; font-weight: 900; color: #ea580c; margin-top: 8px;
  }

  .cust-body { padding: 20px; }

  .cust-section h3 {
    font-size: 14px; font-weight: 700; color: #92400e;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .cust-section h3 .req { color: #dc2626; font-size: 12px; }
  .cust-section { margin-bottom: 20px; }

  /* Quantity stepper */
  .qty-stepper {
    display: flex; align-items: center; justify-content: center; gap: 18px;
    background: #fff7ed; padding: 12px; border-radius: 16px;
  }
  .qty-stepper button {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff; font-size: 24px; font-weight: 800;
    display: grid; place-items: center;
    box-shadow: 0 3px 10px rgba(234,88,12,.3);
  }
  .qty-stepper button.minus {
    background: #fff; color: #ea580c; border: 2px solid #ea580c;
    box-shadow: none;
  }
  .qty-stepper button:disabled { opacity: .4; }
  .qty-stepper .qty { font-size: 28px; font-weight: 900; color: #92400e; min-width: 50px; text-align: center; }

  /* Add-on chips */
  .addons {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .addon-chip {
    background: #fff; border: 2px solid #fed7aa;
    border-radius: 12px; padding: 12px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all .15s;
  }
  .addon-chip.active {
    background: linear-gradient(135deg, #fff7ed, #fed7aa);
    border-color: #ea580c;
    box-shadow: 0 2px 8px rgba(234,88,12,.2);
  }
  .addon-chip .name { font-weight: 600; font-size: 14px; color: #1f2937; }
  .addon-chip .price { font-weight: 700; font-size: 13px; color: #16a34a; }
  .addon-chip.active .price { color: #ea580c; }
  .addon-chip .check {
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 2px solid #d1d5db;
    display: grid; place-items: center; flex-shrink: 0; margin-left: 8px;
  }
  .addon-chip.active .check {
    background: #ea580c; border-color: #ea580c; color: #fff;
  }
  .addon-chip.active .check::before { content: "✓"; font-weight: 900; font-size: 13px; }

  /* Note input */
  textarea, input.note-input {
    width: 100%; padding: 12px; font-size: 15px;
    border: 2px solid #fde68a; border-radius: 12px; background: #fffbeb;
    font-family: inherit; resize: none;
  }
  textarea:focus, input.note-input:focus { outline: none; border-color: #ea580c; background: #fff; }

  /* Modal footer */
  .cust-footer {
    position: sticky; bottom: 0; background: #fff;
    padding: 16px 20px; border-top: 1px solid #fde68a;
    display: flex; gap: 8px; align-items: center;
  }
  .btn-add-cart {
    flex: 1; padding: 16px; border-radius: 14px;
    background: linear-gradient(135deg, #f97316, #ea580c); color: #fff;
    border: none; font-size: 16px; font-weight: 800;
    box-shadow: 0 4px 14px rgba(234,88,12,.4);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-add-cart .total { font-size: 18px; font-weight: 900; }
  .btn-remove {
    background: #fee2e2; color: #dc2626; border: none;
    width: 50px; height: 50px; border-radius: 14px;
    font-size: 20px;
  }

  /* ============ Cart Modal ============ */
  .cart-hero {
    background: linear-gradient(135deg, #fff7ed, #fed7aa);
    padding: 22px 20px; text-align: center;
    border-bottom: 1px solid #fde68a;
  }
  .cart-hero h2 {
    font-size: 22px; font-weight: 800; color: #92400e;
    display: flex; justify-content: center; align-items: center; gap: 8px;
  }
  .cart-body { padding: 16px 20px; }

  .cart-line {
    background: #fff7ed; border-radius: 14px;
    padding: 14px; margin-bottom: 10px;
    border: 1px solid #fed7aa;
  }
  .cart-line .head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .cart-line .name { font-weight: 700; font-size: 15px; color: #1f2937; flex: 1; }
  .cart-line .x {
    background: transparent; border: none; color: #dc2626; font-size: 18px; padding: 0 4px;
  }
  .cart-line .addons-list {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .cart-line .addon-tag {
    background: #fed7aa; color: #92400e;
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
  }
  .cart-line .note-text {
    font-size: 12px; color: #92400e; margin-top: 4px; font-style: italic;
  }
  .cart-line .foot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
    padding-top: 8px; border-top: 1px dashed #fed7aa;
  }
  .cart-line .qty-mini {
    display: flex; align-items: center; gap: 8px;
    background: #fff; border-radius: 999px; padding: 2px;
  }
  .cart-line .qty-mini button {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: #ea580c; color: #fff; font-weight: 800;
  }
  .cart-line .qty-mini button.m { background: #fff; color: #ea580c; border: 1.5px solid #ea580c; }
  .cart-line .qty-mini .q { font-weight: 800; min-width: 22px; text-align: center; font-size: 14px; }
  .cart-line .line-total { font-weight: 800; color: #ea580c; font-size: 16px; }

  .cart-summary {
    background: linear-gradient(135deg, #fff7ed, #fed7aa);
    border-radius: 14px; padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
    margin: 16px 0;
  }
  .cart-summary .label { font-weight: 700; color: #92400e; font-size: 16px; }
  .cart-summary .amt { font-weight: 900; color: #ea580c; font-size: 22px; }

  label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 4px; color: #92400e; }
  input.cust-input {
    width: 100%; padding: 13px; font-size: 16px;
    border: 2px solid #fde68a; border-radius: 12px; background: #fffbeb;
    font-family: inherit;
  }
  input.cust-input:focus { outline: none; border-color: #ea580c; background: #fff; }
  .hint { font-size: 12px; color: #92400e; margin-top: -2px; margin-bottom: 8px; opacity: .8; }

  .btn {
    width: 100%; padding: 16px; border-radius: 14px;
    font-size: 16px; font-weight: 800; border: none; cursor: pointer;
    margin-top: 12px;
  }
  .btn-confirm {
    background: linear-gradient(135deg, #16a34a, #15803d); color: #fff;
    box-shadow: 0 4px 14px rgba(22,163,74,.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-confirm:disabled { background: #9ca3af; box-shadow: none; }
  .btn-ghost {
    background: #fff; color: #ea580c; border: 2px solid #ea580c;
  }

  .empty {
    text-align: center; color: #c2410c; padding: 40px 20px;
  }
  .empty .big { font-size: 60px; margin-bottom: 12px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #16a34a; color: #fff; padding: 14px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 700; z-index: 200; opacity: 0;
    transition: opacity .3s; pointer-events: none; white-space: nowrap;
    box-shadow: 0 6px 20px rgba(22,163,74,.4);
  }
  .toast.show { opacity: 1; }
  .toast.warn { background: #ea580c; box-shadow: 0 6px 20px rgba(234,88,12,.4); }

  .customer-found {
    padding: 12px 14px; border-radius: 10px;
    font-size: 13px; margin-top: 4px; font-weight: 600;
  }
  .customer-found.ok { background: #dcfce7; color: #166534; }
  .customer-found.new { background: #fef3c7; color: #92400e; }
</style>
</head>
<body>

<header id="pageHeader">
  <img class="logo" src="logo.jpg" alt="logo">
  <div class="info">
    <h1>ครัวผู้ใหญ่ปอง</h1>
    <div class="sub">🍽️ อาหารตามสั่ง · ก๋วยเตี๋ยว</div>
  </div>
</header>

<nav class="cats" id="cats"></nav>

<script>
  // Embed/shop mode adjustments
  (function(){
    const p = new URLSearchParams(location.search);
    const isEmbed = p.get('embed') === '1';
    const isShop = p.get('mode') === 'shop';
    if (isEmbed) {
      const h = document.getElementById('pageHeader');
      if (h) h.style.display = 'none';
      const cats = document.querySelector('.cats');
      if (cats) cats.style.top = '0';
      document.body.style.paddingBottom = '110px';
    }
    if (isShop) {
      // Add shop banner
      const banner = document.createElement('div');
      banner.style.cssText = 'background:#fef3c7;color:#92400e;padding:8px 16px;text-align:center;font-size:12px;font-weight:700;border-bottom:1px solid #fde68a';
      banner.innerHTML = '🏪 โหมดสั่งให้ลูกค้าหน้าร้าน — เบอร์โทรไม่บังคับ';
      document.body.insertBefore(banner, document.body.firstChild);
    }
  })();
</script>

<main id="menuMain"></main>

<div class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="left">
    <div class="badge" id="cartBadge">0</div>
    <span>🛒 ดูตะกร้า</span>
  </div>
  <div class="total"><span id="cartTotal">฿0</span> <span class="arrow">›</span></div>
</div>

<!-- ============ Customize Modal ============ -->
<div class="modal-bg" id="modalCust">
  <div class="modal">
    <button class="close" onclick="closeCustomize()">×</button>
    <div class="cust-hero">
      <div class="cust-emoji" id="custEmoji">🍚</div>
      <div class="cust-name" id="custName">—</div>
      <div class="cust-note" id="custNoteText"></div>
      <div class="cust-price" id="custPrice">฿0</div>
    </div>
    <div class="cust-body">
      <div class="cust-section">
        <h3>จำนวน <span class="req">*</span></h3>
        <div class="qty-stepper">
          <button class="minus" onclick="adjustCustQty(-1)">−</button>
          <div class="qty" id="custQty">1</div>
          <button onclick="adjustCustQty(1)">+</button>
        </div>
      </div>

      <div class="cust-section" id="addonSection">
        <h3>🍳 เพิ่มเติม (เลือกได้)</h3>
        <div class="addons" id="addonList"></div>
      </div>

      <div class="cust-section">
        <h3>📝 หมายเหตุพิเศษ</h3>
        <input type="text" class="note-input" id="custItemNote" placeholder="เช่น ไม่ใส่ผัก, เผ็ดน้อย, ไม่ใส่หอม">
      </div>
    </div>
    <div class="cust-footer">
      <button class="btn-remove" id="btnRemoveLine" onclick="removeFromCart()" style="display:none">🗑️</button>
      <button class="btn-add-cart" onclick="addToCart()">
        <span id="btnAddText">เพิ่มลงตะกร้า</span>
        <span class="total" id="btnAddTotal">฿0</span>
      </button>
    </div>
  </div>
</div>

<!-- ============ Cart Modal ============ -->
<div class="modal-bg" id="modalCart">
  <div class="modal">
    <button class="close" onclick="closeCart()">×</button>
    <div class="cart-hero">
      <h2>🛒 ตะกร้าของฉัน</h2>
    </div>
    <div class="cart-body">
      <div id="cartLines"></div>
      <div class="cart-summary" id="cartSummary" style="display:none">
        <span class="label">รวมทั้งหมด</span>
        <span class="amt" id="modalTotal">฿0</span>
      </div>

      <div id="customerForm" style="display:none">
        <label>📞 เบอร์โทร <span style="color:#dc2626">*</span></label>
        <input type="tel" class="cust-input" id="custPhone" placeholder="0812345678" inputmode="numeric" oninput="checkCustomer()">
        <div id="custFound"></div>

        <label>👤 ชื่อ (เฉพาะลูกค้าใหม่)</label>
        <input type="text" class="cust-input" id="custFullName" placeholder="คุณ...">

        <button class="btn btn-confirm" onclick="submitOrder()">
          ✅ ยืนยันสั่งอาหาร
        </button>
      </div>

      <button class="btn btn-ghost" onclick="closeCart()" style="margin-top:8px">เลือกเพิ่ม</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="firebase.js"></script>
<script src="menu-data.js"></script>
<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
let cart = JSON.parse(sessionStorage.getItem('cartV2') || '[]'); // [{cartId, mainId, qty, addOnIds:[], note}]

// Get all add-on items from add-on category
function getAddOnCategory() { return MENU.find(c => c.isAddOn); }
function getAddOns() { return getAddOnCategory()?.items || []; }

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], settings: { goal: 20, pricePerBox: 50 }, pendingOrders: [] };
}
function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function toast(msg, warn) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('warn', !!warn);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function normPhone(p) { return (p || '').replace(/\D/g, ''); }

function findItem(id) {
  for (const c of MENU) {
    const it = c.items.find(i => i.id === id);
    if (it) return { item: it, cat: c };
  }
  return null;
}

// ============ Render Menu ============
function renderMenu() {
  const cats = document.getElementById('cats');
  const main = document.getElementById('menuMain');
  // Hide add-on category from main list
  const visibleCats = MENU.filter(c => !c.isAddOn);

  cats.innerHTML = '<div class="cats-inner">' +
    visibleCats.map((c, i) => `<button class="cat-btn ${i===0?'active':''}" onclick="scrollToCat('cat-${i}')">${c.emoji} ${c.cat}</button>`).join('') +
    '</div>';

  main.innerHTML = visibleCats.map((c, i) => {
    const isCheap = c.items.every(it => it.price <= 30);
    return `
      <section class="section" id="cat-${i}">
        <h2 class="section-title">
          <span class="emoji">${c.emoji}</span>
          <span>${c.cat}</span>
          ${isCheap ? '<span class="price-tag">฿30</span>' : '<span class="price-tag">฿50</span>'}
        </h2>
        <div class="items">
          ${c.items.map(it => {
            const qtyInCart = cart.filter(l => l.mainId === it.id).reduce((s, l) => s + l.qty, 0);
            return `
            <div class="item ${qtyInCart > 0 ? 'has-qty' : ''}" onclick="openCustomize('${it.id}')">
              <div class="img">
                <img src="${SHOP_INFO.defaultImage}" alt="">
                <div class="overlay-emoji">${c.emoji}</div>
                ${qtyInCart > 0 ? `<div class="qty-badge">${qtyInCart}</div>` : ''}
              </div>
              <div class="body">
                <div class="name">${it.name}</div>
                ${it.note ? `<div class="note">${it.note}</div>` : ''}
                <div class="price">฿${it.price}</div>
              </div>
              <div class="add-ic">+</div>
            </div>
          `}).join('')}
        </div>
      </section>
    `;
  }).join('');
}

function scrollToCat(id) {
  const el = document.getElementById(id);
  if (el) {
    const offset = 150;
    window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
  }
}

// ============ Customize Modal ============
let editingCartId = null;
let custCurrent = { mainId: null, qty: 1, addOnIds: [], note: '' };

function openCustomize(itemId, cartId) {
  const found = findItem(itemId);
  if (!found) return;
  const { item, cat } = found;

  editingCartId = cartId || null;
  if (cartId) {
    const line = cart.find(l => l.cartId === cartId);
    if (line) {
      custCurrent = { mainId: line.mainId, qty: line.qty, addOnIds: [...line.addOnIds], note: line.note || '' };
    }
  } else {
    custCurrent = { mainId: itemId, qty: 1, addOnIds: [], note: '' };
  }

  document.getElementById('custEmoji').textContent = cat.emoji;
  document.getElementById('custName').textContent = item.name;
  document.getElementById('custNoteText').textContent = item.note || '';
  document.getElementById('custPrice').textContent = '฿' + item.price;
  document.getElementById('custQty').textContent = custCurrent.qty;
  document.getElementById('custItemNote').value = custCurrent.note;

  // Render add-ons
  const addOns = getAddOns();
  document.getElementById('addonSection').style.display = addOns.length ? 'block' : 'none';
  document.getElementById('addonList').innerHTML = addOns.map(a => `
    <div class="addon-chip ${custCurrent.addOnIds.includes(a.id) ? 'active' : ''}" onclick="toggleAddOn('${a.id}')">
      <div>
        <div class="name">${a.name}</div>
        <div class="price">+฿${a.price}</div>
      </div>
      <div class="check"></div>
    </div>
  `).join('');

  // Edit mode shows remove button
  document.getElementById('btnRemoveLine').style.display = cartId ? 'grid' : 'none';
  document.getElementById('btnAddText').textContent = cartId ? 'อัปเดต' : 'เพิ่มลงตะกร้า';

  updateCustTotal();
  document.getElementById('modalCust').classList.add('show');
}

function closeCustomize() {
  document.getElementById('modalCust').classList.remove('show');
  editingCartId = null;
}

function adjustCustQty(delta) {
  custCurrent.qty = Math.max(1, custCurrent.qty + delta);
  document.getElementById('custQty').textContent = custCurrent.qty;
  updateCustTotal();
}

function toggleAddOn(addOnId) {
  const idx = custCurrent.addOnIds.indexOf(addOnId);
  if (idx >= 0) custCurrent.addOnIds.splice(idx, 1);
  else custCurrent.addOnIds.push(addOnId);
  document.querySelectorAll('.addon-chip').forEach(el => {
    const id = el.querySelector('[onclick]')?.getAttribute('onclick');
  });
  // Re-render
  const addOns = getAddOns();
  document.getElementById('addonList').innerHTML = addOns.map(a => `
    <div class="addon-chip ${custCurrent.addOnIds.includes(a.id) ? 'active' : ''}" onclick="toggleAddOn('${a.id}')">
      <div>
        <div class="name">${a.name}</div>
        <div class="price">+฿${a.price}</div>
      </div>
      <div class="check"></div>
    </div>
  `).join('');
  updateCustTotal();
}

function calcLineTotal(line) {
  const main = findItem(line.mainId)?.item;
  if (!main) return 0;
  const addOnPrice = line.addOnIds.reduce((s, id) => {
    const a = getAddOns().find(x => x.id === id);
    return s + (a?.price || 0);
  }, 0);
  return (main.price + addOnPrice) * line.qty;
}

function updateCustTotal() {
  const total = calcLineTotal(custCurrent);
  document.getElementById('btnAddTotal').textContent = '฿' + total;
}

function addToCart() {
  custCurrent.note = document.getElementById('custItemNote').value.trim();
  if (editingCartId) {
    const idx = cart.findIndex(l => l.cartId === editingCartId);
    if (idx >= 0) {
      cart[idx] = { ...cart[idx], ...custCurrent };
    }
    toast('✓ อัปเดตแล้ว');
  } else {
    cart.push({ cartId: 'c-' + Date.now() + Math.random().toString(36).slice(2,5), ...custCurrent });
    toast(`✓ เพิ่ม "${findItem(custCurrent.mainId).item.name}" แล้ว`);
  }
  saveCart();
  renderMenu();
  updateCartBar();
  closeCustomize();
}

function removeFromCart() {
  if (!editingCartId) return;
  cart = cart.filter(l => l.cartId !== editingCartId);
  saveCart();
  renderMenu();
  updateCartBar();
  closeCustomize();
  toast('🗑️ ลบแล้ว', true);
}

function saveCart() { sessionStorage.setItem('cartV2', JSON.stringify(cart)); }

function getCartTotal() {
  let total = 0, count = 0;
  cart.forEach(l => { total += calcLineTotal(l); count += l.qty; });
  return { total, count };
}

function updateCartBar() {
  const { total, count } = getCartTotal();
  document.getElementById('cartBadge').textContent = count;
  document.getElementById('cartTotal').textContent = '฿' + total;
  document.getElementById('cartBar').classList.toggle('show', count > 0);
}

// ============ Cart Modal ============
function openCart() {
  renderCartLines();
  document.getElementById('modalCart').classList.add('show');
}
function closeCart() { document.getElementById('modalCart').classList.remove('show'); }

function renderCartLines() {
  const wrap = document.getElementById('cartLines');
  if (!cart.length) {
    wrap.innerHTML = '<div class="empty"><div class="big">🛒</div><div>ยังไม่มีของในตะกร้า</div></div>';
    document.getElementById('cartSummary').style.display = 'none';
    document.getElementById('customerForm').style.display = 'none';
    return;
  }
  wrap.innerHTML = cart.map(line => {
    const main = findItem(line.mainId)?.item;
    if (!main) return '';
    const addOns = line.addOnIds.map(id => getAddOns().find(a => a.id === id)).filter(Boolean);
    const lineTotal = calcLineTotal(line);
    return `
      <div class="cart-line">
        <div class="head">
          <div class="name">${main.name}</div>
          <button class="x" onclick="removeLine('${line.cartId}')">×</button>
        </div>
        ${addOns.length ? `
          <div class="addons-list">
            ${addOns.map(a => `<span class="addon-tag">+ ${a.name}</span>`).join('')}
          </div>
        ` : ''}
        ${line.note ? `<div class="note-text">📝 ${line.note}</div>` : ''}
        <div class="foot">
          <div class="qty-mini">
            <button class="m" onclick="adjustLineQty('${line.cartId}', -1)">−</button>
            <div class="q">${line.qty}</div>
            <button onclick="adjustLineQty('${line.cartId}', 1)">+</button>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <button onclick="openCustomize('${line.mainId}', '${line.cartId}')" style="background:#fff;border:1.5px solid #ea580c;color:#ea580c;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700">✏️ แก้</button>
            <span class="line-total">฿${lineTotal}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const { total } = getCartTotal();
  document.getElementById('modalTotal').textContent = '฿' + total;
  document.getElementById('cartSummary').style.display = 'flex';
  document.getElementById('customerForm').style.display = 'block';
}

function removeLine(cartId) {
  cart = cart.filter(l => l.cartId !== cartId);
  saveCart();
  renderCartLines();
  renderMenu();
  updateCartBar();
}

function adjustLineQty(cartId, delta) {
  const line = cart.find(l => l.cartId === cartId);
  if (!line) return;
  line.qty = Math.max(1, line.qty + delta);
  saveCart();
  renderCartLines();
  renderMenu();
  updateCartBar();
}

// ============ Customer Lookup ============
function checkCustomer() {
  const phone = normPhone(document.getElementById('custPhone').value);
  const found = document.getElementById('custFound');
  const nameInput = document.getElementById('custFullName');
  if (phone.length < 9) { found.innerHTML = ''; return; }
  const db = loadDB();
  const c = db.customers[phone];
  if (c) {
    const goal = db.settings.goal || 20;
    const rewards = Math.floor(c.total_boxes / goal) - c.redeemed_count;
    found.innerHTML = `<div class="customer-found ok">✅ ลูกค้าเดิม: <b>${c.name}</b> · สะสม ${c.total_boxes}/${goal}${rewards>0?` · 🎁 ฟรี ${rewards} กล่อง`:''}</div>`;
    nameInput.value = c.name === 'ไม่ระบุชื่อ' ? '' : c.name;
  } else {
    found.innerHTML = `<div class="customer-found new">🆕 ลูกค้าใหม่ — กรุณากรอกชื่อ</div>`;
  }
}

// ============ Submit Order ============
function submitOrder() {
  const isShopMode = new URLSearchParams(location.search).get('mode') === 'shop';
  const phone = normPhone(document.getElementById('custPhone').value);
  const name = document.getElementById('custFullName').value.trim();
  if (!cart.length) return toast('⚠️ ตะกร้าว่าง', true);

  // Shop mode: phone OR name required. Customer mode: phone required.
  if (!isShopMode && (!phone || phone.length < 9)) return toast('⚠️ กรุณากรอกเบอร์โทร', true);
  if (isShopMode && !phone && !name) return toast('⚠️ กรอกเบอร์ หรือชื่อ อย่างน้อยอย่างใดอย่างหนึ่ง', true);

  const db = loadDB();
  const customerId = phone || ('walkin-' + Date.now());
  let customer = phone ? db.customers[phone] : null;
  if (!customer) {
    const customerName = name || (phone ? 'ลูกค้า ' + phone.slice(-4) : 'ไม่ระบุชื่อ');
    customer = {
      id: customerId, name: customerName, phone: phone || '',
      total_boxes: 0, redeemed_count: 0,
      joined: new Date().toISOString()
    };
    db.customers[customerId] = customer;
  } else if (name && customer.name === 'ไม่ระบุชื่อ') {
    customer.name = name;
  }

  // Convert cart lines to order items (expanded with addons as combined entries)
  const items = [];
  cart.forEach(line => {
    const main = findItem(line.mainId)?.item;
    if (!main) return;
    const addOns = line.addOnIds.map(id => getAddOns().find(a => a.id === id)).filter(Boolean);
    const addOnPrice = addOns.reduce((s, a) => s + a.price, 0);
    const unitPrice = main.price + addOnPrice;
    items.push({
      id: line.mainId,
      name: main.name + (addOns.length ? ' + ' + addOns.map(a => a.name).join(' + ') : ''),
      price: unitPrice,
      qty: line.qty,
      mainName: main.name,
      addOns: addOns.map(a => a.name),
      note: line.note || ''
    });
  });

  if (!db.pendingOrders) db.pendingOrders = [];
  const total = items.reduce((s, it) => s + it.price * it.qty, 0);
  const orderId = 'PO' + Date.now();
  db.pendingOrders.push({
    id: orderId,
    date: new Date().toISOString(),
    customer_id: customerId,
    customer_name: customer.name,
    customer_phone: phone || '',
    items, total,
    note: '',
    status: 'pending',
    source: isShopMode ? 'walk-in' : 'online',
  });

  saveDB(db);

  const orderObj = db.pendingOrders[db.pendingOrders.length - 1];

  // Sync to cloud
  whenCloudReady(async () => {
    try {
      await window.cloud.saveCustomer(customer);
      await window.cloud.saveOrder(orderObj);
    } catch (e) { console.warn('cloud sync failed, order saved locally', e); }
  });

  cart = [];
  sessionStorage.removeItem('cartV2');

  if (isShopMode) {
    // Stay on menu, clear form, show toast
    document.getElementById('custPhone').value = '';
    document.getElementById('custFullName').value = '';
    document.getElementById('custFound').innerHTML = '';
    closeCart();
    renderMenu();
    updateCartBar();
    toast(`✓ ส่งครัวแล้ว! ${customer.name} · ฿${total}`);
  } else {
    setTimeout(() => {
      window.location.href = `status.html?order=${orderId}&phone=${phone || customerId}`;
    }, 400);
  }
}

// ============ Init ============
renderMenu();
updateCartBar();

window.addEventListener('scroll', () => {
  const visibleCats = MENU.filter(c => !c.isAddOn);
  const sections = visibleCats.map((_, i) => document.getElementById('cat-' + i));
  const offset = 220;
  let activeIdx = 0;
  sections.forEach((s, i) => { if (s && s.offsetTop - offset <= window.scrollY) activeIdx = i; });
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === activeIdx));
});
</script>
