<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f7f8fb">
<title>เมนู · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f7f8fb; color: #1f2937;
    padding-bottom: 100px;
  }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; cursor: pointer; }

  /* ============ Header ============ */
  header {
    background: linear-gradient(135deg, #f7f8fb, #ebf0ff);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 3px solid #1652F0;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(22,82,240,.08);
  }
  header img.logo { height: 52px; width: 52px; object-fit: contain; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
  header .call-btn {
    background: linear-gradient(135deg, #16a34a, #15803d); color: #fff;
    width: 44px; height: 44px; border-radius: 50%;
    display: grid; place-items: center; text-decoration: none;
    font-size: 20px; box-shadow: 0 3px 10px rgba(22,163,74,.3);
    flex-shrink: 0;
  }
  header .info { flex: 1; }
  .item.unavailable { opacity: .5; pointer-events: none; }
  .item.unavailable .add-ic { background: #9ca3af !important; box-shadow: none; }
  .item .out-badge {
    position: absolute; top: 8px; right: 8px;
    background: #dc2626; color: #fff;
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 800;
    box-shadow: 0 2px 6px rgba(220,38,38,.3);
  }
  header h1 { font-size: 18px; color: #0a1530; font-weight: 800; line-height: 1.2; }
  header .sub {
    font-size: 11.5px; color: #0738C9; margin-top: 3px; font-weight: 600;
    display: inline-block; background: #c5d3ff; padding: 2px 8px; border-radius: 999px;
  }

  /* ============ Categories ============ */
  .cats {
    background: #ffffff;
    border-bottom: 1px solid #d1ddff;
    position: sticky; top: 80px; z-index: 9;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cats-inner { display: flex; gap: 6px; padding: 10px 12px; min-width: max-content; }
  .cat-btn {
    background: #fff; border: 2px solid #d1ddff;
    padding: 8px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 700; color: #0a1530;
    white-space: nowrap; transition: all .15s;
  }
  .cat-btn.active {
    background: linear-gradient(135deg, #4F7AFF, #1652F0);
    color: #fff; border-color: #1652F0;
    box-shadow: 0 4px 12px rgba(22,82,240,.3);
  }

  /* ============ Sections ============ */
  .section { padding: 18px 16px 4px; }
  .section-title {
    font-size: 22px; font-weight: 800; color: #0a1530;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .emoji {
    font-size: 28px;
    background: #c5d3ff; padding: 4px 10px; border-radius: 12px;
  }
  .section-title .price-tag {
    margin-left: auto; font-size: 13px; font-weight: 700;
    color: #16a34a; background: #dcfce7; padding: 4px 10px; border-radius: 999px;
  }

  /* ============ Item Cards ============ */
  .items {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 600px) {
    .items { grid-template-columns: 1fr 1fr; }
  }
  .item {
    background: #fff; border-radius: 16px;
    display: flex; gap: 12px; padding: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    align-items: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    border: 2px solid transparent;
  }
  .item:active { transform: scale(.98); }
  .item.has-qty { border-color: #1652F0; box-shadow: 0 4px 16px rgba(22,82,240,.18); }

  .item .img {
    width: 90px; height: 90px; flex-shrink: 0;
    border-radius: 12px; overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
  }
  .item .img img { width: 100%; height: 100%; object-fit: cover; }
  .item .img .overlay-emoji {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-size: 38px;
    background: linear-gradient(135deg, rgba(22,82,240,.4), rgba(251,146,60,.3));
    text-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .item .qty-badge {
    position: absolute; top: -6px; right: -6px;
    background: #1652F0; color: #fff;
    width: 26px; height: 26px; border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 800; font-size: 13px;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(22,82,240,.4);
  }
  .item .body { flex: 1; min-width: 0; }
  .item .name { font-size: 15px; font-weight: 700; line-height: 1.3; color: #1f2937; }
  .item .note { font-size: 12px; color: #0a1530; margin-top: 3px; font-weight: 600; }
  .item .price { font-size: 16px; font-weight: 800; color: #1652F0; margin-top: 6px; }
  .item .add-ic {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #4F7AFF, #1652F0);
    color: #fff;
    font-size: 22px; font-weight: 800;
    display: grid; place-items: center;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(22,82,240,.35);
  }

  /* ============ Floating Cart Bar ============ */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    background: linear-gradient(135deg, #4F7AFF, #1652F0);
    color: #fff;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    box-shadow: 0 -4px 20px rgba(22,82,240,.35);
    cursor: pointer;
    transform: translateY(100%);
    transition: transform .3s ease;
  }
  .cart-bar.show { transform: translateY(0); }
  .cart-bar .left { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 15px; }
  .cart-bar .badge {
    background: #fff; color: #1652F0;
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center; font-weight: 900; font-size: 15px;
  }
  .cart-bar .total { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .cart-bar .arrow { font-size: 20px; opacity: .9; }

  /* ============ Modals ============ */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 520px;
    border-radius: 24px 24px 0 0;
    max-height: 92vh; overflow-y: auto;
    padding: 0; position: relative;
    animation: slide-up .3s ease;
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal .close {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,.9); border: none;
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 22px; color: #6b7280; padding: 0;
    display: grid; place-items: center; z-index: 5;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
  }

  /* ============ Customize Modal ============ */
  .cust-hero {
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
    padding: 24px 20px; text-align: center;
    border-bottom: 1px solid #d1ddff;
  }
  .cust-emoji {
    font-size: 60px; line-height: 1; margin-bottom: 8px;
  }
  .cust-name {
    font-size: 20px; font-weight: 800; color: #0a1530;
    margin-bottom: 4px;
  }
  .cust-note { font-size: 13px; color: #0738C9; font-weight: 600; }
  .cust-price {
    font-size: 22px; font-weight: 900; color: #1652F0; margin-top: 8px;
  }

  .cust-body { padding: 20px; }

  .cust-section h3 {
    font-size: 14px; font-weight: 700; color: #0a1530;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .cust-section h3 .req { color: #dc2626; font-size: 12px; }
  .cust-section { margin-bottom: 20px; }

  /* Quantity stepper */
  .qty-stepper {
    display: flex; align-items: center; justify-content: center; gap: 18px;
    background: #f7f8fb; padding: 12px; border-radius: 16px;
  }
  .qty-stepper button {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: linear-gradient(135deg, #4F7AFF, #1652F0);
    color: #fff; font-size: 24px; font-weight: 800;
    display: grid; place-items: center;
    box-shadow: 0 3px 10px rgba(22,82,240,.3);
  }
  .qty-stepper button.minus {
    background: #fff; color: #1652F0; border: 2px solid #1652F0;
    box-shadow: none;
  }
  .qty-stepper button:disabled { opacity: .4; }
  .qty-stepper .qty { font-size: 28px; font-weight: 900; color: #0a1530; min-width: 50px; text-align: center; }

  /* Add-on chips */
  .addons {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .addon-chip {
    background: #fff; border: 2px solid #c5d3ff;
    border-radius: 12px; padding: 12px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all .15s;
  }
  .addon-chip.active {
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
    border-color: #1652F0;
    box-shadow: 0 2px 8px rgba(22,82,240,.2);
  }
  .addon-chip .name { font-weight: 600; font-size: 14px; color: #1f2937; }
  .addon-chip .price { font-weight: 700; font-size: 13px; color: #16a34a; }
  .addon-chip.active .price { color: #1652F0; }
  .addon-chip .check {
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 2px solid #d1d5db;
    display: grid; place-items: center; flex-shrink: 0; margin-left: 8px;
  }
  .addon-chip.active .check {
    background: #1652F0; border-color: #1652F0; color: #fff;
  }
  .addon-chip.active .check::before { content: "✓"; font-weight: 900; font-size: 13px; }

  /* Option Groups (เลือกเนื้อ / เพิ่ม +10 / ไข่ +5 / เลือกเส้น) */
  .option-group { margin-bottom: 18px; }
  .og-label { font-size: 14px; font-weight: 800; color: #0a1530; margin-bottom: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .og-required { background: #dc2626; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 999px; }
  .og-optional { background: #e5e7eb; color: #6b7280; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; }
  .og-choices { display: flex; flex-wrap: wrap; gap: 8px; }
  .og-chip {
    padding: 9px 14px; border: 1.5px solid #d1ddff; border-radius: 999px;
    background: #fff; font-size: 13px; font-weight: 600; color: #1f2a44;
    cursor: pointer; transition: all .15s; user-select: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .og-chip:hover { border-color: #1652F0; }
  .og-chip.active {
    background: linear-gradient(135deg, #1652F0, #0738C9); color: #fff;
    border-color: #1652F0; box-shadow: 0 3px 10px rgba(22,82,240,.3);
  }
  .og-chip .og-price { font-size: 11px; font-weight: 700; color: #f59e0b; }
  .og-chip.active .og-price { color: #fbbf24; }

  /* Cart line option chips */
  .cart-line .opt-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .cart-line .opt-chip { background: #ebf0ff; color: #1652F0; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
  .cart-line .opt-chip.req { background: #f0fdf4; color: #166534; }
  .cart-line .opt-chip.add10 { background: #fef3c7; color: #92400e; }
  .cart-line .opt-chip.add5 { background: #fce7f3; color: #be185d; }

  /* Note input */
  textarea, input.note-input {
    width: 100%; padding: 12px; font-size: 15px;
    border: 2px solid #d1ddff; border-radius: 12px; background: #ffffff;
    font-family: inherit; resize: none;
  }
  textarea:focus, input.note-input:focus { outline: none; border-color: #1652F0; background: #fff; }

  /* Modal footer */
  .cust-footer {
    position: sticky; bottom: 0; background: #fff;
    padding: 16px 20px; border-top: 1px solid #d1ddff;
    display: flex; gap: 8px; align-items: center;
  }
  .btn-add-cart {
    flex: 1; padding: 16px; border-radius: 14px;
    background: linear-gradient(135deg, #4F7AFF, #1652F0); color: #fff;
    border: none; font-size: 16px; font-weight: 800;
    box-shadow: 0 4px 14px rgba(22,82,240,.4);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-add-cart .total { font-size: 18px; font-weight: 900; }
  .btn-remove {
    background: #fee2e2; color: #dc2626; border: none;
    width: 50px; height: 50px; border-radius: 14px;
    font-size: 20px;
  }

  /* ============ Cart Modal ============ */
  .cart-hero {
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
    padding: 22px 20px; text-align: center;
    border-bottom: 1px solid #d1ddff;
  }
  .cart-hero h2 {
    font-size: 22px; font-weight: 800; color: #0a1530;
    display: flex; justify-content: center; align-items: center; gap: 8px;
  }
  .cart-body { padding: 16px 20px; }

  .cart-line {
    background: #f7f8fb; border-radius: 14px;
    padding: 14px; margin-bottom: 10px;
    border: 1px solid #c5d3ff;
  }
  .cart-line .head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .cart-line .name { font-weight: 700; font-size: 15px; color: #1f2937; flex: 1; }
  .cart-line .x {
    background: transparent; border: none; color: #dc2626; font-size: 18px; padding: 0 4px;
  }
  .cart-line .addons-list {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .cart-line .addon-tag {
    background: #c5d3ff; color: #0a1530;
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
  }
  .cart-line .note-text {
    font-size: 12px; color: #0a1530; margin-top: 4px; font-style: italic;
  }
  .cart-line .foot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
    padding-top: 8px; border-top: 1px dashed #c5d3ff;
  }
  .cart-line .qty-mini {
    display: flex; align-items: center; gap: 8px;
    background: #fff; border-radius: 999px; padding: 2px;
  }
  .cart-line .qty-mini button {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: #1652F0; color: #fff; font-weight: 800;
  }
  .cart-line .qty-mini button.m { background: #fff; color: #1652F0; border: 1.5px solid #1652F0; }
  .cart-line .qty-mini .q { font-weight: 800; min-width: 22px; text-align: center; font-size: 14px; }
  .cart-line .line-total { font-weight: 800; color: #1652F0; font-size: 16px; }

  .cart-summary {
    background: linear-gradient(135deg, #f7f8fb, #c5d3ff);
    border-radius: 14px; padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
    margin: 16px 0;
  }
  .cart-summary .label { font-weight: 700; color: #0a1530; font-size: 16px; }
  .cart-summary .amt { font-weight: 900; color: #1652F0; font-size: 22px; }

  label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 4px; color: #0a1530; }
  input.cust-input {
    width: 100%; padding: 13px; font-size: 16px;
    border: 2px solid #d1ddff; border-radius: 12px; background: #ffffff;
    font-family: inherit;
  }
  input.cust-input:focus { outline: none; border-color: #1652F0; background: #fff; }
  .hint { font-size: 12px; color: #0a1530; margin-top: -2px; margin-bottom: 8px; opacity: .8; }

  .btn {
    width: 100%; padding: 16px; border-radius: 14px;
    font-size: 16px; font-weight: 800; border: none; cursor: pointer;
    margin-top: 12px;
  }
  .btn-confirm {
    background: linear-gradient(135deg, #16a34a, #15803d); color: #fff;
    box-shadow: 0 4px 14px rgba(22,163,74,.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-confirm:disabled { background: #9ca3af; box-shadow: none; }
  .btn-ghost {
    background: #fff; color: #1652F0; border: 2px solid #1652F0;
  }

  .empty {
    text-align: center; color: #0738C9; padding: 40px 20px;
  }
  .empty .big { font-size: 60px; margin-bottom: 12px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #16a34a; color: #fff; padding: 14px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 700; z-index: 200; opacity: 0;
    transition: opacity .3s; pointer-events: none; white-space: nowrap;
    box-shadow: 0 6px 20px rgba(22,163,74,.4);
  }
  .toast.show { opacity: 1; }
  .toast.warn { background: #1652F0; box-shadow: 0 6px 20px rgba(22,82,240,.4); }

  .customer-found {
    padding: 12px 14px; border-radius: 10px;
    font-size: 13px; margin-top: 4px; font-weight: 600;
  }
  .customer-found.ok { background: #dcfce7; color: #166534; }
  .customer-found.new { background: #ebf0ff; color: #0a1530; }

  /* User Widget — appears on returning visitors */
  .user-widget {
    margin: 12px 16px 0;
    padding: 14px 16px; border-radius: 16px;
    display: none; align-items: center; gap: 12px;
    border: 2px solid #c5d3ff;
    background: linear-gradient(135deg, #f7f8fb, #ebf0ff);
    box-shadow: 0 4px 14px rgba(22,82,240,.12);
    animation: slide-down .4s ease;
  }
  .user-widget.show { display: flex; }
  @keyframes slide-down {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .user-widget .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #4F7AFF, #1652F0); color: #fff;
    display: grid; place-items: center;
    font-weight: 900; font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(22,82,240,.35);
  }
  .user-widget .info { flex: 1; min-width: 0; }
  .user-widget .name { font-weight: 800; font-size: 15px; color: #1f2937; line-height: 1.2; }
  .user-widget .meta { font-size: 12px; color: #0a1530; margin-top: 3px; font-weight: 600; }
  .user-widget .action {
    background: linear-gradient(135deg, #4F7AFF, #1652F0); color: #fff;
    padding: 10px 16px; border-radius: 999px; font-size: 13px; font-weight: 800;
    text-decoration: none; white-space: nowrap;
    box-shadow: 0 3px 10px rgba(22,82,240,.3);
  }
  .user-widget.cooking {
    background: linear-gradient(135deg, #ebf0ff, #d1ddff);
    border-color: #4F7AFF;
  }
  .user-widget.cooking .avatar {
    background: linear-gradient(135deg, #4F7AFF, #1e40af);
    animation: pulse-cook 1.5s ease-in-out infinite;
  }
  @keyframes pulse-cook {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .user-widget.done {
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    border-color: #16a34a;
  }
  .user-widget.done .avatar { background: linear-gradient(135deg, #22c55e, #16a34a); }
  .user-widget.done .action { background: linear-gradient(135deg, #22c55e, #15803d); }
  .user-widget .reward-pill {
    display: inline-block; background: #ebf0ff; color: #0a1530;
    padding: 2px 8px; border-radius: 999px; font-size: 11px; margin-left: 6px;
  }
  /* Rewards box (in cart) */
  .rewards-card {
    margin-top: 14px; padding: 14px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-radius: 14px; border: 2px solid #f59e0b;
  }
  .rewards-card h3 {
    font-size: 14px; color: #92400e; margin-bottom: 10px; font-weight: 800;
    display: flex; justify-content: space-between; align-items: center;
  }
  .rewards-card .pts-badge {
    background: #f59e0b; color: #fff; padding: 3px 10px;
    border-radius: 999px; font-size: 12px; font-weight: 800;
  }
  .reward-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; cursor: pointer; user-select: none;
    border: 2px solid transparent; transition: all .15s;
  }
  .reward-toggle:hover { border-color: #f59e0b; }
  .reward-toggle.active {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff; border-color: #16a34a;
  }
  .reward-toggle .check-circle {

<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';

// 🏭 Factory mode (?mode=factory) — separate menu, no loyalty, custom items allowed
const _urlMode = new URLSearchParams(location.search).get('mode');
const isFactoryMode = _urlMode === 'factory';
window.isFactoryMode = isFactoryMode;

// Cart line: { cartId, mainId, qty, options: { [groupIdx]: [choiceName, ...] }, note }
// Custom item line: { cartId, isCustom: true, customName, customPrice, qty, note }
const _CART_KEY = isFactoryMode ? 'cartFactory' : 'cartV2';
let cart = JSON.parse(sessionStorage.getItem(_CART_KEY) || '[]');

// Migrate / clear old cart format (had addOnIds)
if (cart.length && cart[0].addOnIds !== undefined) {
  cart = [];
  sessionStorage.removeItem(_CART_KEY);
}

// Effective menu (factory uses FACTORY_MENU + factoryConfig, regular uses MENU + menuConfig)
let menuConfig = JSON.parse(localStorage.getItem('menuConfig') || '{"overrides":{},"custom":[]}');
let factoryConfig = JSON.parse(localStorage.getItem('factoryConfig') || '{"overrides":{},"custom":[]}');
let EFFECTIVE_MENU = isFactoryMode
  ? (window.applyFactoryConfig ? window.applyFactoryConfig(factoryConfig) : (window.FACTORY_MENU || []))
  : (window.applyMenuConfig ? window.applyMenuConfig(menuConfig) : MENU);
function getEffectiveMenu() { return EFFECTIVE_MENU; }

// Update header + hide returning-customer widget for factory mode
if (isFactoryMode) {
  document.title = '🏭 เมนูโรงงาน · ครัวผู้ใหญ่ปอง';
  document.addEventListener('DOMContentLoaded', () => {
    const h = document.querySelector('header h1');
    const sub = document.querySelector('header .sub');
    if (h) h.innerHTML = '🏭 ครัวผู้ใหญ่ปอง <span style="background:#fbbf24;color:#78350f;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:800;margin-left:6px">โรงงาน</span>';
    if (sub) sub.textContent = '🍽 เมนูพิเศษโรงงาน · 50฿/รายการ';
  });
}

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], settings: { goal: 20, pricePerBox: 50 }, pendingOrders: [] };
}
function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function toast(msg, warn) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('warn', !!warn);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function normPhone(p) { return (p || '').replace(/\D/g, ''); }

function findItem(id) {
  for (const c of EFFECTIVE_MENU) {
    const it = c.items.find(i => i.id === id);
    if (it) return { item: it, cat: c };
  }
  return null;
}

// ============ Render Menu ============
function renderMenu() {
  const cats = document.getElementById('cats');
  const main = document.getElementById('menuMain');
  // All categories are visible (no separate add-on category in new menu)
  const visibleCats = EFFECTIVE_MENU.filter(c => !c.isAddOn);

  cats.innerHTML = '<div class="cats-inner">' +
    visibleCats.map((c, i) => `<button class="cat-btn ${i===0?'active':''}" onclick="scrollToCat('cat-${i}')">${c.emoji} ${c.cat}</button>`).join('') +
    '</div>';

  main.innerHTML = visibleCats.map((c, i) => {
    const isCheap = c.items.every(it => it.price <= 30);
    return `
      <section class="section" id="cat-${i}">
        <h2 class="section-title">
          <span class="emoji">${c.emoji}</span>
          <span>${c.cat}</span>
        </h2>
        <div class="items">
          ${c.items.map(it => {
            const qtyInCart = cart.filter(l => l.mainId === it.id).reduce((s, l) => s + l.qty, 0);
            const isOut = it.available === false;
            return `
            <div class="item ${qtyInCart > 0 ? 'has-qty' : ''} ${isOut ? 'unavailable' : ''}" onclick="${isOut?'':`openCustomize('${it.id}')`}">
              <div class="img">
                <img src="${it.image || SHOP_INFO.defaultImage}" alt="">
                ${!it.image ? `<div class="overlay-emoji">${c.emoji}</div>` : ''}
                ${qtyInCart > 0 ? `<div class="qty-badge">${qtyInCart}</div>` : ''}
                ${isOut ? '<div class="out-badge">หมด</div>' : ''}
              </div>
              <div class="body">
                <div class="name">${it.name}</div>
                ${it.note ? `<div class="note">${it.note}</div>` : ''}
                <div class="price">฿${it.price}</div>
              </div>
              <div class="add-ic">${isOut?'×':'+'}</div>
            </div>
          `}).join('')}
        </div>
      </section>
    `;
  }).join('');
}

// Subscribe to menu config changes from cloud (regular OR factory)
whenCloudReady(() => {
  if (isFactoryMode) {
    window.cloud.onFactoryConfig?.(config => {
      factoryConfig = config || { overrides: {}, custom: [] };
      localStorage.setItem('factoryConfig', JSON.stringify(factoryConfig));
      EFFECTIVE_MENU = window.applyFactoryConfig(factoryConfig);
      renderMenu();
      updateCartBar();
    });
  } else {
    window.cloud.onMenuConfig(config => {
      menuConfig = config || { overrides: {}, custom: [] };
      localStorage.setItem('menuConfig', JSON.stringify(menuConfig));
      EFFECTIVE_MENU = window.applyMenuConfig(menuConfig);
      renderMenu();
      updateCartBar();
    });
  }
});

function scrollToCat(id) {
  const el = document.getElementById(id);
  if (el) {
    const offset = 150;
    window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
  }
}

// ============ Customize Modal ============
let editingCartId = null;
let custCurrent = { mainId: null, qty: 1, options: {}, note: '' };

function escAttr(s) { return String(s).replace(/'/g, "&#39;").replace(/"/g, '&quot;'); }

function openCustomize(itemId, cartId) {
  const found = findItem(itemId);
  if (!found) return;
  const { item, cat } = found;

  editingCartId = cartId || null;
  if (cartId) {
    const line = cart.find(l => l.cartId === cartId);
    if (line) {
      custCurrent = {
        mainId: line.mainId,
        qty: line.qty,
        options: JSON.parse(JSON.stringify(line.options || {})),
        note: line.note || ''
      };
    }
  } else {
    custCurrent = { mainId: itemId, qty: 1, options: {}, note: '' };
  }

  const custEmojiEl = document.getElementById('custEmoji');
  if (item.image) {
    custEmojiEl.innerHTML = `<img src="${item.image}" style="width:120px;height:120px;border-radius:16px;object-fit:cover;box-shadow:0 6px 18px rgba(0,0,0,.15)">`;
  } else {
    custEmojiEl.textContent = cat.emoji;
  }
  document.getElementById('custName').textContent = item.name;
  document.getElementById('custNoteText').textContent = item.note || '';
  document.getElementById('custPrice').textContent = '฿' + item.price;
  document.getElementById('custQty').textContent = custCurrent.qty;
  document.getElementById('custItemNote').value = custCurrent.note;

  renderOptionGroups();

  // Edit mode shows remove button
  document.getElementById('btnRemoveLine').style.display = cartId ? 'grid' : 'none';
  document.getElementById('btnAddText').textContent = cartId ? 'อัปเดต' : 'เพิ่มลงตะกร้า';

  updateCustTotal();
  document.getElementById('modalCust').classList.add('show');
}

function renderOptionGroups() {
  const item = findItem(custCurrent.mainId)?.item;
  const wrap = document.getElementById('optionGroupsContainer');
  if (!item || !item.optionGroups || !item.optionGroups.length) {
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = item.optionGroups.map((g, gi) => {
    const isRequired = (g.min || 0) > 0;
    const isSingle = g.max === 1;
    const isBoundedMulti = !isSingle && g.max > 1 && g.max < 99;
    const sel = custCurrent.options[gi] || [];
    const reachedMax = (g.max && g.max < 99) ? sel.length >= g.max : false;
    return `
      <div class="cust-section option-group">
        <div class="og-label">
          <span>${g.label}</span>
          ${isRequired
            ? '<span class="og-required">จำเป็น</span>'
            : '<span class="og-optional">เลือกได้</span>'}
          ${isBoundedMulti ? `<span class="og-optional">เลือกได้สูงสุด ${g.max}</span>` : ''}
          ${(!isSingle && !isBoundedMulti) ? '<span class="og-optional">เลือกหลายอย่างได้</span>' : ''}
          ${(reachedMax && !isSingle) ? `<span style="color:#dc2626;font-size:11px;font-weight:700;margin-left:auto">ครบ ${g.max} แล้ว</span>` : ''}
        </div>
        <div class="og-choices">
          ${g.choices.map(c => {
            const active = sel.includes(c);
            const disabled = !active && reachedMax && !isSingle;
            return `
              <div class="og-chip ${active ? 'active' : ''}"
                   style="${disabled ? 'opacity:.4;pointer-events:none' : ''}"
                   onclick="toggleOption(${gi}, '${escAttr(c)}', ${isSingle}, ${g.max || 99})">
                <span>${c}</span>
                ${g.priceEach > 0 ? `<span class="og-price">+${g.priceEach}฿</span>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleOption(groupIdx, choice, isSingle, max) {
  if (!custCurrent.options) custCurrent.options = {};
  let arr = custCurrent.options[groupIdx] || [];
  if (isSingle) {
    arr = arr.includes(choice) ? [] : [choice];
  } else {
    if (arr.includes(choice)) {
      arr = arr.filter(c => c !== choice);
    } else {
      if (max && max < 99 && arr.length >= max) {
        toast(`⚠️ เลือกได้สูงสุด ${max} อย่าง`, true);
        return;
      }
      arr = [...arr, choice];
    }
  }
  custCurrent.options[groupIdx] = arr;
  renderOptionGroups();
  updateCustTotal();
}

function closeCustomize() {
  document.getElementById('modalCust').classList.remove('show');
  editingCartId = null;
}

function adjustCustQty(delta) {
  custCurrent.qty = Math.max(1, custCurrent.qty + delta);
  document.getElementById('custQty').textContent = custCurrent.qty;
  updateCustTotal();
}

function calcLineTotal(line) {
  // Custom item line
  if (line.isCustom) {
    return (line.customPrice || 0) * (line.qty || 1);
  }
  const main = findItem(line.mainId)?.item;
  if (!main) return 0;
  let unit = main.price || 0;
  if (main.optionGroups && line.options) {
    main.optionGroups.forEach((g, gi) => {
      const sel = line.options[gi] || [];
      unit += (g.priceEach || 0) * sel.length;
    });
  }
  return unit * (line.qty || 1);
}

function updateCustTotal() {
  const total = calcLineTotal(custCurrent);
  document.getElementById('btnAddTotal').textContent = '฿' + total;
}

function validateRequiredOptions(item, options) {
  if (!item.optionGroups) return true;
  for (let gi = 0; gi < item.optionGroups.length; gi++) {
    const g = item.optionGroups[gi];
    const minRequired = g.min || 0;
    if (minRequired > 0) {
      const sel = (options && options[gi]) || [];
      if (sel.length < minRequired) {
        toast('⚠️ กรุณาเลือก: ' + g.label, true);
        return false;
      }
    }
  }
  return true;
}

function addToCart() {
  custCurrent.note = document.getElementById('custItemNote').value.trim();
  const item = findItem(custCurrent.mainId)?.item;
  if (!item) return;
  if (!validateRequiredOptions(item, custCurrent.options)) return;

  if (editingCartId) {
    const idx = cart.findIndex(l => l.cartId === editingCartId);
    if (idx >= 0) cart[idx] = { ...cart[idx], ...custCurrent };
    toast('✓ อัปเดตแล้ว');
  } else {
    cart.push({ cartId: 'c-' + Date.now() + Math.random().toString(36).slice(2,5), ...custCurrent });
    toast(`✓ เพิ่ม "${item.name}" แล้ว`);
  }
  saveCart();
  renderMenu();
  updateCartBar();
  closeCustomize();
}

function removeFromCart() {
  if (!editingCartId) return;
  cart = cart.filter(l => l.cartId !== editingCartId);
  saveCart();
  renderMenu();
  updateCartBar();
  closeCustomize();
  toast('🗑️ ลบแล้ว', true);
}

function saveCart() { sessionStorage.setItem(_CART_KEY, JSON.stringify(cart)); }

function getCartTotal() {
  let total = 0, count = 0;
  cart.forEach(l => { total += calcLineTotal(l); count += l.qty; });
  return { total, count };
}

function updateCartBar() {
  const { total, count } = getCartTotal();
  document.getElementById('cartBadge').textContent = count;
  document.getElementById('cartTotal').textContent = '฿' + total;
  document.getElementById('cartBar').classList.toggle('show', count > 0);
}

// ============ Cart Modal ============
function openCart() {
  renderCartLines();
  document.getElementById('modalCart').classList.add('show');
  // Re-check customer + render rewards/breakdown when cart opens
  if (typeof checkCustomer === 'function') checkCustomer();
  if (typeof renderRewardsBox === 'function') renderRewardsBox();
  if (typeof renderOrderBreakdown === 'function') renderOrderBreakdown();
}
function closeCart() { document.getElementById('modalCart').classList.remove('show'); }

function renderCartLines() {
  const wrap = document.getElementById('cartLines');
  if (!cart.length) {
    wrap.innerHTML = '<div class="empty"><div class="big">🛒</div><div>ยังไม่มีของในตะกร้า</div></div>';
    document.getElementById('cartSummary').style.display = 'none';
    document.getElementById('customerForm').style.display = 'none';
    return;
  }
  wrap.innerHTML = cart.map(line => {
    const lineTotal = calcLineTotal(line);

    // Custom item line (factory mode)
    if (line.isCustom) {
      return `
        <div class="cart-line" style="border-left:4px solid #f59e0b">
          <div class="head">
            <div class="name">📝 ${line.customName} <span style="font-size:11px;color:#92400e;background:#fef3c7;padding:2px 8px;border-radius:999px;font-weight:700;margin-left:4px">รายการเอง</span></div>
            <button class="x" onclick="removeLine('${line.cartId}')">×</button>
          </div>
          ${line.note ? `<div class="note-text">📝 ${line.note}</div>` : ''}
          <div class="foot">
            <div class="qty-mini">
              <button class="m" onclick="adjustLineQty('${line.cartId}', -1)">−</button>
              <div class="q">${line.qty}</div>
              <button onclick="adjustLineQty('${line.cartId}', 1)">+</button>
            </div>
            <span class="line-total">฿${lineTotal}</span>
          </div>
        </div>
      `;
    }

    const main = findItem(line.mainId)?.item;
    if (!main) return '';
    // Build option chips
    let optChips = '';
    if (main.optionGroups && line.options) {
      const chips = [];
      main.optionGroups.forEach((g, gi) => {
        const sel = line.options[gi] || [];
        sel.forEach(c => {
          const cls = (g.priceEach === 0) ? 'req' : (g.priceEach === 10 ? 'add10' : 'add5');
          const prefix = g.priceEach > 0 ? '+' : '';
          chips.push(`<span class="opt-chip ${cls}">${prefix}${c}${g.priceEach > 0 ? ` (+${g.priceEach})` : ''}</span>`);
        });
      });
      if (chips.length) optChips = `<div class="opt-list">${chips.join('')}</div>`;
    }
    return `
      <div class="cart-line">
        <div class="head">
          <div class="name">${main.name}</div>
          <button class="x" onclick="removeLine('${line.cartId}')">×</button>
        </div>
        ${optChips}
        ${line.note ? `<div class="note-text">📝 ${line.note}</div>` : ''}
        <div class="foot">
          <div class="qty-mini">
            <button class="m" onclick="adjustLineQty('${line.cartId}', -1)">−</button>
            <div class="q">${line.qty}</div>
            <button onclick="adjustLineQty('${line.cartId}', 1)">+</button>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <button onclick="openCustomize('${line.mainId}', '${line.cartId}')" style="background:#fff;border:1.5px solid #1652F0;color:#1652F0;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700">✏️ แก้</button>
            <span class="line-total">฿${lineTotal}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const { total } = getCartTotal();
  document.getElementById('modalTotal').textContent = '฿' + total;
  document.getElementById('cartSummary').style.display = 'flex';
  document.getElementById('customerForm').style.display = 'block';
  // Show "เพิ่มรายการเอง" only in factory mode
  const btnCustom = document.getElementById('btnAddCustom');
  if (btnCustom) btnCustom.style.display = isFactoryMode ? 'block' : 'none';
  // Re-render rewards + breakdown when cart changes
  if (typeof renderRewardsBox === 'function') renderRewardsBox();
  if (typeof renderOrderBreakdown === 'function') renderOrderBreakdown();
}

// ============ Custom Item (factory mode) ============
let customItemQty = 1;
function openCustomItemModal() {
  customItemQty = 1;
  document.getElementById('customItemName').value = '';
  document.getElementById('customItemPrice').value = '50';
  document.getElementById('customItemNote').value = '';
  document.getElementById('customItemQty').textContent = '1';
  document.getElementById('modalCustomItem').classList.add('show');
}
function closeCustomItemModal() {
  document.getElementById('modalCustomItem').classList.remove('show');
}
function adjustCustomItemQty(delta) {
  customItemQty = Math.max(1, customItemQty + delta);
  document.getElementById('customItemQty').textContent = customItemQty;
}
function addCustomItem() {
  const name = document.getElementById('customItemName').value.trim();
  const price = parseFloat(document.getElementById('customItemPrice').value) || 0;
  const note = document.getElementById('customItemNote').value.trim();
  if (!name) { toast('⚠️ กรุณาใส่ชื่อรายการ', true); return; }
  if (price < 0) { toast('⚠️ ราคาไม่ถูกต้อง', true); return; }
  cart.push({
    cartId: 'cc-' + Date.now() + Math.random().toString(36).slice(2,5),
    isCustom: true,
    customName: name, customPrice: price, qty: customItemQty,
    note
  });
  saveCart();
  renderMenu();
  renderCartLines();
  updateCartBar();
  closeCustomItemModal();
  toast(`✓ เพิ่ม "${name}" แล้ว`);
}

function removeLine(cartId) {
  cart = cart.filter(l => l.cartId !== cartId);
  saveCart();
  renderCartLines();
  renderMenu();
  updateCartBar();
}

function adjustLineQty(cartId, delta) {
  const line = cart.find(l => l.cartId === cartId);
  if (!line) return;
  line.qty = Math.max(1, line.qty + delta);
  saveCart();
  renderCartLines();
  renderMenu();
  updateCartBar();
}

// ============ Customer Lookup ============
// State for selected rewards in cart
let cartRewards = {
  useDiscount: false,
  useDrink: false,
  selectedDrinkId: null,
};
function resetCartRewards() {
  cartRewards = { useDiscount: false, useDrink: false, selectedDrinkId: null };
}

function checkCustomer() {
  const phone = normPhone(document.getElementById('custPhone').value);
  const found = document.getElementById('custFound');
  const nameInput = document.getElementById('custFullName');
  if (phone.length < 9) {
    found.innerHTML = '';
    resetCartRewards();
    renderRewardsBox();
    renderOrderBreakdown();
    return;
  }
  const db = loadDB();
  const c = db.customers[phone];
  if (c) {
    const pts = c.points || 0;
    found.innerHTML = `<div class="customer-found ok">✅ ลูกค้าเดิม: <b>${c.name}</b> · 🌟 ${pts} แต้ม</div>`;
    nameInput.value = c.name === 'ไม่ระบุชื่อ' ? '' : c.name;
  } else {
    found.innerHTML = `<div class="customer-found new">🆕 ลูกค้าใหม่ — สมัครรับ +5 แต้มฟรี!</div>`;
    resetCartRewards();
  }
  renderRewardsBox();
  renderOrderBreakdown();
}

// Render rewards selection box (only if customer has eligible points)
function renderRewardsBox() {
  const box = document.getElementById('rewardsBox');
  if (!box) return;
  // Factory mode: no loyalty
  if (isFactoryMode) { box.style.display = 'none'; return; }
  const phone = normPhone(document.getElementById('custPhone').value);
  if (phone.length < 9) { box.style.display = 'none'; return; }
  const c = loadDB().customers[phone];
  if (!c) { box.style.display = 'none'; return; }
  const pts = c.points || 0;
  if (pts < LOYALTY.REWARD_DRINK_POINTS) { box.style.display = 'none'; return; }

  // Calculate cart subtotal (without rewards applied yet)
  const cartSubtotal = cart.reduce((s, line) => s + calcLineTotal(line), 0);

  const drinkPt = LOYALTY.REWARD_DRINK_POINTS;
  const discountPt = LOYALTY.REWARD_DISCOUNT_POINTS;
  const discountAmt = LOYALTY.REWARD_DISCOUNT_AMOUNT;

  // Used/Remaining points
  const usedPts = (cartRewards.useDiscount ? discountPt : 0) + (cartRewards.useDrink ? drinkPt : 0);
  const remainingPts = pts - usedPts;

  // Eligibility (after current selections)
  const canStillDiscount = (pts - (cartRewards.useDrink ? drinkPt : 0)) >= discountPt && cartSubtotal > 0;
  const canStillDrink    = (pts - (cartRewards.useDiscount ? discountPt : 0)) >= drinkPt;

  // Build drink picker HTML
  let drinkPickerHTML = '';
  if (cartRewards.useDrink) {
    drinkPickerHTML = `
      <div class="drink-picker">
        ${LOYALTY.DRINK_REWARD_IDS.map(id => {
          const drink = findItem(id)?.item;
          if (!drink) return '';
          const active = cartRewards.selectedDrinkId === id;
          return `
            <div class="drink-pick-btn ${active?'active':''}" onclick="selectRewardDrink('${id}')">
              ${drink.name}<br><small>฿${drink.price}</small>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  box.style.display = 'block';
  box.className = 'rewards-card';
  box.innerHTML = `
    <h3>🎁 ใช้แต้มสะสม <span class="pts-badge">🌟 ${pts} แต้ม</span></h3>

    <div class="reward-toggle ${cartRewards.useDiscount?'active':''}" onclick="toggleRewardDiscount()" ${!cartRewards.useDiscount && !canStillDiscount ? 'style="opacity:.5;pointer-events:none"' : ''}>
      <div class="check-circle"></div>
      <div class="body">
        <div class="title">💰 ลด ฿${Math.min(discountAmt, cartSubtotal || discountAmt)} จากบิล</div>
        <div class="meta">${cartSubtotal === 0 ? 'ใส่ของในตะกร้าก่อน' : (canStillDiscount || cartRewards.useDiscount ? 'ใช้กับเมนูใดก็ได้' : 'แต้มไม่พอ')}</div>
      </div>
      <div class="pts-cost">−${discountPt} แต้ม</div>
    </div>

    <div class="reward-toggle ${cartRewards.useDrink?'active':''}" onclick="toggleRewardDrink()" ${!cartRewards.useDrink && !canStillDrink ? 'style="opacity:.5;pointer-events:none"' : ''}>
      <div class="check-circle"></div>
      <div class="body">
        <div class="title">🥤 ฟรีเครื่องดื่ม 1 แก้ว</div>
        <div class="meta">${canStillDrink || cartRewards.useDrink ? (cartRewards.useDrink ? 'เลือกเครื่องดื่มด้านล่าง' : 'ชานมไต้หวั่น / น้ำแก้วโอ่ง') : 'แต้มไม่พอ'}</div>
      </div>
      <div class="pts-cost">−${drinkPt} แต้ม</div>
    </div>
    ${drinkPickerHTML}

    <div class="reward-summary">
      <span>ใช้แต้ม: <b>${usedPts}</b></span>
      <span>คงเหลือ: <b>${remainingPts}</b> แต้ม</span>
    </div>
  `;
}

function toggleRewardDiscount() {
  if (!cartRewards.useDiscount) {
    const phone = normPhone(document.getElementById('custPhone').value);
    const c = loadDB().customers[phone];
    if (!c) return;
    const pts = c.points || 0;
    const remaining = pts - (cartRewards.useDrink ? LOYALTY.REWARD_DRINK_POINTS : 0);
    if (remaining < LOYALTY.REWARD_DISCOUNT_POINTS) { toast('แต้มไม่พอ', true); return; }
    const cartSubtotal = cart.reduce((s, line) => s + calcLineTotal(line), 0);
    if (cartSubtotal <= 0) { toast('ใส่ของในตะกร้าก่อน', true); return; }
  }
  cartRewards.useDiscount = !cartRewards.useDiscount;
  renderRewardsBox();
  renderOrderBreakdown();
}

function toggleRewardDrink() {
  if (!cartRewards.useDrink) {
    const phone = normPhone(document.getElementById('custPhone').value);
    const c = loadDB().customers[phone];
    if (!c) return;
    const pts = c.points || 0;
    const remaining = pts - (cartRewards.useDiscount ? LOYALTY.REWARD_DISCOUNT_POINTS : 0);
    if (remaining < LOYALTY.REWARD_DRINK_POINTS) { toast('แต้มไม่พอ', true); return; }
    // Auto-pick first drink as default
    if (!cartRewards.selectedDrinkId) cartRewards.selectedDrinkId = LOYALTY.DRINK_REWARD_IDS[0];
  } else {
    cartRewards.selectedDrinkId = null;
  }
  cartRewards.useDrink = !cartRewards.useDrink;
  renderRewardsBox();
  renderOrderBreakdown();
}

function selectRewardDrink(drinkId) {
  cartRewards.selectedDrinkId = drinkId;
  renderRewardsBox();
  renderOrderBreakdown();
}

// Render order breakdown (subtotal, discount, total)
function renderOrderBreakdown() {
  const el = document.getElementById('orderBreakdown');
  if (!el) return;
  const cartSubtotal = cart.reduce((s, line) => s + calcLineTotal(line), 0);
  if (cartSubtotal === 0) { el.innerHTML = ''; document.getElementById('confirmTotal').textContent = ''; return; }

  const drinkPt = LOYALTY.REWARD_DRINK_POINTS;
  const discountPt = LOYALTY.REWARD_DISCOUNT_POINTS;
  const discountAmt = LOYALTY.REWARD_DISCOUNT_AMOUNT;

  let drinkValue = 0;
  let drinkName = '';
  if (cartRewards.useDrink && cartRewards.selectedDrinkId) {
    const drink = findItem(cartRewards.selectedDrinkId)?.item;
    if (drink) {
      drinkValue = drink.price;
      drinkName = drink.name;
    }
  }
  const discountValue = cartRewards.useDiscount ? Math.min(discountAmt, cartSubtotal) : 0;
  // Subtotal (cart only) + drink (free) - discount
  const finalTotal = Math.max(0, cartSubtotal - discountValue);

  el.innerHTML = `
    <div class="breakdown-row subtotal"><span>ค่าอาหาร</span><span>฿${cartSubtotal}</span></div>
    ${cartRewards.useDrink && drinkValue > 0 ? `<div class="breakdown-row free"><span>+ ฟรี ${drinkName}</span><span>ฟรี (฿${drinkValue})</span></div>` : ''}
    ${cartRewards.useDiscount ? `<div class="breakdown-row discount"><span>− ส่วนลด (15 แต้ม)</span><span>−฿${discountValue}</span></div>` : ''}
    <div class="breakdown-row total"><span>ยอดที่ต้องจ่าย</span><span>฿${finalTotal}</span></div>
  `;
  document.getElementById('confirmTotal').textContent = ` · ฿${finalTotal}`;
}

// ============ Submit Order ============
async function submitOrder() {
  const isShopMode = new URLSearchParams(location.search).get('mode') === 'shop';
  const phone = normPhone(document.getElementById('custPhone').value);
  const name = document.getElementById('custFullName').value.trim();
  if (!cart.length) return toast('⚠️ ตะกร้าว่าง', true);

  // Shop mode: phone OR name required. Customer mode: phone required.
  if (!isShopMode && (!phone || phone.length < 9)) return toast('⚠️ กรุณากรอกเบอร์โทร', true);
  if (isShopMode && !phone && !name) return toast('⚠️ กรอกเบอร์ หรือชื่อ อย่างน้อยอย่างใดอย่างหนึ่ง', true);

  const db = loadDB();
  const customerId = phone || (isFactoryMode ? 'factory-' + Date.now() : 'walkin-' + Date.now());
  let customer = phone ? db.customers[phone] : null;
  let signupBonusGiven = false;
  if (!customer) {
    const customerName = name || (phone ? 'ลูกค้า ' + phone.slice(-4) : (isFactoryMode ? 'โรงงาน' : 'ไม่ระบุชื่อ'));
    customer = {
      id: customerId, name: customerName, phone: phone || '',
      // Loyalty fields — factory customers don't get signup bonus or earn points
      points: isFactoryMode ? 0 : LOYALTY.SIGNUP_BONUS,
      lifetime_points: isFactoryMode ? 0 : LOYALTY.SIGNUP_BONUS,
      signup_bonus_received: !isFactoryMode,    // skip bonus for factory
      is_factory: !!isFactoryMode,
      drink_redeemed_count: 0,
      dish_redeemed_count: 0,
      total_boxes: 0, redeemed_count: 0,
      joined: new Date().toISOString()
    };
    db.customers[customerId] = customer;
    signupBonusGiven = !isFactoryMode;
  } else {
    if (name && customer.name === 'ไม่ระบุชื่อ') customer.name = name;
    if (customer.points == null) customer.points = 0;
    if (customer.lifetime_points == null) customer.lifetime_points = 0;
    // Skip signup bonus for factory orders even if customer hasn't gotten it
    if (!isFactoryMode && !customer.signup_bonus_received) {
      customer.points += LOYALTY.SIGNUP_BONUS;
      customer.lifetime_points += LOYALTY.SIGNUP_BONUS;
      customer.signup_bonus_received = true;
      signupBonusGiven = true;
    }
  }

  // Convert cart lines to order items (with option breakdown)
  const items = [];
  cart.forEach(line => {
    // Custom item line (factory)
    if (line.isCustom) {
      items.push({
        id: line.cartId,
        name: '📝 ' + line.customName,
        mainName: line.customName,
        price: line.customPrice || 0,
        qty: line.qty || 1,
        isCustom: true,
        options: [],
        note: line.note || ''
      });
      return;
    }
    const main = findItem(line.mainId)?.item;
    if (!main) return;
    // Flatten options into a structured list + name suffix
    const optList = [];
    let optPrice = 0;
    if (main.optionGroups && line.options) {
      main.optionGroups.forEach((g, gi) => {
        const sel = line.options[gi] || [];
        sel.forEach(c => {
          optList.push({ group: g.label, choice: c, price: g.priceEach || 0 });
          optPrice += g.priceEach || 0;
        });
      });
    }
    const unitPrice = (main.price || 0) + optPrice;
    // Display name: include required-choice in parens, +addOns inline
    const reqParts = [], addParts = [];
    optList.forEach(o => {
      if (o.price === 0) reqParts.push(o.choice);
      else addParts.push('+' + o.choice);
    });
    const displayName = main.name
      + (reqParts.length ? ' (' + reqParts.join(', ') + ')' : '')
      + (addParts.length ? ' ' + addParts.join(' ') : '');
    items.push({
      id: line.mainId,
      name: displayName,
      price: unitPrice,
      qty: line.qty,
      mainName: main.name,
      options: optList,
      note: line.note || ''
    });
  });

  if (!db.pendingOrders) db.pendingOrders = [];
  // Original total = sum of regular cart items (used for points calculation later)
  const cartSubtotal = items.reduce((s, it) => s + it.price * it.qty, 0);

  // Apply selected rewards (customer-driven)
  const redemptions = [];
  let discountTotal = 0;
  // Add free drink as item
  if (cartRewards.useDrink && cartRewards.selectedDrinkId) {
    const drink = findItem(cartRewards.selectedDrinkId)?.item;
    if (drink) {
      items.push({
        id: drink.id, name: drink.name, mainName: drink.name,
        price: drink.price, qty: 1, freeQty: 1, isReward: true,
        options: [], note: ''
      });
      redemptions.push({
        type: 'drink', drinkId: drink.id, label: drink.name,
        points_used: LOYALTY.REWARD_DRINK_POINTS, value: drink.price,
        at: new Date().toISOString()
      });
      discountTotal += drink.price; // free drink value counts in discount
    }
  }
  // Apply discount
  if (cartRewards.useDiscount) {
    const discountValue = Math.min(LOYALTY.REWARD_DISCOUNT_AMOUNT, cartSubtotal);
    redemptions.push({
      type: 'discount', label: `ลด ฿${discountValue}`,
      points_used: LOYALTY.REWARD_DISCOUNT_POINTS, value: discountValue,
      at: new Date().toISOString()
    });
    discountTotal += discountValue;
  }

  // What customer pays = cart subtotal - dish discount (free drink doesn't add)
  const finalTotal = Math.max(0, cartSubtotal - (cartRewards.useDiscount ? Math.min(LOYALTY.REWARD_DISCOUNT_AMOUNT, cartSubtotal) : 0));

  // Deduct points immediately
  if (redemptions.length > 0) {
    const totalPtsUsed = redemptions.reduce((s, r) => s + r.points_used, 0);
    customer.points = Math.max(0, (customer.points || 0) - totalPtsUsed);
    if (cartRewards.useDrink) customer.drink_redeemed_count = (customer.drink_redeemed_count || 0) + 1;
    if (cartRewards.useDiscount) customer.dish_redeemed_count = (customer.dish_redeemed_count || 0) + 1;
    db.customers[customerId] = customer;
  }

  const orderId = 'PO' + Date.now();
  const orderRecord = {
    id: orderId,
    date: new Date().toISOString(),
    customer_id: customerId,
    customer_name: customer.name,
    customer_phone: phone || '',
    items,
    total: finalTotal,
    note: '',
    status: 'pending',
    source: isFactoryMode ? 'factory' : (isShopMode ? 'walk-in' : 'online'),
  };
  // Preserve original for points calculation
  if (redemptions.length > 0) {
    orderRecord.redemptions = redemptions;
    orderRecord.discount = discountTotal;
    orderRecord.original_total = cartSubtotal;
    // Note: original_items stored without the free drink (so we don't double-count)
    orderRecord.original_items = JSON.parse(JSON.stringify(items.filter(it => !it.isReward)));
  }
  db.pendingOrders.push(orderRecord);

  saveDB(db);

  const orderObj = db.pendingOrders[db.pendingOrders.length - 1];

  // Remember customer for next visit (only customer mode)
  if (!isShopMode && phone) {
    localStorage.setItem('lastCustomerPhone', phone);
    if (customer.name && customer.name !== 'ไม่ระบุชื่อ') {
      localStorage.setItem('lastCustomerName', customer.name);
    }
  }

  // Sync to cloud — AWAIT to guarantee write before redirect
  toast('⏳ กำลังส่งครัว...');
  await new Promise(resolve => {
    whenCloudReady(async () => {
      try {
        await window.cloud.saveCustomer(customer);
        await window.cloud.saveOrder(orderObj);
      } catch (e) { console.warn('cloud sync failed', e); }
      resolve();
    });
    // Failsafe timeout — don't wait forever
    setTimeout(resolve, 4000);
  });

  cart = [];
  sessionStorage.removeItem('cartV2');
  resetCartRewards();

  if (isShopMode) {
    // Stay on menu, clear form, show toast
    document.getElementById('custPhone').value = '';
    document.getElementById('custFullName').value = '';
    document.getElementById('custFound').innerHTML = '';
    closeCart();
    renderMenu();
    updateCartBar();
    toast(`✓ ส่งครัวแล้ว! ${customer.name} · ฿${total}${signupBonusGiven?' · 🎁 +5 แต้มสมัครใหม่!':''}`);
  } else {
    setTimeout(() => {
      window.location.href = `status.html?order=${orderId}&phone=${phone || customerId}`;
    }, 400);
  }
}

// ============ Returning Customer ============
const isShopMode = new URLSearchParams(location.search).get('mode') === 'shop';
const lastPhone = localStorage.getItem('lastCustomerPhone');
const lastName = localStorage.getItem('lastCustomerName');

function renderUserWidget(customer, pendingOrder, recentDoneOrder) {
  const w = document.getElementById('userWidget');
  if (!w) return;
  if (isShopMode) { w.classList.remove('show'); return; } // Don't show in shop mode

  if (pendingOrder) {
    w.className = 'user-widget cooking show';
    w.innerHTML = `
      <div class="avatar">👨‍🍳</div>
      <div class="info">
        <div class="name">กำลังทำอาหารให้คุณ...</div>
        <div class="meta">Order #${pendingOrder.id.slice(-6)} · ${pendingOrder.items.length} รายการ · ฿${pendingOrder.total}</div>
      </div>
      <a class="action" href="status.html?order=${pendingOrder.id}&phone=${pendingOrder.customer_phone || pendingOrder.customer_id}">ดูสถานะ →</a>
    `;
  } else if (recentDoneOrder) {
    w.className = 'user-widget done show';
    w.innerHTML = `
      <div class="avatar">✓</div>
      <div class="info">
        <div class="name">order ที่แล้วเสร็จแล้ว 🎉</div>
        <div class="meta">${recentDoneOrder.items.length} รายการ · ฿${recentDoneOrder.total}</div>
      </div>
      <a class="action" href="points.html?phone=${recentDoneOrder.customer_phone || recentDoneOrder.customer_id}">ดูแต้ม →</a>
    `;
  } else if (customer) {
    const pts = customer.points || 0;
    let rewardPill = '';
    if (pts >= LOYALTY.REWARD_DISCOUNT_POINTS) rewardPill = ` <span class="reward-pill">🎁 ลด 50฿ พร้อมใช้</span>`;
    else if (pts >= LOYALTY.REWARD_DRINK_POINTS) rewardPill = ` <span class="reward-pill">🥤 ฟรีเครื่องดื่มพร้อมใช้</span>`;
    const initial = customer.name.charAt(0) || '?';
    w.className = 'user-widget show';
    w.innerHTML = `
      <div class="avatar">${initial}</div>
      <div class="info">
        <div class="name">สวัสดี ${customer.name} 👋</div>
        <div class="meta">🌟 ${pts} แต้ม${rewardPill}</div>
      </div>
      <a class="action" href="javascript:openCart()">สั่งใหม่</a>
    `;
  } else {
    w.classList.remove('show');
  }
}

function initReturningCustomer() {
  if (!lastPhone || isShopMode) return;
  const db = loadDB();
  const customer = db.customers[lastPhone];

  // Render from LOCAL cache first (instant, before cloud loads)
  const localOrders = (db.pendingOrders || []).filter(o =>
    o.customer_phone === lastPhone || o.customer_id === lastPhone
  );
  const localPending = localOrders.find(o => o.status === 'pending');
  let localRecentDone = null;
  if (!localPending) {
    const cutoff = Date.now() - 30 * 60 * 1000;
    localRecentDone = localOrders
      .filter(o => o.status === 'done' && new Date(o.completed_at || o.date).getTime() > cutoff)
      .sort((a, b) => new Date(b.completed_at || b.date) - new Date(a.completed_at || a.date))[0];
  }
  if (customer || localPending || localRecentDone) {
    renderUserWidget(customer, localPending, localRecentDone);
  }

  whenCloudReady(async () => {
    // Get fresh customer data
    const cloudCust = await window.cloud.getCustomer(lastPhone);
    if (cloudCust) {
      db.customers[lastPhone] = cloudCust;
      saveDB(db);
    }
    // Subscribe to orders, find this customer's pending or recent done
    window.cloud.onOrders(orders => {
      const myOrders = orders.filter(o =>
        o.customer_phone === lastPhone || o.customer_id === lastPhone
      );
      const pending = myOrders.find(o => o.status === 'pending');
      let recentDone = null;
      if (!pending) {
        // Show "done" banner if order completed within 30 min
        const cutoff = Date.now() - 30 * 60 * 1000;
        recentDone = myOrders
          .filter(o => o.status === 'done' && new Date(o.completed_at || o.date).getTime() > cutoff)
          .sort((a, b) => new Date(b.completed_at || b.date) - new Date(a.completed_at || a.date))[0];
      }
      renderUserWidget(cloudCust || customer, pending, recentDone);
    });
  });
}

// Pre-fill phone in cart for returning customer
const origOpenCart = openCart;
openCart = function() {
  origOpenCart();
  if (lastPhone && !document.getElementById('custPhone').value) {
    document.getElementById('custPhone').value = lastPhone;
    if (lastName) document.getElementById('custFullName').value = lastName;
    checkCustomer();
  }
};

// ============ Init ============
renderMenu();
updateCartBar();
initReturningCustomer();

window.addEventListener('scroll', () => {
  const visibleCats = MENU.filter(c => !c.isAddOn);
  const sections = visibleCats.map((_, i) => document.getElementById('cat-' + i));
  const offset = 220;
  let activeIdx = 0;
  sections.forEach((s, i) => { if (s && s.offsetTop - offset <= window.scrollY) activeIdx = i; });
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === activeIdx));
});
</script>
