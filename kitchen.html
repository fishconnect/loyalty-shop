<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>ครัว · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f3f4f6; color: #111827;
    padding-bottom: 40px;
  }
  button { font-family: inherit; cursor: pointer; }

  header {
    background: #ffffff; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #4F7AFF;
    position: sticky; top: 0; z-index: 10;
  }
  header img.logo { height: 48px; width: 48px; object-fit: contain; border-radius: 8px; }
  header .info { flex: 1; }
  header h1 { font-size: 17px; color: #1652F0; line-height: 1.2; }
  header .sub { font-size: 11px; color: #4F7AFF; margin-top: 2px; }
  header a {
    background: #1652F0; color: #fff; text-decoration: none;
    padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
  }

  .summary-bar {
    background: #fff; padding: 12px 16px;
    display: flex; gap: 12px; justify-content: center;
    border-bottom: 1px solid #e5e7eb;
  }
  .stat-pill {
    background: #ebf0ff; padding: 6px 14px; border-radius: 999px;
    font-size: 13px; color: #1652F0; font-weight: 600;
  }
  .stat-pill .num { font-size: 16px; font-weight: 800; }

  main { padding: 12px; }

  .order-list { display: flex; flex-direction: column; gap: 12px; max-width: 700px; margin: 0 auto; }

  .order {
    background: #fff; border-radius: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    overflow: hidden;
  }
  .order.pending { border: 2px solid #88a4ff; }
  .order.done { opacity: .6; }
  .order-head {
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
    background: #f7f8fb;
  }
  .order.done .order-head { background: #f3f4f6; }
  .order-head .name { font-size: 16px; font-weight: 700; }
  .order-head .phone { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .order-head .time { font-size: 12px; color: #6b7280; text-align: right; }
  .order-head .status {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; margin-top: 4px;
  }
  .order.pending .status { background: #88a4ff; color: #fff; }
  .order.done .status { background: #16a34a; color: #fff; }

  .order-items {
    padding: 12px 16px;
  }
  .order-item-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 6px 0; font-size: 14.5px;
    border-bottom: 1px dashed #f3f4f6;
  }
  .order-item-row:last-child { border-bottom: none; }
  .order-item-row .name { flex: 1; }
  .order-item-row .qty { font-weight: 700; min-width: 50px; text-align: center; color: #1652F0; font-size: 16px; }
  .order-item-row .price { min-width: 60px; text-align: right; color: #6b7280; font-size: 13px; }

  .order-note {
    margin-top: 8px; padding: 8px 10px; background: #ebf0ff; border-radius: 6px;
    font-size: 13px; color: #1f2a44;
  }
  .order-note b { font-weight: 700; }

  .order-foot {
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
    background: #fafafa; border-top: 1px solid #f3f4f6;
  }
  .order-foot .total { font-weight: 800; color: #1652F0; font-size: 16px; }
  .order-foot .total .small { font-weight: 500; color: #6b7280; font-size: 13px; }

  .order-actions {
    padding: 12px 16px; display: flex; gap: 8px;
  }
  .order-actions button {
    flex: 1; padding: 14px; border-radius: 10px;
    font-size: 15px; font-weight: 700; border: none;
  }
  .btn-done { background: #16a34a; color: #fff; }
  .btn-cancel { background: transparent; color: #dc2626; border: 1px solid #dc2626; max-width: 120px; flex: 0; }

  .empty {
    text-align: center; color: #9ca3af; padding: 60px 20px;
  }
  .empty .big { font-size: 48px; margin-bottom: 16px; }
  .empty .text { font-size: 15px; }

  .toggle-bar {
    display: flex; gap: 4px; padding: 12px 16px 0; max-width: 700px; margin: 0 auto;
  }
  .toggle-bar button {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; background: #e5e7eb; color: #6b7280;
  }
  .toggle-bar button.active { background: #1652F0; color: #fff; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #111827; color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 14px; z-index: 200; opacity: 0;
    transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Login overlay (only when standalone — iframe shares parent session) -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#1652F0,#0738C9);z-index:9999;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center">
    <img src="logo.jpg" style="width:64px;height:64px;border-radius:14px;margin:0 auto 12px;display:block">
    <h2 style="color:#0a1530;margin-bottom:4px;font-size:20px">เข้าสู่ระบบครัว</h2>
    <div style="color:#5c6982;font-size:13px;margin-bottom:20px">ครัวผู้ใหญ่ปอง</div>
    <input id="loginPwd" type="password" placeholder="รหัสผ่าน" style="width:100%;padding:14px;border:2px solid #d1ddff;border-radius:12px;font-size:16px;text-align:center;letter-spacing:.2em;margin-bottom:12px;font-family:inherit;box-sizing:border-box" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:14px;background:linear-gradient(135deg,#4F7AFF,#1652F0);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer">เข้าสู่ระบบ</button>
    <div id="loginErr" style="color:#dc2626;font-size:13px;margin-top:10px;display:none">รหัสผ่านไม่ถูก</div>
  </div>
</div>

<script>
  const isEmbedded = new URLSearchParams(location.search).get('embed') === '1';
  function isLoggedIn() { return sessionStorage.getItem('admin_logged_in') === '1'; }
  function doLogin() {
    const pwd = document.getElementById('loginPwd').value;
    const stored = localStorage.getItem('admin_pwd') || '1234';
    if (pwd === stored) {
      sessionStorage.setItem('admin_logged_in', '1');
      document.getElementById('loginOverlay').style.display = 'none';
    } else {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('loginPwd').value = '';
    }
  }
  // Standalone (not in iframe) requires login
  if (!isEmbedded && !isLoggedIn()) {
    document.getElementById('loginOverlay').style.display = 'flex';
    setTimeout(() => document.getElementById('loginPwd')?.focus(), 100);
  }
</script>

<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
let view = 'pending';
let lastPendingCount = 0;
let cloudOrders = null; // null = not yet loaded; otherwise array
let cloudCustomers = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.pendingOrders) d.pendingOrders = [];
      if (!d.settings) d.settings = { goal: 20, pricePerBox: 50 };
      return d;
    }
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], settings: { goal: 20, pricePerBox: 50 }, pendingOrders: [] };
}
function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }) + ' ' +
         d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function setView(v) {
  view = v;
  document.getElementById('tabPending').classList.toggle('active', v === 'pending');
  document.getElementById('tabDone').classList.toggle('active', v === 'done');
  render();
}

function render() {
  const db = loadDB();
  // Prefer cloud data if loaded, fallback to local
  const orders = (cloudOrders !== null) ? cloudOrders : (db.pendingOrders || []);
  const pending = orders.filter(o => o.status === 'pending').sort((a, b) => new Date(b.date) - new Date(a.date));
  const done = orders.filter(o => o.status === 'done').sort((a, b) => new Date(b.completed_at || b.date) - new Date(a.completed_at || a.date));

  // Stats
  document.getElementById('statPending').textContent = pending.length;
  const today = new Date().toLocaleDateString('en-CA');
  const doneToday = done.filter(o => (o.completed_at || o.date).slice(0,10) === today);
  document.getElementById('statDone').textContent = doneToday.length;

  // Sound on new pending
  if (pending.length > lastPendingCount && lastPendingCount > 0) {
    try { document.getElementById('ding').play(); } catch(e) {}
  }
  lastPendingCount = pending.length;

  const list = view === 'pending' ? pending : done;
  const wrap = document.getElementById('orderList');

  if (!list.length) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="big">${view === 'pending' ? '☕' : '✓'}</div>
        <div class="text">${view === 'pending' ? 'ยังไม่มี order ใหม่' : 'ยังไม่มี order ที่เสร็จวันนี้'}</div>
      </div>
    `;
    return;
  }

  wrap.innerHTML = list.map(o => {
    const mainCount = countMainDishes(o.items);
    const rewardInfo = o.status === 'pending' ? getRewardInfo(o) : { available: 0 };
    const hasUnusedRewards = rewardInfo.available > 0 && !o.free_boxes_used;
    return `
      <div class="order ${o.status}">
        <div class="order-head">
          <div>
            <div class="name">${o.customer_name}</div>
            <div class="phone">📞 ${o.customer_phone}</div>
            <div class="status">${o.status === 'pending' ? '🔥 รอทำ' : '✓ เสร็จแล้ว'}</div>
          </div>
          <div class="time">
            ${fmtTime(o.date)}<br>
            <span style="font-size:11px;color:#9ca3af">${o.id.slice(-6)}</span>
          </div>
        </div>
        <div class="order-items">
          ${o.items.map(it => {
            const free = it.freeQty || 0;
            const paid = it.qty - free;
            const lineTotal = it.price * paid;
            return `
            <div class="order-item-row">
              <div class="name">${it.name}${free>0?` <span style="background:#16a34a;color:#fff;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:800;margin-left:4px">ฟรี ${free}</span>`:''}</div>
              <div class="qty">×${it.qty}</div>
              <div class="price">${free>0 && paid===0 ? '<span style="color:#16a34a;font-weight:700">ฟรี</span>' : '฿' + lineTotal}</div>
            </div>
          `;}).join('')}
          ${o.note ? `<div class="order-note"><b>หมายเหตุ:</b> ${o.note}</div>` : ''}
          ${o.discount ? `<div style="margin-top:8px;padding:8px 10px;background:#dcfce7;border-radius:6px;font-size:13px;color:#166534;font-weight:700">🎁 ใช้สิทธิ์ฟรี ${o.free_boxes_used} กล่อง · ลด ฿${o.discount}</div>` : ''}
        </div>
        <div class="order-foot">
          <span style="color:#6b7280;font-size:13px">${mainCount} กล่องหลัก (=${mainCount} แต้ม)</span>
          <span class="total">฿${o.total} <span class="small">${o.discount?'ลูกค้าจ่าย':'รวม'}</span></span>
        </div>
        ${o.status === 'pending' ? `
          ${hasUnusedRewards ? `
            <div style="padding:8px 16px 0">
              <button onclick="openFreePrompt('${o.id}')" style="width:100%;padding:12px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(22,163,74,.25);display:flex;align-items:center;justify-content:center;gap:6px">
                🎁 ใช้สิทธิ์ฟรี <span style="background:rgba(255,255,255,.2);padding:2px 8px;border-radius:999px;font-size:12px">มี ${rewardInfo.available}</span>
              </button>
            </div>
          ` : ''}
          ${o.free_boxes_used ? `
            <div style="padding:8px 16px 0">
              <button onclick="openFreePrompt('${o.id}')" style="width:100%;padding:10px;background:#dcfce7;color:#166534;border:1.5px solid #16a34a;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">
                🎁 ใช้ฟรี ${o.free_boxes_used} กล่อง · ลด ฿${o.discount} (กดเพื่อแก้)
              </button>
            </div>
          ` : ''}
          <div class="order-actions">
            <button class="btn-cancel" onclick="cancelOrder('${o.id}')">ยกเลิก</button>
            <button onclick="editOrderModal('${o.id}')" style="background:#ebf0ff;color:#1652F0;border:1.5px solid #1652F0;flex:0;max-width:90px">✏️ แก้</button>
            <button class="btn-done" onclick="markDone('${o.id}')">✓ ทำเสร็จแล้ว</button>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

async function markDone(orderId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const mainBoxes = countMainDishes(order.items);
  const freeUsed = order.free_boxes_used || 0;
  const summary = freeUsed > 0
    ? `${order.customer_name} · ฿${order.total} (ใช้ฟรี ${freeUsed} กล่อง)`
    : `${order.customer_name} · ฿${order.total}`;
  if (!confirm(`ทำเสร็จแล้ว?\n\n${summary}\n\nเพิ่ม ${mainBoxes} กล่องเข้าแต้มลูกค้า`)) return;
  await finalizeOrder(orderId);
}

// Compute customer's reward state — used to show "ใช้ฟรี" button
function getRewardInfo(order) {
  const db = loadDB();
  let customer = db.customers[order.customer_id];
  if (!customer && cloudCustomers && cloudCustomers[order.customer_id]) customer = cloudCustomers[order.customer_id];
  if (!customer) return { available: 0, customer: null };
  const goal = db.settings.goal || 20;
  const mainBoxes = countMainDishes(order.items);
  const newTotal = (customer.total_boxes || 0) + mainBoxes;
  const available = Math.floor(newTotal / goal) - (customer.redeemed_count || 0);
  return { available: Math.max(0, available), customer, mainBoxes };
}

// ========== Apply Free Reward (during pending — before cooking done) ==========
function openFreePrompt(orderId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const info = getRewardInfo(order);
  if (info.available === 0) return toast('⚠️ ลูกค้ายังไม่มีสิทธิ์ฟรี');
  showFreePromptModal(order, info.customer, info.available, info.mainBoxes);
}

function showFreePromptModal(order, customer, available, mainBoxes) {
  const price = (loadDB().settings.pricePerBox) || 50;
  const maxUse = Math.min(available, mainBoxes);
  const phone = (customer.phone || order.customer_phone || '').replace(/\D/g, '');
  const baseTotal = order.original_total || order.total;

  const optionButtons = [];
  for (let i = maxUse; i >= 1; i--) {
    const discount = i * price;
    optionButtons.push(`
      <button onclick="applyFree('${order.id}', ${i})" style="width:100%;padding:14px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;margin-bottom:8px;cursor:pointer;box-shadow:0 4px 12px rgba(22,163,74,.25)">
        🎁 ใช้ฟรี ${i} กล่อง · ลด ฿${discount} <span style="opacity:.85;font-weight:600">(เก็บ ฿${baseTotal - discount})</span>
      </button>
    `);
  }

  const currentlyApplied = order.free_boxes_used || 0;

  const html = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0" onclick="this.remove()">
      <div onclick="event.stopPropagation()" style="background:#fff;width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:24px 20px;max-height:92vh;overflow-y:auto">
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:48px">🎁</div>
          <div style="font-size:18px;font-weight:800;color:#0a1530;margin-top:4px">ใช้สิทธิ์ฟรี</div>
          <div style="font-size:14px;color:#5c6982;margin-top:4px"><b>${customer.name}</b> มีสิทธิ์ฟรี <b style="color:#16a34a">${available} กล่อง</b> · ออเดอร์นี้มี ${mainBoxes} จานหลัก</div>
          ${currentlyApplied > 0 ? `<div style="background:#dcfce7;color:#166534;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;display:inline-block;margin-top:8px">ตอนนี้ใช้อยู่ ${currentlyApplied} กล่อง</div>` : ''}
        </div>
        <div style="background:#f7f8fb;padding:12px;border-radius:10px;font-size:14px;text-align:center;margin-bottom:14px">
          <div style="color:#5c6982">ยอดเต็ม</div>
          <div style="font-size:22px;font-weight:900;color:#1652F0">฿${baseTotal}</div>
        </div>
        <div style="background:#fef3c7;color:#92400e;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;line-height:1.5">
          ℹ️ <b>ใช้สิทธิ์แล้ว order ยังอยู่ในคิว</b> — ทำอาหารเสร็จค่อยกด "ทำเสร็จ"
        </div>
        ${optionButtons.join('')}
        ${currentlyApplied > 0 ? `
          <button onclick="unapplyFree('${order.id}')" style="width:100%;padding:14px;background:#fee2e2;color:#dc2626;border:1.5px solid #dc2626;border-radius:12px;font-size:15px;font-weight:700;margin-bottom:8px;cursor:pointer">
            ↩️ ยกเลิกการใช้ฟรี (กลับเป็น ฿${baseTotal})
          </button>
        ` : ''}
        ${phone ? `
          <a href="tel:${phone}" style="display:block;text-align:center;padding:14px;background:#fef3c7;color:#92400e;border:1.5px solid #f59e0b;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;margin-bottom:8px">
            📞 โทรถามลูกค้าก่อน (${phone})
          </a>
        ` : ''}
        <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;padding:12px;background:transparent;color:#6b7280;border:none;font-size:14px;cursor:pointer">ปิด</button>
      </div>
    </div>
  `;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  document.body.appendChild(tmp.firstElementChild);
}

async function applyFree(orderId, freeQty) {
  document.querySelectorAll('div[style*="z-index:300"]').forEach(el => el.remove());
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;

  // Use ORIGINAL items/total to recompute (allows re-applying with different qty)
  const originalItems = order.original_items || JSON.parse(JSON.stringify(order.items));
  const originalTotal = order.original_total || order.total;

  // Reset items
  let items = JSON.parse(JSON.stringify(originalItems));
  let remaining = freeQty;
  let discount = 0;
  const sorted = [...items].sort((a, b) => b.price - a.price);
  for (const it of sorted) {
    if (remaining <= 0) break;
    const cat = MENU.find(c => c.items.some(i => i.id === it.id));
    if (cat?.isAddOn) continue;
    const useFree = Math.min(remaining, it.qty);
    it.freeQty = useFree;
    it.discount = it.price * useFree;
    discount += it.discount;
    remaining -= useFree;
  }
  const adjustedTotal = originalTotal - discount;

  const updates = {
    items, total: adjustedTotal,
    discount, free_boxes_used: freeQty,
    original_items: originalItems, original_total: originalTotal
  };

  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) Object.assign(local, updates);
  saveDB(db);

  if (window.cloud) await window.cloud.updateOrder(orderId, updates);

  toast(`🎁 ใช้สิทธิ์ฟรี ${freeQty} กล่อง · ลด ฿${discount} · ทำอาหารต่อได้`);
  render();
}

async function unapplyFree(orderId) {
  document.querySelectorAll('div[style*="z-index:300"]').forEach(el => el.remove());
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const updates = {
    items: order.original_items || order.items,
    total: order.original_total || order.total,
    discount: 0,
    free_boxes_used: 0
  };
  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) {
    Object.assign(local, updates);
    delete local.original_items;
    delete local.original_total;
  }
  saveDB(db);
  if (window.cloud) await window.cloud.updateOrder(orderId, updates);
  toast('↩️ ยกเลิกการใช้ฟรี');
  render();
}

async function finalizeOrder(orderId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;

  // Get customer
  let customer = db.customers[order.customer_id];
  if (!customer && cloudCustomers && cloudCustomers[order.customer_id]) {
    customer = cloudCustomers[order.customer_id];
    db.customers[order.customer_id] = customer;
  }
  if (!customer) {
    customer = { id: order.customer_id, name: order.customer_name, phone: order.customer_phone, total_boxes: 0, redeemed_count: 0, joined: order.date };
    db.customers[order.customer_id] = customer;
  }

  const mainBoxes = countMainDishes(order.items);
  const price = db.settings.pricePerBox || 50;
  const freeQty = order.free_boxes_used || 0;

  // Add boxes + redeem rewards
  customer.total_boxes += mainBoxes;
  if (freeQty > 0) customer.redeemed_count = (customer.redeemed_count || 0) + freeQty;

  // Push to db.orders (items already have freeQty marks if applied earlier)
  if (!db.orders) db.orders = [];
  db.orders.push({
    id: 'O' + Date.now(),
    date: order.date,
    completed_at: new Date().toISOString(),
    customer_id: customer.id,
    customer_name: customer.name,
    boxes: mainBoxes,
    items: order.items,
    price_per_box: price,
    total: order.total,
    discount: order.discount || 0,
    free_boxes_used: freeQty,
    note: order.note || '',
    source: order.source || 'online'
  });

  const updates = {
    status: 'done',
    completed_at: new Date().toISOString()
  };
  const localOrder = db.pendingOrders.find(o => o.id === orderId);
  if (localOrder) Object.assign(localOrder, updates);

  saveDB(db);

  if (window.cloud) {
    await window.cloud.updateOrder(orderId, updates);
    await window.cloud.saveCustomer(customer);
  }

  render();

  if (freeQty > 0) {
    toast(`✓ เสร็จ + ใช้ฟรี ${freeQty} · ลูกค้าจ่าย ฿${order.total}`);
  } else {
    const goal = db.settings.goal || 20;
    toast(`✓ เสร็จ! ${customer.name} สะสม ${customer.total_boxes}/${goal}`);
  }
}

// ========== Edit Order ==========
let editingOrder = null;
let editingItems = [];

function editOrderModal(orderId) {
  const orderSrc = cloudOrders !== null ? cloudOrders : (loadDB().pendingOrders || []);
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  editingOrder = order;
  editingItems = JSON.parse(JSON.stringify(order.items || []));
  document.getElementById('editNote').value = order.note || '';
  renderEditBody();
  document.getElementById('editModal').style.display = 'flex';
}

function renderEditBody() {
  const total = editingItems.reduce((s, it) => s + it.price * it.qty, 0);
  document.getElementById('editBody').innerHTML = `
    <div style="background:#f7f8fb;padding:10px;border-radius:8px;font-size:13px;color:#5c6982;margin-bottom:10px">
      <b>${editingOrder.customer_name}</b> · ${editingOrder.customer_phone || '—'}
    </div>
    ${editingItems.map((it, i) => `
      <div style="display:flex;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">
        <input type="text" value="${(it.name || '').replace(/"/g,'&quot;')}" oninput="editingItems[${i}].name=this.value" style="flex:2;padding:8px;font-size:13px;border:1px solid #e2e7ef;border-radius:6px;font-family:inherit" placeholder="ชื่อรายการ">
        <input type="number" value="${it.qty}" min="1" oninput="editingItems[${i}].qty=parseInt(this.value)||1;renderEditBody()" style="width:50px;padding:8px;font-size:13px;border:1px solid #e2e7ef;border-radius:6px;text-align:center;font-family:inherit" placeholder="qty">
        <input type="number" value="${it.price}" min="0" oninput="editingItems[${i}].price=parseFloat(this.value)||0;renderEditBody()" style="width:60px;padding:8px;font-size:13px;border:1px solid #e2e7ef;border-radius:6px;text-align:center;font-family:inherit" placeholder="ราคา">
        <button onclick="removeEditItem(${i})" style="background:transparent;border:none;color:#dc2626;font-size:18px;padding:0 6px;cursor:pointer">×</button>
      </div>
    `).join('')}
    <div style="text-align:right;font-weight:800;color:#1652F0;font-size:18px;margin-top:10px;padding:8px;background:#ebf0ff;border-radius:8px">รวม: ฿${total}</div>
  `;
}

function removeEditItem(i) {
  if (editingItems.length === 1) return toast('⚠️ ต้องมีอย่างน้อย 1 รายการ');
  editingItems.splice(i, 1);
  renderEditBody();
}

function addEditItem() {
  editingItems.push({ id: 'manual-' + Date.now(), name: '', mainName: '', qty: 1, price: 50, addOns: [], note: '' });
  renderEditBody();
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
  editingOrder = null;
}

async function saveEdit() {
  if (!editingOrder) return;
  const total = editingItems.reduce((s, it) => s + it.price * it.qty, 0);
  const note = document.getElementById('editNote').value.trim();
  const updates = {
    items: editingItems.map(it => ({ ...it, mainName: it.mainName || it.name })),
    total,
    note,
    edited_at: new Date().toISOString()
  };
  // Local update
  const db = loadDB();
  const idx = (db.pendingOrders || []).findIndex(o => o.id === editingOrder.id);
  if (idx >= 0) {
    db.pendingOrders[idx] = { ...db.pendingOrders[idx], ...updates };
    saveDB(db);
  }
  // Cloud update
  if (window.cloud?.ready) await window.cloud.updateOrder(editingOrder.id, updates);
  toast('✅ แก้ไขแล้ว · รวม ฿' + total);
  closeEdit();
  render();
}

async function cancelOrder(orderId) {
  if (!confirm('ยกเลิก order นี้?')) return;
  const db = loadDB();
  db.pendingOrders = db.pendingOrders.filter(o => o.id !== orderId);
  saveDB(db);
  if (window.cloud) await window.cloud.deleteOrder(orderId);
  render();
  toast('🗑️ ยกเลิกแล้ว');
}

// Listen to localStorage changes from parent window (when in iframe)
window.addEventListener('storage', e => {
  if (e.key === STORAGE_KEY) {
    try {
      const fresh = JSON.parse(e.newValue || '{}');
      if (fresh.pendingOrders) {
        // Use local data if cloud hasn't synced yet
        if (cloudOrders === null) cloudOrders = fresh.pendingOrders;
        render();
      }
    } catch (err) {}
  }
});

// Poll local storage every 2 sec as final fallback
setInterval(() => {
  if (cloudOrders === null) render();
}, 2000);

// Init: render immediately from local cache, then subscribe to cloud
render();
whenCloudReady(() => {
  window.cloud.onOrders(orders => {
    cloudOrders = orders;
    // Mirror to local cache
    const db = loadDB();
    db.pendingOrders = orders;
    saveDB(db);
    render();
  });
  window.cloud.onCustomers(customers => {
    cloudCustomers = customers;
    // Merge into local
    const db = loadDB();
    Object.entries(customers).forEach(([id, c]) => {
      db.customers[id] = c;
    });
    saveDB(db);
  });
});
</script>
