<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>ครัว · ครัวผู้ใหญ่ปอง</title>
<link rel="icon" href="logo.jpg">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f3f4f6; color: #111827;
    padding-bottom: 40px;
  }
  button { font-family: inherit; cursor: pointer; }

  header {
    background: #ffffff; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #4F7AFF;
    position: sticky; top: 0; z-index: 10;
  }
  header img.logo { height: 48px; width: 48px; object-fit: contain; border-radius: 8px; }
  header .info { flex: 1; }
  header h1 { font-size: 17px; color: #1652F0; line-height: 1.2; }
  header .sub { font-size: 11px; color: #4F7AFF; margin-top: 2px; }
  header a {
    background: #1652F0; color: #fff; text-decoration: none;
    padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
  }

  .summary-bar {
    background: #fff; padding: 12px 16px;
    display: flex; gap: 12px; justify-content: center;
    border-bottom: 1px solid #e5e7eb;
  }
  .stat-pill {
    background: #ebf0ff; padding: 6px 14px; border-radius: 999px;
    font-size: 13px; color: #1652F0; font-weight: 600;
  }
  .stat-pill .num { font-size: 16px; font-weight: 800; }

  main { padding: 12px; }

  .order-list { display: flex; flex-direction: column; gap: 12px; max-width: 700px; margin: 0 auto; }

  .order {
    background: #fff; border-radius: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    overflow: hidden;
  }
  .order.pending { border: 2px solid #88a4ff; }
  .order.done { opacity: .6; }
  .order-head {
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
    background: #f7f8fb;
  }
  .order.done .order-head { background: #f3f4f6; }
  .order-head .name { font-size: 16px; font-weight: 700; }
  .order-head .phone { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .order-head .time { font-size: 12px; color: #6b7280; text-align: right; }
  .order-head .status {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; margin-top: 4px;
  }
  .order.pending .status { background: #88a4ff; color: #fff; }
  .order.done .status { background: #16a34a; color: #fff; }

  .order-items {
    padding: 12px 16px;
  }
  .order-item-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 6px 0; font-size: 14.5px;
    border-bottom: 1px dashed #f3f4f6;
  }
  .order-item-row:last-child { border-bottom: none; }
  .order-item-row .name { flex: 1; }
  .order-item-row .qty { font-weight: 700; min-width: 50px; text-align: center; color: #1652F0; font-size: 16px; }
  .order-item-row .price { min-width: 60px; text-align: right; color: #6b7280; font-size: 13px; }

  .order-note {
    margin-top: 8px; padding: 8px 10px; background: #ebf0ff; border-radius: 6px;
    font-size: 13px; color: #1f2a44;
  }
  .order-note b { font-weight: 700; }

  .order-foot {
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
    background: #fafafa; border-top: 1px solid #f3f4f6;
  }
  .order-foot .total { font-weight: 800; color: #1652F0; font-size: 16px; }
  .order-foot .total .small { font-weight: 500; color: #6b7280; font-size: 13px; }

  .order-actions {
    padding: 12px 16px; display: flex; gap: 8px;
  }
  .order-actions button {
    flex: 1; padding: 14px; border-radius: 10px;
    font-size: 15px; font-weight: 700; border: none;
  }
  .btn-done { background: #16a34a; color: #fff; }
  .btn-cancel { background: transparent; color: #dc2626; border: 1px solid #dc2626; max-width: 120px; flex: 0; }

  .empty {
    text-align: center; color: #9ca3af; padding: 60px 20px;
  }
  .empty .big { font-size: 48px; margin-bottom: 16px; }
  .empty .text { font-size: 15px; }

  .toggle-bar {
    display: flex; gap: 4px; padding: 12px 16px 0; max-width: 700px; margin: 0 auto;
  }
  .toggle-bar button {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; background: #e5e7eb; color: #6b7280;
  }
  .toggle-bar button.active { background: #1652F0; color: #fff; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #111827; color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 14px; z-index: 200; opacity: 0;
    transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @keyframes rewardPulse {
    0%, 100% { box-shadow: inset 0 0 0 0 rgba(245,158,11,.0); }
    50% { box-shadow: inset 0 0 12px 0 rgba(245,158,11,.3); }
  }

  /* ========== Thermal Receipt Print ========== */
  #printArea { display: none; }
  @media print {
    /* Hide ALL body children except #printArea (display:none collapses space) */
    html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
    body > *:not(#printArea) { display: none !important; }
    #printArea {
      display: block !important;
      position: static !important;
      width: 80mm;
      max-width: 80mm;
      padding: 4mm;
      margin: 0 auto;
      font-family: 'Sarabun', monospace;
      color: #000 !important;
      background: #fff !important;
    }
    /* Force pure black & white for thermal print */
    #printArea, #printArea * {
      color: #000 !important;
      background: #fff !important;
      background-color: #fff !important;
      background-image: none !important;
      box-shadow: none !important;
      text-shadow: none !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page { size: 80mm auto; margin: 0; }
    /* Keep QR sections together — avoid orphan caption on next page */
    #printArea, .rc-qr-wrap { page-break-inside: avoid; break-inside: avoid; }
    /* Hide tiny URL captions on print (QR codes already encode them) */
    .rc-qr-url { display: none !important; }
  }
  /* Compact receipt — fits 1 page on most paper sizes */
  .rc-logo { display: block; width: 26mm; height: 26mm; object-fit: contain; margin: 0 auto 1mm; }
  .rc-h1 { text-align: center; font-size: 20pt; font-weight: 900; margin: 0 0 1mm; letter-spacing: -0.5px; }
  .rc-sub { text-align: center; font-size: 10pt; margin: 0 0 1mm; font-weight: 600; }
  .rc-divider { border: 0; border-top: 1px dashed #000; margin: 1.5mm 0; }
  .rc-row { display: flex; justify-content: space-between; font-size: 10pt; margin: 0.5mm 0; }
  .rc-item { display: flex; justify-content: space-between; align-items: flex-start; font-size: 11pt; margin: 1mm 0; }
  .rc-item .name { flex: 1; padding-right: 3mm; }
  .rc-item .price { font-weight: 700; white-space: nowrap; }
  .rc-total { text-align: right; font-size: 13pt; font-weight: 900; margin: 1.5mm 0; }
  .rc-foot { text-align: center; font-size: 9pt; margin: 2mm 0 0; }
  .rc-free { color: #000; font-weight: 700; }
  .rc-qr-wrap { text-align: center; margin: 2mm 0; }
  .rc-qr-title { font-size: 10pt; font-weight: 800; margin-bottom: 1mm; }
  .rc-qr { width: 26mm; height: 26mm; margin: 0 auto; display: block; }
  .rc-qr-url { font-size: 7pt; margin-top: 0.5mm; word-break: break-all; }
</style>
</head>

<!-- Login overlay (only when standalone — iframe shares parent session) -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#1652F0,#0738C9);z-index:9999;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center">
    <img src="logo.jpg" style="width:140px;height:140px;border-radius:24px;margin:0 auto 16px;display:block;box-shadow:0 8px 24px rgba(0,0,0,.15);object-fit:cover">
    <h2 style="color:#0a1530;margin-bottom:4px;font-size:22px">เข้าสู่ระบบครัว</h2>
    <div style="color:#5c6982;font-size:13px;margin-bottom:20px">ครัวผู้ใหญ่ปอง</div>
    <input id="loginPwd" type="password" placeholder="รหัสผ่าน" style="width:100%;padding:14px;border:2px solid #d1ddff;border-radius:12px;font-size:16px;text-align:center;letter-spacing:.2em;margin-bottom:12px;font-family:inherit;box-sizing:border-box" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:14px;background:linear-gradient(135deg,#4F7AFF,#1652F0);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer">เข้าสู่ระบบ</button>
    <div id="loginErr" style="color:#dc2626;font-size:13px;margin-top:10px;display:none">รหัสผ่านไม่ถูก</div>
  </div>
</div>

<script>
  const isEmbedded = new URLSearchParams(location.search).get('embed') === '1';
  window.isEmbedded = isEmbedded; // expose for later scripts
  function isLoggedIn() { return sessionStorage.getItem('admin_logged_in') === '1'; }
  function doLogin() {
    const pwd = document.getElementById('loginPwd').value;
    const stored = localStorage.getItem('admin_pwd') || '1234';
    if (pwd === stored) {
      sessionStorage.setItem('admin_logged_in', '1');
      document.getElementById('loginOverlay').style.display = 'none';
    } else {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('loginPwd').value = '';
    }
  }
  // Standalone (not in iframe) requires login
  if (!isEmbedded && !isLoggedIn()) {
    document.getElementById('loginOverlay').style.display = 'flex';
    setTimeout(() => document.getElementById('loginPwd')?.focus(), 100);
  }
</script>

<script>
function whenCloudReady(cb) { if (window.cloud?.ready) cb(); else window.addEventListener('cloud-ready', cb, { once: true }); }
const STORAGE_KEY = 'loyaltyShopV2';
let view = 'kitchen';
let lastPendingCount = 0;
let cloudOrders = null; // null = not yet loaded; otherwise array
let cloudCustomers = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.pendingOrders) d.pendingOrders = [];
      if (!d.settings) d.settings = { goal: 20, pricePerBox: 50 };
      return d;
    }
  } catch (e) {}
  return { customers: {}, orders: [], redemptions: [], settings: { goal: 20, pricePerBox: 50 }, pendingOrders: [] };
}
function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }) + ' ' +
         d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function setView(v) {
  view = v;
  ['Kitchen','Delivery','Done'].forEach(name => {
    const el = document.getElementById('tab' + name);
    if (el) el.classList.toggle('active', v === name.toLowerCase());
  });
  render();
}

function render() {
  const db = loadDB();
  const orders = (cloudOrders !== null) ? cloudOrders : (db.pendingOrders || []);
  // Group by status — but route 'ready' to the right tab based on order_type:
  //   • PICKUP / PHONE / no-type → ready stays in 🔥 ครัว tab (kitchen hands food to customer)
  //   • DELIVERY                 → ready/delivering go to 🚚 จัดส่ง tab (rider takes over)
  const kitchenStatuses = ['pending','confirmed','cooking'];
  const doneStatuses = ['delivered','done']; // 'done' is legacy / pickup-completed

  const isDeliveryOrder = o => o.order_type === 'delivery';

  // Sort: scheduled orders first (by scheduled time, soonest first), then ASAP by order date (newest first)
  const inKitchen = orders.filter(o => {
    const s = o.status || 'pending';
    if (kitchenStatuses.includes(s)) return true;
    // Pickup ready orders stay in kitchen — they never go to the delivery tab
    if (s === 'ready' && !isDeliveryOrder(o)) return true;
    return false;
  }).sort((a, b) => {
      const aSch = a.scheduled_at ? new Date(a.scheduled_at).getTime() : 0;
      const bSch = b.scheduled_at ? new Date(b.scheduled_at).getTime() : 0;
      if (aSch && bSch) return aSch - bSch;        // both scheduled → earliest first
      if (aSch) return -1;                          // scheduled before ASAP
      if (bSch) return 1;
      return new Date(b.date) - new Date(a.date);   // both ASAP → newest first
    });
  // Delivery tab — only orders flagged as delivery type
  const inDelivery = orders.filter(o => isDeliveryOrder(o) && ['ready','delivering'].includes(o.status))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const completed = orders.filter(o => doneStatuses.includes(o.status))
    .sort((a, b) => new Date(b.completed_at || b.delivered_at || b.date) - new Date(a.completed_at || a.delivered_at || a.date));
  const cancelled = orders.filter(o => o.status === 'cancelled');

  // Stats + tab badges
  document.getElementById('statPending').textContent = inKitchen.length;
  const today = new Date().toLocaleDateString('en-CA');
  const doneToday = completed.filter(o => (o.completed_at || o.delivered_at || o.date).slice(0,10) === today);
  document.getElementById('statDone').textContent = doneToday.length;

  const setBadge = (id, n) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (n > 0) { el.style.display = 'inline-block'; el.textContent = n; }
    else el.style.display = 'none';
  };
  setBadge('cntKitchen', inKitchen.length);
  setBadge('cntDelivery', inDelivery.length);

  // Sound on new pending
  if (inKitchen.length > lastPendingCount && lastPendingCount > 0) {
    try { document.getElementById('ding').play(); } catch(e) {}
  }
  lastPendingCount = inKitchen.length;

  let list = view === 'kitchen' ? inKitchen : view === 'delivery' ? inDelivery : completed;
  const wrap = document.getElementById('orderList');

  // Apply done-view filters (search + date range)
  if (view === 'done') {
    const q = (document.getElementById('doneSearch')?.value || '').toLowerCase().trim();
    const range = document.getElementById('doneRange')?.value || 'all';
    if (q) {
      list = list.filter(o =>
        (o.customer_name || '').toLowerCase().includes(q) ||
        (o.customer_phone || '').includes(q) ||
        (o.id || '').toLowerCase().includes(q) ||
        (o.items || []).some(it => (it.name || '').toLowerCase().includes(q))
      );
    }
    if (range !== 'all') {
      const now = new Date();
      const cutoff = new Date(now);
      if (range === 'today') cutoff.setHours(0,0,0,0);
      else if (range === '7d') cutoff.setDate(now.getDate() - 7);
      else if (range === '30d') cutoff.setDate(now.getDate() - 30);
      list = list.filter(o => new Date(o.completed_at || o.delivered_at || o.date) >= cutoff);
    }
  }

  // Render done filter bar
  if (view === 'done') {
    const filterBar = document.getElementById('doneFilterBar');
    if (filterBar && !filterBar.dataset.init) {
      filterBar.dataset.init = '1';
      filterBar.style.display = 'flex';

    const filterBar = document.getElementById('doneFilterBar');
    if (filterBar) filterBar.style.display = 'none';

    const textMap = {
      kitchen: 'ยังไม่มี order ใหม่ในครัว',
      delivery: 'ยังไม่มี order รอจัดส่ง',

}

// ========== Status transition ==========
async function advanceStatus(orderId, nextStatus) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;

  // Final stage = delivered → MUST pick payment method first → then award points
  if (nextStatus === 'delivered') {
    // Show payment-method picker; finalize is called from inside the modal handler.
    openPaymentPicker(orderId);
    return;
  }

  // Other transitions — just update status
  const updates = {
    status: nextStatus,
    [`${nextStatus}_at`]: new Date().toISOString()
  };
  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) Object.assign(local, updates);
  saveDB(db);
  if (window.cloud) await window.cloud.updateOrder(orderId, updates);
  toast(`✓ สถานะ → ${(window.STATUSES[nextStatus]?.label || nextStatus)}`);
  render();
}

async function markDone(orderId) { return advanceStatus(orderId, 'delivered'); }

// ↩️ Undo "delivered" — for the case where staff hit the button by mistake.
// Reverts status back to the prior state (delivering for delivery orders,
// ready for pickup orders). Only available within 5 minutes of completion.
async function undoDelivered(orderId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const completedMs = order.completed_at ? new Date(order.completed_at).getTime() : 0;
  if (!completedMs || (Date.now() - completedMs) >= 5 * 60 * 1000) {
    return alert('⏰ ผ่านมาเกิน 5 นาที — ย้อนกลับไม่ได้แล้ว · ติดต่อเจ้าของร้านเพื่อแก้ไขใน Firebase');
  }
  if (!confirm('↩ ย้อนกลับสถานะ "ส่งสำเร็จ"?\n\n• สถานะจะกลับไปเป็น "กำลังส่ง" / "พร้อมส่ง"\n• แต้มที่ลูกค้าได้รับจะถูกหักคืน\n• ลูกค้าจะเห็นการเปลี่ยนสถานะ real-time\n\nกด OK เพื่อย้อนกลับ')) return;
  // Determine the prior status
  const priorStatus = (order.order_type === 'delivery') ? 'delivering' : 'ready';
  // Roll back any points that were credited on completion.
  // 🩹 Was using `points_earned` but the awarder writes `points_awarded`
  //   (kitchen.html:1213, 1222). Fall back to `points_earned` for legacy
  //   orders that may have used the old field name.
  const pointsRollback = order.points_awarded || order.points_earned || 0;
  if (order.customer_id && pointsRollback > 0) {
    try {
      if (window.cloud?.incrementCustomerPoints) {
        await window.cloud.incrementCustomerPoints(order.customer_id, -pointsRollback, -pointsRollback);
      }
      // Mirror locally
      const cust = db.customers[order.customer_id];
      if (cust) {
        cust.points = Math.max(0, (cust.points || 0) - pointsRollback);
        cust.lifetime_points = Math.max(0, (cust.lifetime_points || 0) - pointsRollback);
        saveDB(db);
      }
    } catch (e) { console.warn('points rollback failed', e); }
  }
  // Update order status in cloud
  try {
    if (window.cloud?.updateOrder) {
      await window.cloud.updateOrder(orderId, {
        status: priorStatus,
        completed_at: null,
        payment_method: null,
        reverted_at: new Date().toISOString(),
        reverted_reason: 'admin_undo_within_5min',
      });
    }
    // Mirror in local DB
    const local = db.pendingOrders.find(o => o.id === orderId);
    if (local) {
      local.status = priorStatus;
      delete local.completed_at;
      delete local.payment_method;
      local.reverted_at = new Date().toISOString();
      saveDB(db);
    }
    toast(`↩ ย้อนกลับเป็น "${priorStatus}" แล้ว`);
    if (typeof render === 'function') render();
  } catch (e) {
    alert('⚠️ ย้อนกลับไม่สำเร็จ — ลองใหม่หรือเช็ค Firebase Console');
  }
}
window.undoDelivered = undoDelivered;

// 💰 Payment-method picker — populated when kitchen taps "✓ จัดส่งสำเร็จ"
let _payOrderId = null;
function openPaymentPicker(orderId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  _payOrderId = orderId;
  const isFactoryOrder = order.source === 'factory';
  const baseAmount = order.original_total || order.total;
  const points = isFactoryOrder ? 0 : window.calcPointsFromAmount(baseAmount);
  const redemptionStr = (order.redemptions || []).length

// Compute customer's points — used to show redemption buttons
function getCustomerForOrder(order) {
  const db = loadDB();
  let customer = db.customers[order.customer_id];
  if (!customer && cloudCustomers && cloudCustomers[order.customer_id]) customer = cloudCustomers[order.customer_id];
  return customer || null;
}
function getRewardInfo(order) {
  const customer = getCustomerForOrder(order);
  if (!customer) return { points: 0, canDrink: false, canDiscount: false, customer: null };

  };

async function applyDrinkReward(orderId, drinkId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const customer = getCustomerForOrder(order);
  if (!customer) return toast('⚠️ ไม่พบลูกค้า');
  if ((customer.points || 0) < LOYALTY.REWARD_DRINK_POINTS) return toast('⚠️ แต้มไม่พอ');

  // Find drink in menu
  const cat = MENU.find(c => c.items.some(i => i.id === drinkId));
  const drink = cat?.items.find(i => i.id === drinkId);
  if (!drink) return toast('⚠️ ไม่พบเมนูเครื่องดื่ม');

  document.querySelectorAll('div[style*="z-index:300"]').forEach(el => el.remove());

  // Add free drink to order items
  const newItems = JSON.parse(JSON.stringify(order.items));
  newItems.push({
    id: drink.id, name: drink.name, mainName: drink.name,
    price: drink.price, qty: 1, freeQty: 1, isReward: true, options: [], note: ''
  });

  // Save original on first redemption
  if (!order.original_items) order.original_items = JSON.parse(JSON.stringify(order.items));
  if (!order.original_total) order.original_total = order.total;

  // Push redemption
  const redemptions = [...(order.redemptions || []), {
    type: 'drink', drinkId: drink.id, label: drink.name,
    points_used: LOYALTY.REWARD_DRINK_POINTS, value: drink.price,
    at: new Date().toISOString()
  }];
  // Discount = sum of redemption values for free drinks + discount value
  const newDiscount = redemptions.reduce((s, r) => s + (r.type === 'drink' ? r.value : r.value), 0);
  // Total visible to customer = original + drink (free, discounted) - discount value of dishes
  // Simpler: drink doesn't add to base total, dish discount subtracts. Recompute clean:
  // total before reward = original_total
  // discount = sum of drink values + dish discount (since drinks are free we add them and discount = price)
  const itemsSubtotal = newItems.reduce((s, it) => s + it.price * (it.qty - (it.freeQty || 0)), 0);

  const updates = {
    items: newItems,
    original_items: order.original_items,
    original_total: order.original_total,
    redemptions,
    discount: newDiscount,
    total: itemsSubtotal
  };

  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) Object.assign(local, updates);
  saveDB(db);

  // Deduct points from customer (local mirror for instant UI)
  customer.points = (customer.points || 0) - LOYALTY.REWARD_DRINK_POINTS;
  customer.drink_redeemed_count = (customer.drink_redeemed_count || 0) + 1;
  db.customers[customer.id] = customer;
  saveDB(db);

  if (window.cloud) {
    await window.cloud.updateOrder(orderId, updates);
    // 🔒 Atomic decrement — prevents lost updates from concurrent edits
    if (window.cloud.incrementCustomerPoints) {
      await window.cloud.incrementCustomerPoints(customer.id, -LOYALTY.REWARD_DRINK_POINTS, 0, {
        drink_redeemed_count: customer.drink_redeemed_count
      });
    } else {
      await window.cloud.saveCustomer(customer);
    }
  }

  toast(`🥤 ใช้ 10 แต้ม → ฟรี ${drink.name}`);
  render();
}

async function applyDiscountReward(orderId) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const customer = getCustomerForOrder(order);
  if (!customer) return toast('⚠️ ไม่พบลูกค้า');
  if ((customer.points || 0) < LOYALTY.REWARD_DISCOUNT_POINTS) return toast('⚠️ แต้มไม่พอ');

  document.querySelectorAll('div[style*="z-index:300"]').forEach(el => el.remove());

  if (!order.original_items) order.original_items = JSON.parse(JSON.stringify(order.items));
  if (!order.original_total) order.original_total = order.total;

  // Cap discount at remaining order amount
  const currentDiscount = order.discount || 0;
  const baseTotal = order.original_total;
  const remaining = Math.max(0, baseTotal - currentDiscount);
  const discountValue = Math.min(LOYALTY.REWARD_DISCOUNT_AMOUNT, remaining);

  if (discountValue <= 0) return toast('⚠️ ลดส่วนลดไม่ได้แล้ว');

  const redemptions = [...(order.redemptions || []), {
    type: 'discount', label: `ลด ฿${discountValue}`,
    points_used: LOYALTY.REWARD_DISCOUNT_POINTS, value: discountValue,
    at: new Date().toISOString()
  }];
  const newDiscount = currentDiscount + discountValue;
  const newTotal = Math.max(0, baseTotal - newDiscount);

  const updates = {
    original_items: order.original_items,
    original_total: order.original_total,
    redemptions,
    discount: newDiscount,
    total: newTotal
  };

  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) Object.assign(local, updates);
  saveDB(db);

  customer.points = (customer.points || 0) - LOYALTY.REWARD_DISCOUNT_POINTS;
  customer.dish_redeemed_count = (customer.dish_redeemed_count || 0) + 1;
  db.customers[customer.id] = customer;
  saveDB(db);

  if (window.cloud) {
    await window.cloud.updateOrder(orderId, updates);
    // 🔒 Atomic decrement
    if (window.cloud.incrementCustomerPoints) {
      await window.cloud.incrementCustomerPoints(customer.id, -LOYALTY.REWARD_DISCOUNT_POINTS, 0, {
        dish_redeemed_count: customer.dish_redeemed_count
      });
    } else {
      await window.cloud.saveCustomer(customer);
    }
  }

  toast(`💰 ใช้ 15 แต้ม → ลด ฿${discountValue}`);
  render();
}

async function removeRedemption(orderId, idx) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  const redemptions = [...(order.redemptions || [])];
  const removed = redemptions.splice(idx, 1)[0];
  if (!removed) return;

  document.querySelectorAll('div[style*="z-index:300"]').forEach(el => el.remove());

  let newItems = JSON.parse(JSON.stringify(order.items));
  if (removed.type === 'drink') {
    // Remove the free drink item (find from end — most recently added)
    for (let i = newItems.length - 1; i >= 0; i--) {
      if (newItems[i].id === removed.drinkId && newItems[i].isReward && newItems[i].freeQty) {
        newItems.splice(i, 1);
        break;
      }
    }
  }

  // Recompute discount + total
  const newDiscount = redemptions.reduce((s, r) => s + r.value, 0);
  const itemsSubtotal = newItems.reduce((s, it) => s + it.price * (it.qty - (it.freeQty || 0)), 0);
  const newTotal = removed.type === 'discount' ? Math.max(0, order.original_total - newDiscount) : itemsSubtotal;

  const updates = {
    items: newItems, redemptions, discount: newDiscount, total: newTotal
  };
  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) Object.assign(local, updates);
  saveDB(db);

  // Refund points to customer
  const customer = getCustomerForOrder(order);
  if (customer) {
    customer.points = (customer.points || 0) + removed.points_used;
    if (removed.type === 'drink') customer.drink_redeemed_count = Math.max(0, (customer.drink_redeemed_count || 0) - 1);
    else customer.dish_redeemed_count = Math.max(0, (customer.dish_redeemed_count || 0) - 1);
    db.customers[customer.id] = customer;
    saveDB(db);
    if (window.cloud) {
      // 🔒 Atomic refund — increment back the points_used
      if (window.cloud.incrementCustomerPoints) {
        const extra = {};
        if (removed.type === 'drink') extra.drink_redeemed_count = customer.drink_redeemed_count;
        else extra.dish_redeemed_count = customer.dish_redeemed_count;
        await window.cloud.incrementCustomerPoints(customer.id, removed.points_used, 0, extra);
      } else {
        await window.cloud.saveCustomer(customer);
      }
    }
  }

  if (window.cloud) await window.cloud.updateOrder(orderId, updates);

  toast(`↩️ คืน ${removed.points_used} แต้ม`);
  render();
}

async function finalizeOrder(orderId, paymentMethod) {
  const db = loadDB();
  const orderSrc = cloudOrders !== null ? cloudOrders : db.pendingOrders;
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  // Default payment method to 'cash' if not provided (legacy callers / safety)
  const payMethod = (paymentMethod === 'cash' || paymentMethod === 'transfer') ? paymentMethod : 'cash';

  // Get / create customer
  let customer = db.customers[order.customer_id];
  if (!customer && cloudCustomers && cloudCustomers[order.customer_id]) {
    customer = cloudCustomers[order.customer_id];
    db.customers[order.customer_id] = customer;
  }
  if (!customer) {
    customer = {
      id: order.customer_id, name: order.customer_name, phone: order.customer_phone,
      points: 0, lifetime_points: 0, signup_bonus_received: false,
      drink_redeemed_count: 0, dish_redeemed_count: 0,
      total_boxes: 0, redeemed_count: 0, joined: order.date
    };
    db.customers[order.customer_id] = customer;
  }
  // Backfill missing loyalty fields
  if (customer.points == null) customer.points = 0;
  if (customer.lifetime_points == null) customer.lifetime_points = 0;

  // Award points based on ORIGINAL total (before redemption discount)
  // Skip for factory orders (no loyalty)
  const isFactoryOrder = order.source === 'factory';
  const baseAmount = order.original_total || order.total;
  let pointsToAward = 0;
  if (!isFactoryOrder && !order.points_awarded) {
    pointsToAward = window.calcPointsFromAmount(baseAmount);
    // Local mirror — for instant UI feedback. Cloud truth is set via atomic increment below.
    customer.points = (customer.points || 0) + pointsToAward;
    customer.lifetime_points = (customer.lifetime_points || 0) + pointsToAward;
  }

  // Push to db.orders (history)
  if (!db.orders) db.orders = [];
  db.orders.push({
    id: 'O' + Date.now(),
    date: order.date,
    completed_at: new Date().toISOString(),
    customer_id: customer.id,
    customer_name: customer.name,
    items: order.items,
    total: order.total,
    discount: order.discount || 0,
    redemptions: order.redemptions || [],
    points_awarded: pointsToAward,
    payment_method: payMethod,
    note: order.note || '',
    source: order.source || 'online'
  });

  const updates = {
    status: 'done',
    completed_at: new Date().toISOString(),
    points_awarded: pointsToAward,
    payment_method: payMethod
  };
  const localOrder = db.pendingOrders.find(o => o.id === orderId);
  if (localOrder) Object.assign(localOrder, updates);

  saveDB(db);

  if (window.cloud) {
    await window.cloud.updateOrder(orderId, updates);
    // 🔒 ATOMIC INCREMENT — prevents race condition where concurrent finalize ops or
    // a stale onCustomers snapshot could overwrite each other and lose +N points.
    // Falls back to setDoc-merge inside cloud helper if doc doesn't exist yet.
    if (pointsToAward > 0 && window.cloud.incrementCustomerPoints) {
      await window.cloud.incrementCustomerPoints(customer.id, pointsToAward, pointsToAward);
    } else {
      // Factory or zero-pt: just sync customer normally
      await window.cloud.saveCustomer(customer);
    }
  }

  render();

  const payIcon = payMethod === 'cash' ? '💵 เงินสด' : '💳 เงินโอน';
  const summary = isFactoryOrder
    ? `${customer.name} (🏭 โรงงาน · ไม่บวกแต้ม) · ${payIcon}`
    : `${customer.name} +${pointsToAward} แต้ม · ${payIcon}`;
  toast(`✓ เสร็จ! ${summary}`);
}

// ========== Print Thermal Receipt ==========
function fmtReceiptDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString('th-TH', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

// 🔒 PDPA — mask middle digits of phone for printed receipts
// 0817961234 → 081-XXX-1234 (show first 3 + last 4)
function maskPhone(phone) {
  if (!phone) return '';
  const d = String(phone).replace(/\D/g, '');
  if (d.length < 8) return phone;
  const start = d.slice(0, 3);
  const end = d.slice(-4);
  const middleLen = d.length - 7;
  return `${start}-${'X'.repeat(middleLen)}-${end}`;
}

function getBTPrinter() {
  // Verify connection is alive — gatt.connected must be true AND chr must exist
  const isAlive = (bt) => !!(bt && bt.chr && bt.device?.gatt?.connected);

  if (isAlive(window.btPrinter)) return window.btPrinter;

  // Try parent window (when running in iframe inside index.html)
  try {
    if (window.parent !== window && isAlive(window.parent.btPrinter)) {
      return window.parent.btPrinter;
    }
  } catch (e) {}
  return null;
}

// Legacy alias — some callsites may still reference browserPrint
const browserPrint = openPrintWindow;

// ========== Web Bluetooth Thermal Printer ==========
const BT_SERVICES = [
  '000018f0-0000-1000-8000-00805f9b34fb', // common BLE thermal
  '49535343-fe7d-4ae5-8fa9-9fafd205e455', // Microchip RN4870/71
  '0000ff00-0000-1000-8000-00805f9b34fb', // Goojprt
  '0000ff12-0000-1000-8000-00805f9b34fb', // some Chinese printers
  'e7810a71-73ae-499d-8c15-faa9aef0c3f2'  // Sunmi
];

async function connectBluetoothPrinter() {
  if (!navigator.bluetooth) {
    alert('⚠️ เบราว์เซอร์นี้ไม่รองรับ Web Bluetooth\nใช้ Chrome บน Android หรือ Desktop');
    return;
  }
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: BT_SERVICES
    });
    toast('🔵 กำลังเชื่อมต่อ ' + device.name);
    const server = await device.gatt.connect();

    let chr = null;
    const services = await server.getPrimaryServices();
    for (const svc of services) {
      try {
        const chars = await svc.getCharacteristics();
        const writable = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
        if (writable) { chr = writable; break; }
      } catch (e) {}
    }

    if (!chr) {
      alert('❌ ไม่พบ characteristic ที่เขียนได้ เครื่องนี้อาจไม่ใช่ printer หรือไม่ compatible');
      return;
    }

    window.btPrinter = { device, server, chr };
    localStorage.setItem('btPrinterName', device.name || 'Unknown');
    localStorage.removeItem('btManuallyDisconnected'); // user wants this device, allow auto-reconnect
    setupAutoReconnect(device);
    startBtKeepalive();   // 💓 keep BT link warm so idle disconnects don't fire

    toast('✅ เชื่อมต่อ ' + device.name + ' สำเร็จ');
    updateBTStatus();
    flushPendingPrintJobs();
  } catch (err) {
    if (err.name !== 'NotFoundError') alert('❌ เชื่อมต่อล้มเหลว: ' + err.message);
  }
}

// Set up automatic reconnection when GATT disconnects
function setupAutoReconnect(device) {
  device.addEventListener('gattserverdisconnected', async () => {
    window.btPrinter = null;
    updateBTStatus();
    stopBtKeepalive();        // pause heartbeat while disconnected
    if (localStorage.getItem('btManuallyDisconnected') === '1') {
      toast('🔴 ตัดการเชื่อมต่อแล้ว');
      return;
    }
    toast('🔄 ปริ้นหลุด — กำลังเชื่อมใหม่...');
    // Aggressive initial reconnect (500ms → 1s → 2s → 3s → 5s → 8s → 10s)
    // Faster than the old 2/4/6/8/10s schedule because most BT drops are
    // momentary (idle timeout, brief interference).
    const delays = [500, 1000, 2000, 3000, 5000, 8000, 10000];
    for (let attempt = 0; attempt < delays.length; attempt++) {
      await new Promise(r => setTimeout(r, delays[attempt]));
      if (localStorage.getItem('btManuallyDisconnected') === '1') return;
      try {
        const server = await device.gatt.connect();
        const chr = await findWritableCharacteristic(server);
        if (chr) {
          window.btPrinter = { device, server, chr };
          updateBTStatus();
          startBtKeepalive();   // resume heartbeat
          toast('✅ เชื่อมต่อใหม่สำเร็จ');
          flushPendingPrintJobs();
          return;
        }
      } catch (e) {
        console.warn('[BT] reconnect attempt', attempt + 1, 'failed:', e.message);
      }
    }
    toast('⚠️ เชื่อมต่อใหม่ไม่สำเร็จ — กรุณากดเชื่อมต่อในตั้งค่า', true);
  });
}

// 💓 KEEPALIVE — send a NUL byte every 20s to keep the BT link warm.
// Many thermal printers idle-disconnect after 30-60s of inactivity.
// 0x00 is ignored by ESC/POS printers but enough activity to reset the
// link's idle timer. Also pairs well with PRINT QUEUE below.
let _btKeepaliveTimer = null;
function startBtKeepalive() {
  stopBtKeepalive();
  _btKeepaliveTimer = setInterval(async () => {
    if (!window.btPrinter?.chr || !window.btPrinter.device?.gatt?.connected) {
      stopBtKeepalive();
      return;
    }
    try {
      await window.btPrinter.chr.writeValue(new Uint8Array([0x00]));
    } catch (e) {
      // Write failed → connection actually dead; gattserverdisconnected
      // will fire and trigger reconnect.
      console.warn('[BT] keepalive failed', e.message);
    }
  }, 20000);
}
function stopBtKeepalive() {
  if (_btKeepaliveTimer) { clearInterval(_btKeepaliveTimer); _btKeepaliveTimer = null; }
}

// 🖨️ PRINT QUEUE — if a print is requested while BT is disconnected, queue
// the order JSON and print as soon as we reconnect. Prevents the kitchen
// from missing tickets during momentary BT drops.
function queuePrintJob(order) {
  try {
    const list = JSON.parse(localStorage.getItem('btPrintQueue') || '[]');
    if (list.find(o => o.id === order.id)) return;
    list.push(order);
    localStorage.setItem('btPrintQueue', JSON.stringify(list));
    toast('🖨️ พิมพ์ค้างในคิว — จะพิมพ์เมื่อปริ้นกลับมา');
  } catch (e) {}
}
async function flushPendingPrintJobs() {
  if (!window.btPrinter?.chr) return;
  let list;
  try { list = JSON.parse(localStorage.getItem('btPrintQueue') || '[]'); } catch (e) { return; }
  if (!list.length) return;
  console.log('[BT] flushing', list.length, 'queued print job(s)');
  for (const o of [...list]) {
    try {
      await bluetoothPrint(o, window.btPrinter);
      list = list.filter(x => x.id !== o.id);
      localStorage.setItem('btPrintQueue', JSON.stringify(list));
    } catch (e) { console.warn('[BT] queued print failed', o.id, e); }
  }
  if (list.length === 0) toast('✅ พิมพ์งานค้างเรียบร้อย');
}

// 👁️ VISIBILITY — when tab regains focus, check BT and reconnect if needed.
// Browser throttles BT writes when tab is hidden → connection may have died
// silently in the background.
document.addEventListener('visibilitychange', async () => {
  if (document.hidden) return;
  if (localStorage.getItem('btManuallyDisconnected') === '1') return;

  // Case 1: no in-memory btPrinter but we have a saved name — try Permitted Devices reconnect
  if (!window.btPrinter?.device) {
    if (localStorage.getItem('btPrinterName')) {
      setTimeout(() => autoReconnectBT({ showToast: false, maxAttempts: 1 }), 300);
    }
    return;
  }
  // Case 2: btPrinter exists but GATT dropped — reconnect via existing device handle
  if (window.btPrinter.device.gatt && !window.btPrinter.device.gatt.connected) {
    try {
      const server = await window.btPrinter.device.gatt.connect();
      const chr = await findWritableCharacteristic(server);
      if (chr) {
        window.btPrinter = { device: window.btPrinter.device, server, chr };
        updateBTStatus();
        startBtKeepalive();
        toast('✅ เชื่อมปริ้นกลับ');
        flushPendingPrintJobs();
      }
    } catch (e) { console.warn('[BT] visibility reconnect failed', e); }
  }
});

// Helper to scan services for a writable characteristic
async function findWritableCharacteristic(server) {
  const services = await server.getPrimaryServices();
  for (const svc of services) {
    try {
      const chars = await svc.getCharacteristics();
      const writable = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
      if (writable) return writable;
    } catch (e) {}
  }
  return null;
}

// Auto-reconnect on page load (uses Permitted Devices API — Chrome 122+)
// 🔁 Retries 3× with backoff because BLE radio sometimes isn't ready right
//    after page load, and getDevices() can momentarily return [] on Android.
async function autoReconnectBT(opts = {}) {
  const { showToast = false, attempt = 1, maxAttempts = 3 } = opts;
  if (!('bluetooth' in navigator)) {
    console.warn('[BT] no Web Bluetooth support'); return false;
  }
  if (localStorage.getItem('btManuallyDisconnected') === '1') {
    console.log('[BT] skipping auto-reconnect (user disconnected manually)'); return false;
  }
  const lastName = localStorage.getItem('btPrinterName');
  if (!lastName) { console.log('[BT] no saved printer name'); return false; }

  // Already connected? Skip.
  if (window.btPrinter?.chr && window.btPrinter.device?.gatt?.connected) {
    console.log('[BT] already connected — skipping');
    return true;
  }

  if (typeof navigator.bluetooth.getDevices !== 'function') {
    console.warn('[BT] getDevices() not supported — Chrome < 122. User must reconnect manually.');
    if (showToast) toast('ℹ️ เบราว์เซอร์เก่า ไม่รองรับเชื่อมอัตโนมัติ — กดปุ่ม "🔄 เชื่อมใหม่"');
    return false;
  }

  console.log(`[BT] auto-reconnect attempt ${attempt}/${maxAttempts} for "${lastName}"`);
  try {
    const devices = await navigator.bluetooth.getDevices();
    console.log(`[BT] getDevices returned ${devices.length} paired device(s):`,
                devices.map(d => d.name || '(no name)').join(', '));
    const device = devices.find(d => d.name === lastName) ||
                   devices.find(d => d.name && d.name.includes(lastName.replace(/\d+/g, ''))); // loose name match
    if (!device) {
      if (attempt < maxAttempts) {
        const delay = attempt * 2000;
        console.log(`[BT] device not in paired list — retrying in ${delay}ms`);
        setTimeout(() => autoReconnectBT({ showToast, attempt: attempt + 1, maxAttempts }), delay);
      } else {
        console.warn('[BT] device not in paired list after retries — user must re-pair');
        if (showToast) toast('⚠️ ไม่พบ printer ที่จับคู่ไว้ — กดปุ่ม "🔄 เชื่อมใหม่"');
      }
      return false;
    }
    const server = await device.gatt.connect();
    const chr = await findWritableCharacteristic(server);
    if (chr) {
      window.btPrinter = { device, server, chr };
      setupAutoReconnect(device);
      startBtKeepalive();
      updateBTStatus();
      toast('🔵 เชื่อมต่อ ' + device.name + ' อัตโนมัติ');
      flushPendingPrintJobs();
      return true;
    }
    return false;
  } catch (e) {
    console.warn(`[BT] auto-reconnect attempt ${attempt} failed:`, e.message);
    if (attempt < maxAttempts) {
      const delay = attempt * 2000;
      console.log(`[BT] retrying in ${delay}ms`);
      setTimeout(() => autoReconnectBT({ showToast, attempt: attempt + 1, maxAttempts }), delay);
    } else if (showToast) {
      toast('⚠️ เชื่อมอัตโนมัติไม่สำเร็จ: ' + e.message);
    }
    return false;
  }
}

// 🔄 Manual reconnect — first tries auto, falls back to picker with name filter
//    so the user just clicks one device instead of scrolling the full list.
async function reconnectBTManual() {
  // Clear the "manual disconnect" flag so user intent = reconnect
  localStorage.removeItem('btManuallyDisconnected');
  const ok = await autoReconnectBT({ showToast: true, maxAttempts: 1 });
  if (ok) return;

  // Fallback: show picker filtered to last known device name
  const lastName = localStorage.getItem('btPrinterName');
  if (!lastName) {
    if (typeof connectBluetoothPrinter === 'function') connectBluetoothPrinter();
    return;
  }
  try {
    toast('📡 กำลังค้นหา ' + lastName + '...');
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: lastName }],
      optionalServices: BT_SERVICES
    });
    const server = await device.gatt.connect();
    const chr = await findWritableCharacteristic(server);
    if (!chr) { alert('❌ ไม่พบ writable characteristic'); return; }
    window.btPrinter = { device, server, chr };
    localStorage.setItem('btPrinterName', device.name || lastName);
    setupAutoReconnect(device);
    startBtKeepalive();
    updateBTStatus();
    toast('🔵 เชื่อม ' + device.name + ' สำเร็จ');
    flushPendingPrintJobs();
  } catch (e) {
    if (e.name === 'NotFoundError') {
      // Filter found nothing — fall back to full picker
      if (typeof connectBluetoothPrinter === 'function') connectBluetoothPrinter();
    } else {
      alert('❌ เชื่อมล้มเหลว: ' + e.message);
    }
  }
}

// 🇹🇭 Print a test ticket trying 5 different Thai codepages — user picks the
// one that prints clearly and saves it as the default.
async function bluetoothPrintThaiTest() {
  const bt = window.btPrinter;
  if (!bt?.chr) { alert('⚠️ กรุณาเชื่อม Bluetooth printer ก่อน'); return; }

  const ESC = 0x1B, NL = 0x0A;
  const codepages = [21, 20, 30, 70, 255];
  const sample = 'สวัสดี กระเพรา หมูสับ ฿50';

  const out = [];
  // Init + cancel kanji
  out.push(ESC, 0x40);
  out.push(0x1C, 0x2E);
  out.push(ESC, 0x61, 0x01); // center
  out.push(ESC, 0x21, 0x10);
  appendBytes(out, 'TEST THAI CODEPAGE');
  out.push(NL);
  out.push(ESC, 0x21, 0x00);
  appendBytes(out, '--------------------------------');
  out.push(NL);
  out.push(ESC, 0x61, 0x00); // left

  for (const cp of codepages) {
    out.push(ESC, 0x74, cp);
    appendBytes(out, '[' + cp + ']  ');
    appendThaiBytes(out, sample);
    out.push(NL);
  }

  appendBytes(out, '--------------------------------');
  out.push(NL);
  appendBytes(out, '<= Pick the legible row,');
  out.push(NL);
  appendBytes(out, '   set in admin > Settings.');
  out.push(NL, NL, NL, NL);

  // Send via BT
  const data = new Uint8Array(out);
  const CHUNK = 200;
  try {
    for (let i = 0; i < data.length; i += CHUNK) {
      await bt.chr.writeValue(data.slice(i, i + CHUNK));
      await new Promise(r => setTimeout(r, 30));
    }
  } catch (e) {
    alert('❌ ส่งล้มเหลว: ' + e.message);
  }
}

// Helper: ASCII-only bytes
function appendBytes(out, s) {
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    if (c <= 0x7F) out.push(c);
    else if (c >= 0x0E01 && c <= 0x0E5B) out.push(c - 0x0E00 + 0xA0);
  }
}
// Helper: Thai → TIS-620 byte
function appendThaiBytes(out, s) {
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    if (c <= 0x7F) out.push(c);
    else if (c >= 0x0E01 && c <= 0x0E5B) out.push(c - 0x0E00 + 0xA0);
  }
}

function disconnectBT() {

    window.btPrinter.device.gatt.disconnect();

async function printViaBluetooth(order, btRef) {
  const bt = btRef || window.btPrinter;
  if (!bt?.chr) {
    // 🖨️ Queue the order — flushPendingPrintJobs() will print it when the
    // BT printer reconnects. Prevents kitchen from missing tickets during
    // momentary BT drops.
    if (order && order.id && typeof queuePrintJob === 'function') queuePrintJob(order);
    return { error: 'ยังไม่ได้เชื่อมต่อ — ใส่ในคิวรอพิมพ์เมื่อเชื่อมต่อใหม่' };
  }

  const mode = localStorage.getItem('btPrintMode') || 'bitmap';
  // 🏷️ Sticker mode: print 1 mini-sticker per dish unit (qty matters), each
  //    auto-cut so the kitchen can stick one on every food box without writing.
  const stickersEnabled = localStorage.getItem('btPrintStickers') !== '0'; // default ON

  try {
    // 1) Main receipt (always)
    let mainData;
    if (mode === 'text') {
      mainData = buildESCPOS(order);
    } else {
      mainData = await buildBitmapESCPOS(order);
    }
    await btSendBytes(bt.chr, mainData);

    // 2) Stickers (one per unit per item) — only available in bitmap mode
    if (stickersEnabled && mode !== 'text') {
      const items = (order.items || []).filter(it => !it.isReward); // skip free drinks
      let totalStickers = 0;
      items.forEach(it => totalStickers += (it.qty || 1));
      let stickerIdx = 0;
      for (const item of items) {
        const qty = item.qty || 1;
        for (let i = 1; i <= qty; i++) {
          stickerIdx++;
          const stickerData = await buildStickerESCPOS(order, item, i, qty, stickerIdx, totalStickers);
          await btSendBytes(bt.chr, stickerData);
        }
      }
    }

    return { success: true };
  } catch (e) {
    console.error('BT print error', e);
    return { error: e.message };
  }
}

// Reliable BLE write — uses writeValue (with response) so the printer's
// internal buffer can keep up with bitmap data. WWR was faster but caused
// data loss on N160II — bitmap commands got corrupted and printed as garbage.
async function btSendBytes(chr, data) {
  // 🔧 Tuned for smooth continuous printing (was 180/25 = ~4s of pure delay
  // for a 30KB receipt → visible "feed gaps" between chunks). Larger chunk
  // + smaller delay keeps the printer buffer fed fast enough to avoid the
  // print head pausing mid-receipt. If your printer model corrupts data
  // at this speed, increase DELAY back to 15-25ms.
  const CHUNK = 240;
  const DELAY = 8;
  for (let i = 0; i < data.length; i += CHUNK) {
    const slice = data.slice(i, i + CHUNK);
    await chr.writeValue(slice);
    if (DELAY > 0) await new Promise(r => setTimeout(r, DELAY));
  }
}

// ===== Bitmap rendering for printers without Thai font =====
function loadImageForPrint(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function renderReceiptCanvas(order) {
  const W = 576; // 80mm thermal at 8 dots/mm
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = 3000;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, canvas.height);
  ctx.fillStyle = '#000';
  // Anti-aliased text renders sharper than pixel-aligned fonts when later
  // thresholded to monochrome — gives crisper Thai glyphs on thermal paper.
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.textRendering = 'geometricPrecision';

  const includeQR = localStorage.getItem('btPrintQR') !== '0';
  const QR_MENU_SIZE = 88;      // menu QR — top of receipt (was 104, save ~2mm)
  const QR_PAYMENT_SIZE = 240;  // payment QR — still scannable (was 320, save ~10mm)

  let y = 14;
  const FONT = '"Sarabun", "Tahoma", "Noto Sans Thai", sans-serif';

  const setFont = (size, bold = false) => { ctx.font = `${bold ? 'bold ' : ''}${size}px ${FONT}`; };
  const center = (text, size, bold = false) => {
    setFont(size, bold);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(text, W / 2, y);
    y += size + 2;
  };
  const leftLine = (text, size, bold = false) => {
    setFont(size, bold);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(text, 14, y);
    y += size + 2;
  };
  const row = (a, b, size, bold = false) => {
    setFont(size, bold);
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillText(a, 14, y);
    ctx.textAlign = 'right';
    ctx.fillText(b, W - 14, y);
    y += size + 2;
  };
  const divider = () => { y += 3; ctx.fillRect(14, y, W - 28, 2); y += 6; };

  // Header: shop name + small menu QR — using bigger / bolder fonts for sharper print
  center('ครัวผู้ใหญ่ปอง', 50, true);   // +14% for clarity
  if (includeQR) {
    const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=2&data=' +
                  encodeURIComponent('https://loyalty.fishconnect.co/menu.html');
    const qrMenu = await loadImageForPrint(qrUrl);
    if (qrMenu) {
      ctx.drawImage(qrMenu, (W - QR_MENU_SIZE) / 2, y, QR_MENU_SIZE, QR_MENU_SIZE);
      y += QR_MENU_SIZE + 4;
      center('สแกนสั่งอาหาร', 18, true);
    }
  }
  center('Tel: 061-962-3696', 24, true);
  divider();

  row('Order:', '#' + order.id.slice(-6), 24, true);
  row('Time:', fmtReceiptDate(order.date), 22, true);
  row('Cust:', order.customer_name || '-', 22, true);
  if (order.customer_phone) row('Phone:', maskPhone(order.customer_phone), 22, true);
  // Order type — pickup or delivery (with address if delivery)
  if (order.order_type === 'delivery') {
    row('Type:', '🚚 จัดส่ง', 22, true);
    if (order.delivery_address) {
      leftLine('Addr: ' + order.delivery_address.slice(0, 50), 18, true);
      if (order.delivery_address.length > 50) leftLine('   ' + order.delivery_address.slice(50, 100), 18, true);
    }
  } else {
    row('Type:', '🏪 รับที่ร้าน', 22, true);
  }
  divider();

  for (const it of order.items) {
    const free = it.freeQty || 0;
    const paid = it.qty - free;
    const lineTotal = it.price * paid;
    const rightStr = (free > 0 && paid === 0) ? 'FREE' : '฿' + lineTotal;
    const mainNm = it.mainName || it.name;
    row(it.qty + '× ' + mainNm, rightStr, 28, true);
    // 🔧 Add-ons + notes use SAME font size as item name (was 22 → too small
    // to read on thermal paper). Now at 28 with bold.
    if (it.options && it.options.length) {
      for (const o of it.options) {
        const prefix = o.price > 0 ? '   + ' : '   - ';
        const px = o.price > 0 ? ` (+${o.price})` : '';
        leftLine(prefix + o.choice + px, 28, true);
      }
    }
    if (it.note) leftLine('   note: ' + it.note, 28, true);
  }
  divider();

  if (order.discount) {
    const orig = order.original_total || (order.total + order.discount);
    row('Subtotal', '฿' + orig, 24, true);
    row('Discount', '-฿' + order.discount, 24, true);
  }
  setFont(44, true);
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('TOTAL ฿' + order.total, W - 14, y);
  y += 52;
  divider();
  center('ขอบคุณที่อุดหนุน', 22, true);
  y += 6;

  // Footer: payment QR (PromptPay/Thai QR)
  if (includeQR) {
    center('สแกนเพื่อชำระเงิน', 22, true);
    y += 4;
    let paymentImg = null;
    const dataUrl = localStorage.getItem('paymentQrDataUrl');
    if (dataUrl) paymentImg = await loadImageForPrint(dataUrl);
    if (!paymentImg)  paymentImg = await loadImageForPrint('payment-qr.jpg');
    if (paymentImg) {
      ctx.drawImage(paymentImg, (W - QR_PAYMENT_SIZE) / 2, y, QR_PAYMENT_SIZE, QR_PAYMENT_SIZE);
      y += QR_PAYMENT_SIZE + 4;
      center('PromptPay · Thai QR Payment', 16, true);
    } else {
      center('(อัพโหลด QR ในหน้าตั้งค่า)', 14, true);
    }
  }
  y += 24;

  const final = document.createElement('canvas');
  final.width = W;
  final.height = y;
  const fctx = final.getContext('2d');
  fctx.fillStyle = '#fff';
  fctx.fillRect(0, 0, W, y);
  fctx.drawImage(canvas, 0, 0);
  return final;
}

// 🏷️ Render a single mini-sticker (one per dish unit) for BT printer.
// COMPACT layout — target ~50mm per sticker (was ~100mm).
async function renderStickerCanvas(order, item, unitIdx, totalUnits, globalIdx, globalTotal) {
  const W = 576;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = 800;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, canvas.height);
  ctx.fillStyle = '#000';
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.textRendering = 'geometricPrecision';

  // 🩹 No top padding inside the bitmap — the gap between the previous cut
  //   and where this sticker's content starts is already imposed by the
  //   physical cutter→print-head distance (~14-15mm hardware constant).
  //   Adding more here just wastes paper.
  let y = 0;
  const FONT = '"Sarabun", "Tahoma", "Noto Sans Thai", sans-serif';
  const setFont = (size, bold = false) => { ctx.font = `${bold ? 'bold ' : ''}${size}px ${FONT}`; };
  const center = (text, size, bold = false) => {
    setFont(size, bold);
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(text, W / 2, y);
    y += size + 2;
  };
  const left = (text, size, bold = false) => {
    setFont(size, bold);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(text, 14, y);
    y += size + 1;
  };
  const divider = () => { y += 2; ctx.fillRect(14, y, W - 28, 2); y += 4; };

  // Header line — order ID · customer · position (single compact row)
  setFont(20, true);
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`#${order.id.slice(-6)} · ${order.customer_name || 'ลูกค้า'}`, 14, y);
  ctx.textAlign = 'right';
  ctx.fillText(`${globalIdx}/${globalTotal}`, W - 14, y);
  y += 26;

  // Type indicator — 1 line, small
  if (order.order_type === 'delivery') {
    setFont(16, true);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('🚚 DELIVERY' + (order.customer_phone ? ' · ' + maskPhone(order.customer_phone) : ''), 14, y);
    y += 20;
  } else if (order.customer_phone) {
    setFont(16, true);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('🏪 ' + maskPhone(order.customer_phone), 14, y);
    y += 20;
  }
  divider();

  // Item name — large but not giant
  const mainNm = item.mainName || item.name;
  setFont(36, true);
  const maxLineWidth = W - 28;
  const chars = String(mainNm).split('');
  let line = '';
  const lines = [];
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxLineWidth && line) {
      lines.push(line); line = ch;
    } else { line = test; }
  }
  if (line) lines.push(line);
  for (const ln of lines) center(ln, 36, true);

  // Quantity badge if more than 1 of this item — inline small
  if (totalUnits > 1) {
    setFont(16, true);
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(`(ชิ้นที่ ${unitIdx} จาก ${totalUnits})`, W / 2, y);
    y += 20;
  }

  // Options — same size as main item name (36px) so add-ons are equally legible.
  // Each option wraps onto its own line if too wide for the sticker width.
  if (item.options && item.options.length) {
    y += 4;
    const OPT_SIZE = 36;
    const spicy = item.options.filter(o => (o.choice || '').includes('เผ็ด'));
    const free = item.options.filter(o => !(o.choice || '').includes('เผ็ด') && (o.price || 0) === 0);
    const premium = item.options.filter(o => (o.price || 0) > 0);

    // Helper: wrap a long line at maxLineWidth
    const wrapAndWrite = (text, size, bold) => {
      setFont(size, bold);
      const max = maxLineWidth;
      const chars = String(text).split('');
      let line = '';
      const out = [];
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > max && line) {
          out.push(line); line = ch;
        } else { line = test; }
      }
      if (line) out.push(line);
      for (const ln of out) left(ln, size, bold);
    };

    // 🌶️ Spice level — its own line so cook can't miss it
    if (spicy.length) wrapAndWrite('🌶️ ' + spicy.map(o => o.choice).join(', '), OPT_SIZE, true);
    // Basic ingredients — one per line for legibility at this size
    free.forEach(o => wrapAndWrite('• ' + o.choice, OPT_SIZE, true));
    // Premium add-ons — show with price
    premium.forEach(o => wrapAndWrite(`+ ${o.choice} (+${o.price}฿)`, OPT_SIZE, true));
  }

  // Note — same size as item name with left border accent
  if (item.note) {
    y += 4;
    const NOTE_SIZE = 36;
    setFont(NOTE_SIZE, true);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillRect(8, y, 4, NOTE_SIZE + 4);
    ctx.fillText('📝 ' + item.note, 18, y);
    y += NOTE_SIZE + 6;
  }

  // Free indicator — small line
  const freeQty = item.freeQty || 0;
  if (freeQty > 0 && unitIdx <= freeQty) {
    setFont(18, true);
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('🎁 ฟรีจากแต้ม', W / 2, y);
    y += 22;
  }

  // 🩹 Bottom buffer inside the bitmap so the last text line has visible
  //   white space before the cut, even if line-feed timing varies. Combined
  //   with 3 line feeds below = ~3.5mm bitmap padding + ~12.6mm feeds =
  //   ~16mm total clearance, enough for the ~14-15mm cutter→head gap.
  y += 30;
  // Trim
  const final = document.createElement('canvas');
  final.width = W;
  final.height = y;
  const fctx = final.getContext('2d');
  fctx.fillStyle = '#fff';
  fctx.fillRect(0, 0, W, y);
  fctx.drawImage(canvas, 0, 0);
  return final;
}

// 🏷️ Build sticker as ESC/POS bytes (init + raster + cut). Same pipeline as
// buildBitmapESCPOS but uses renderStickerCanvas instead of the receipt one.
async function buildStickerESCPOS(order, item, unitIdx, totalUnits, globalIdx, globalTotal) {
  const canvas = await renderStickerCanvas(order, item, unitIdx, totalUnits, globalIdx, globalTotal);
  const raster = canvasToMonochromeBytes(canvas);
  const W = canvas.width, H = canvas.height;
  const bytesPerRow = Math.ceil(W / 8);
  const out = [];
  out.push(0x1B, 0x40);  // init
  const ROWS_PER_CHUNK = 48;
  let row = 0;
  while (row < H) {
    const rowsThis = Math.min(ROWS_PER_CHUNK, H - row);
    out.push(0x1D, 0x76, 0x30, 0x00);
    out.push(bytesPerRow & 0xFF, (bytesPerRow >> 8) & 0xFF);
    out.push(rowsThis & 0xFF, (rowsThis >> 8) & 0xFF);
    const start = row * bytesPerRow;
    const end = (row + rowsThis) * bytesPerRow;
    for (let i = start; i < end; i++) out.push(raster[i]);
    row += rowsThis;
  }
  // 🩹 3 line feeds (~12.6mm) — combined with the 30px bitmap bottom padding
  //   above, gives ~16mm total clearance. Was 4 feeds (16.8mm) which over-fed
  //   and left ~4mm of blank paper at the top of the NEXT sticker.
  out.push(0x0A, 0x0A, 0x0A);
  out.push(0x1D, 0x56, 0x00);         // GS V 0 — full cut
  return new Uint8Array(out);
}

function canvasToMonochromeBytes(canvas) {
  const ctx = canvas.getContext('2d');
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const px = img.data;
  const bytesPerRow = Math.ceil(canvas.width / 8);
  const out = new Uint8Array(bytesPerRow * canvas.height);
  // 🔧 Aggressive threshold (180 → was 128) — anti-aliased Thai glyphs that
  // ended up as gray pixels (brightness 130-170) get pushed to black instead
  // of white. Result: thicker, darker letters that are easier to read on
  // thermal paper (which tends to print thinner than the input).
  const THRESHOLD = 180;
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const i = (y * canvas.width + x) * 4;
      const brightness = (px[i] + px[i + 1] + px[i + 2]) / 3;
      const isBlack = brightness < THRESHOLD && px[i + 3] > 128;
      if (isBlack) {
        const bi = y * bytesPerRow + (x >> 3);
        out[bi] |= (1 << (7 - (x & 7)));
      }
    }
  }
  return out;
}

async function buildBitmapESCPOS(order) {
  const canvas = await renderReceiptCanvas(order);
  const W = canvas.width;
  const H = canvas.height;
  const raster = canvasToMonochromeBytes(canvas);
  const bytesPerRow = Math.ceil(W / 8);

  const out = [];
  out.push(0x1B, 0x40);                 // init

  // Send raster in chunks. Larger chunks = fewer GS v 0 commands = printer
  // doesn't pause to feed paper between chunks (was 48 → visible "stripes").
  // 96 rows = ~6.9KB per chunk, well under the 16KB safe-zone for N160II.
  const ROWS_PER_CHUNK = 96;
  let row = 0;
  while (row < H) {
    const rowsThis = Math.min(ROWS_PER_CHUNK, H - row);
    // GS v 0 m xL xH yL yH
    out.push(0x1D, 0x76, 0x30, 0x00);
    out.push(bytesPerRow & 0xFF, (bytesPerRow >> 8) & 0xFF);
    out.push(rowsThis & 0xFF, (rowsThis >> 8) & 0xFF);
    const start = row * bytesPerRow;
    const end = (row + rowsThis) * bytesPerRow;
    for (let i = start; i < end; i++) out.push(raster[i]);
    row += rowsThis;
  }

  // Feed paper to align with cutter, then auto-cut
  out.push(0x0A, 0x0A, 0x0A, 0x0A); // 4 feeds — cutter blade is ~15mm above print head
  // GS V 1 — partial cut (stays attached at center)
  // GS V 0 — full cut (fully separates)
  // Many compact thermal printers (Xprinter N160II) only have GS V m
  // Use full cut by default; if printer has no cutter, command is ignored.
  out.push(0x1D, 0x56, 0x00); // GS V 0 — full cut
  return new Uint8Array(out);
}

function buildESCPOS(order) {
  const ESC = 0x1B, GS = 0x1D, NL = 0x0A;
  const out = [];
  const enc = new TextEncoder();

  // Convert UTF-8 string → TIS-620 bytes (PC874 Thai for Xprinter N160II)
  // Thai Unicode 0x0E01–0x0E5B maps to TIS-620 0xA1–0xFB (offset 0xA0 - 0x0E00)
  // Strips emojis and unsupported chars (replaced with space or '?')
  const bytes = (s) => {
    if (!s) return;
    // Strip emoji ranges that thermal printer can't render
    s = String(s).replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{2B00}-\u{2BFF}]/gu, '');
    for (let i = 0; i < s.length; i++) {
      const code = s.charCodeAt(i);
      if (code <= 0x7F) {
        out.push(code);                       // ASCII
      } else if (code >= 0x0E01 && code <= 0x0E5B) {
        out.push(code - 0x0E00 + 0xA0);       // Thai → TIS-620
      } else if (code === 0x0E5C || code === 0x0E5D) {
        out.push(code - 0x0E00 + 0xA0);       // Thai punctuation
      } else if (code === 0x00A0) {
        out.push(0x20);                       // nbsp → space
      } else {
        // Non-Thai non-ASCII → skip (avoid garbage)
      }
    }
  };
  const ln = (s) => { bytes(s || ''); out.push(NL); };

  // Init
  out.push(ESC, 0x40);
  // Cancel Kanji/Chinese mode (in case printer defaults to 2-byte char set)
  out.push(0x1C, 0x2E);
  // Select Thai codepage — admin can change this in settings if needed.
  // Common values for Xprinter / Goojprt / generic ESC/POS Thai:
  //   21 (0x15) — TIS-620 Thai Char Code 11 (most universal)
  //   20 (0x14) — Thai Char Code 42
  //   30 (0x1E) — some printers
  //   70 (0x46) — PC874 (some Xprinter custom)
  //   255 (0xFF) — Thai (some firmware)
  const cp = parseInt(localStorage.getItem('btThaiCodepage') || '21', 10);
  out.push(ESC, 0x74, cp & 0xFF);

  // Center + double size header
  out.push(ESC, 0x61, 0x01);
  out.push(ESC, 0x21, 0x10); // double height
  ln('ครัวผู้ใหญ่ปอง');
  out.push(ESC, 0x21, 0x00); // reset
  ln('Tel: 061-962-3696');
  ln('--------------------------------');

  out.push(ESC, 0x61, 0x00); // left
  ln('Order: #' + order.id.slice(-6));
  ln('Time : ' + fmtReceiptDate(order.date));
  ln('Cust : ' + order.customer_name);
  if (order.customer_phone) ln('Phone: ' + maskPhone(order.customer_phone));
  ln('--------------------------------');

  for (const it of order.items) {
    const free = it.freeQty || 0;
    const paid = it.qty - free;
    const lineTotal = it.price * paid;
    const right = (free > 0 && paid === 0) ? 'FREE' : '฿' + lineTotal;
    const mainNm = it.mainName || it.name;
    const namePart = it.qty + 'x ' + mainNm;
    // Pad to 32 chars total
    const padding = Math.max(1, 32 - namePart.length - right.length);
    ln(namePart + ' '.repeat(padding) + right);
    // Print options (one per line)
    if (it.options && it.options.length) {
      for (const o of it.options) {
        const prefix = o.price > 0 ? '   + ' : '   - ';
        const px = o.price > 0 ? ' (+' + o.price + ')' : '';
        ln(prefix + o.choice + px);
      }
    }
    if (free > 0) ln('   [FREE x' + free + ']');
    if (it.note) ln('   note: ' + it.note);
  }
  ln('--------------------------------');

  if (order.discount) {
    const orig = order.original_total || (order.total + order.discount);
    ln('Subtotal           ฿' + orig);
    ln('Free ' + order.free_boxes_used + ' box(es)  -฿' + order.discount);
  }

  // Total — bold + double size
  out.push(ESC, 0x61, 0x02); // right align
  out.push(ESC, 0x21, 0x30); // double width + height
  ln('TOTAL ฿' + order.total);
  out.push(ESC, 0x21, 0x00); // reset
  out.push(ESC, 0x61, 0x01); // center

  ln('--------------------------------');
  ln('ขอบคุณที่อุดหนุน 🙏');
  ln('');

  // Helper to print a QR with title
  function pushQR(title, url) {
    out.push(ESC, 0x61, 0x01); // center
    ln(title);
    ln('');
    const qrBytes = enc.encode(url);
    // Model 2
    out.push(GS, 0x28, 0x6B, 0x04, 0x00, 0x31, 0x41, 0x32, 0x00);
    // Size 7
    out.push(GS, 0x28, 0x6B, 0x03, 0x00, 0x31, 0x43, 0x07);
    // Error correction L
    out.push(GS, 0x28, 0x6B, 0x03, 0x00, 0x31, 0x45, 0x30);
    // Store data
    const qrLen = qrBytes.length + 3;
    out.push(GS, 0x28, 0x6B, qrLen & 0xff, (qrLen >> 8) & 0xff, 0x31, 0x50, 0x30);
    for (const b of qrBytes) out.push(b);
    // Print
    out.push(GS, 0x28, 0x6B, 0x03, 0x00, 0x31, 0x51, 0x30);
    ln('');
    ln(url.replace('https://loyalty.fishconnect.co/', '.../'));
    ln('');
  }

  // ===== QR 1: Order menu =====
  pushQR('SCAN สั่งอาหาร', 'https://loyalty.fishconnect.co/menu.html');

  // Divider
  ln('--------------------------------');

  // ===== QR 2: Check points =====
  pushQR('SCAN เช็คแต้มสะสม', 'https://loyalty.fishconnect.co/points.html');
  out.push(ESC, 0x61, 0x01);
  ln('(กรอกเบอร์โทรเพื่อดูแต้ม)');

  ln('');
  ln('');
  ln('');

  // Cut paper
  out.push(GS, 0x56, 0x42, 0x00);

  return new Uint8Array(out);
}

// Auto-restore BT name (but doesn't auto-reconnect — must click button)
if (localStorage.getItem('btPrinterName')) {
  setTimeout(updateBTStatus, 500);
}

// Auto-print new orders (toggle in admin settings)
const printedOrderIds = new Set();
function maybeAutoPrint(orders) {
  const enabled = localStorage.getItem('autoPrint') === '1';
  if (!enabled) return;
  orders.forEach(o => {
    if (o.status !== 'pending') return;
    if (printedOrderIds.has(o.id)) return;

    // First snapshot: orders that already existed when we connected.
    // Mark them seen but DON'T print — they were already handled.
    if (firstOrderLoad) {
      printedOrderIds.add(o.id);
      return;
    }

    // Genuinely new pending order arrived after we were connected.
    printedOrderIds.add(o.id);
    const bt = getBTPrinter();
    if (!bt) {
      console.warn('[AutoPrint] BT not connected, skipping order', o.id);
      toast('🔇 Auto-print: BT ไม่เชื่อมต่อ — ข้าม', true);
      return;
    }
    const orderSrc = cloudOrders !== null ? cloudOrders : (loadDB().pendingOrders || []);
    const fullOrder = orderSrc.find(x => x.id === o.id);
    if (!fullOrder) return;
    console.log('[AutoPrint] firing for', fullOrder.id, fullOrder.customer_name);
    printViaBluetooth(fullOrder, bt).then(r => {
      if (r.success) toast('🖨️ Auto-print → ' + (fullOrder.customer_name || ''));
      else toast('⚠️ Auto-print ล้มเหลว: ' + (r.error || 'unknown'), true);
    });
  });
}
let firstOrderLoad = true;

// ========== Auto-prompt reward redemption on new order ==========
const promptedOrderIds = new Set();
let _rewardPromptInProgress = false;

function maybeAutoPromptReward(orders) {
  // Find pending orders where customer has reward eligibility, not yet redeemed, not yet prompted
  const candidates = orders.filter(o => {
    if (o.status !== 'pending') return false;
    if (promptedOrderIds.has(o.id)) return false;
    if (sessionStorage.getItem('rewardPrompted-' + o.id)) return false;
    if ((o.redemptions || []).length > 0) return false;
    const info = getRewardInfo(o);
    return info.canDrink || info.canDiscount;
  });

  if (firstOrderLoad) {
    // Mark all existing as prompted to avoid spamming on first load
    candidates.forEach(o => {
      promptedOrderIds.add(o.id);
      sessionStorage.setItem('rewardPrompted-' + o.id, '1');
    });
    return;
  }

  if (candidates.length === 0 || _rewardPromptInProgress) return;

  // Show modal for first candidate (process one at a time)
  const order = candidates[0];
  promptedOrderIds.add(order.id);
  sessionStorage.setItem('rewardPrompted-' + order.id, '1');

  const info = getRewardInfo(order);
  _rewardPromptInProgress = true;
  setTimeout(() => {
    showRedemptionModal(order, info.customer, { auto: true });
    // Clear flag after modal closes (set when modal removed)
    const checkClose = setInterval(() => {
      if (!document.querySelector('div[style*="z-index:300"]')) {
        _rewardPromptInProgress = false;
        clearInterval(checkClose);
      }
    }, 300);
  }, 1500);
}

// ========== Edit Order ==========
let editingOrder = null;
let editingItems = [];

function editOrderModal(orderId) {
  const orderSrc = cloudOrders !== null ? cloudOrders : (loadDB().pendingOrders || []);
  const order = orderSrc.find(o => o.id === orderId);
  if (!order) return;
  editingOrder = order;
  editingItems = JSON.parse(JSON.stringify(order.items || []));
  document.getElementById('editNote').value = order.note || '';
  renderEditBody();
  document.getElementById('editModal').style.display = 'flex';
}

function renderEditBody() {
  const total = editingItems.reduce((s, it) => s + it.price * it.qty, 0);
  document.getElementById('editBody').innerHTML = `
    <div style="background:#f7f8fb;padding:10px;border-radius:8px;font-size:13px;color:#5c6982;margin-bottom:10px">
      <b>${escapeHtml(editingOrder.customer_name)}</b> · ${editingOrder.customer_phone || '—'}
    </div>
    ${editingItems.map((it, i) => `
      <div style="display:flex;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">
        <input type="text" value="${(it.name || '').replace(/"/g,'&quot;')}" oninput="editingItems[${i}].name=this.value" style="flex:2;padding:8px;font-size:13px;border:1px solid #e2e7ef;border-radius:6px;font-family:inherit" placeholder="ชื่อรายการ">
        <input type="number" value="${it.qty}" min="1" oninput="editingItems[${i}].qty=parseInt(this.value)||1;renderEditBody()" style="width:50px;padding:8px;font-size:13px;border:1px solid #e2e7ef;border-radius:6px;text-align:center;font-family:inherit" placeholder="qty">
        <input type="number" value="${it.price}" min="0" oninput="editingItems[${i}].price=parseFloat(this.value)||0;renderEditBody()" style="width:60px;padding:8px;font-size:13px;border:1px solid #e2e7ef;border-radius:6px;text-align:center;font-family:inherit" placeholder="ราคา">
        <button onclick="removeEditItem(${i})" style="background:transparent;border:none;color:#dc2626;font-size:18px;padding:0 6px;cursor:pointer">×</button>
      </div>
    `).join('')}
    <div style="text-align:right;font-weight:800;color:#1652F0;font-size:18px;margin-top:10px;padding:8px;background:#ebf0ff;border-radius:8px">รวม: ฿${total}</div>
  `;
}

function removeEditItem(i) {
  if (editingItems.length === 1) return toast('⚠️ ต้องมีอย่างน้อย 1 รายการ');
  editingItems.splice(i, 1);
  renderEditBody();
}

function addEditItem() {
  editingItems.push({ id: 'manual-' + Date.now(), name: '', mainName: '', qty: 1, price: 50, addOns: [], note: '' });
  renderEditBody();
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
  editingOrder = null;
}

async function saveEdit() {
  if (!editingOrder) return;
  const total = editingItems.reduce((s, it) => s + it.price * it.qty, 0);
  const note = document.getElementById('editNote').value.trim();
  const updates = {
    items: editingItems.map(it => ({ ...it, mainName: it.mainName || it.name })),
    total,
    note,
    edited_at: new Date().toISOString()
  };
  // Local update
  const db = loadDB();
  const idx = (db.pendingOrders || []).findIndex(o => o.id === editingOrder.id);
  if (idx >= 0) {
    db.pendingOrders[idx] = { ...db.pendingOrders[idx], ...updates };
    saveDB(db);
  }
  // Cloud update
  if (window.cloud?.ready) await window.cloud.updateOrder(editingOrder.id, updates);
  toast('✅ แก้ไขแล้ว · รวม ฿' + total);
  closeEdit();
  render();
}

async function cancelOrder(orderId) {
  const reason = prompt('เหตุผลที่ยกเลิก (ถ้าไม่กรอกจะใช้ "—"):', '') ?? '';
  if (reason === null) return;
  if (!confirm('ยืนยันยกเลิก order นี้?')) return;
  const db = loadDB();
  const updates = {
    status: 'cancelled',
    cancelled_at: new Date().toISOString(),
    cancel_reason: reason || '—'
  };
  const local = db.pendingOrders.find(o => o.id === orderId);
  if (local) Object.assign(local, updates);
  saveDB(db);
  if (window.cloud) await window.cloud.updateOrder(orderId, updates);
  render();
  toast('❌ ยกเลิก order แล้ว');
}

// Listen to localStorage changes from parent window (when in iframe)
window.addEventListener('storage', e => {
  if (e.key === STORAGE_KEY) {
    try {
      const fresh = JSON.parse(e.newValue || '{}');
      if (fresh.pendingOrders) {
        // Use local data if cloud hasn't synced yet
        if (cloudOrders === null) cloudOrders = fresh.pendingOrders;
        render();
      }
    } catch (err) {}
  }
});

// Poll local storage every 2 sec as final fallback
setInterval(() => {
  if (cloudOrders === null) render();
}, 2000);

// Init: render immediately from local cache, then subscribe to cloud
render();
whenCloudReady(() => {
  // 🎁 Loyalty config — admin-edited base + active promo overrides.
  //    Kitchen reward buttons depend on these thresholds, so re-render on change.
  if (window.cloud?.onLoyaltyConfig) {
    window.cloud.onLoyaltyConfig(config => {
      if (typeof window.applyLoyaltyConfig !== 'function') return;
      window.applyLoyaltyConfig(config);
      try { render?.(); } catch (e) {}
    });
  }
  window.cloud.onOrders(orders => {
    cloudOrders = orders;
    // Mirror to local cache
    const db = loadDB();
    db.pendingOrders = orders;
    saveDB(db);
    render();
    // Auto-print new pending orders (skip first load)
    maybeAutoPrint(orders);
    // 🔔 Sound + visual alert (only when standalone — parent index.html handles it when embedded)
    if (!window.isEmbedded && window.OrderNotifier) {
      window.OrderNotifier.check(orders, { getOrders: () => cloudOrders || [] });
    }
    // (Reward redemption is now customer-driven from menu.html — no auto-prompt)
    firstOrderLoad = false;
  });
  window.cloud.onCustomers(customers => {
    cloudCustomers = customers;
    // Merge into local
    const db = loadDB();
    Object.entries(customers).forEach(([id, c]) => {
      db.customers[id] = c;
    });
    saveDB(db);
  });
});
</script>
